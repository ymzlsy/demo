<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>全景管控 - 沈阳客运智慧管控平台</title>
<script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html,body { width:100%; height:100%; overflow:hidden; background:#05102a; font-family:"Microsoft YaHei","PingFang SC",sans-serif; }
  #stage {
    position:absolute; top:0; left:0; width:1920px; height:1080px;
    transform-origin:top left;
    background:
      linear-gradient(135deg,#0a1838 0%,#0d1b46 100%);
    color:#fff;
  }
  /* tech grid */
  #stage::before {
    content:""; position:absolute; inset:0;
    background-image:
      linear-gradient(rgba(40,102,205,0.08) 1px, transparent 1px),
      linear-gradient(90deg, rgba(40,102,205,0.08) 1px, transparent 1px);
    background-size:48px 48px;
    pointer-events:none;
  }
  /* ===== top header ===== */
  .header {
    position:absolute; top:0; left:0; width:100%; height:96px;
    background:url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg"></svg>');
    z-index:20; pointer-events:none;
  }
  .header .title {
    position:absolute; left:50%; top:6px; transform:translateX(-50%);
    font-size:40px; font-weight:700; letter-spacing:8px;
    background:linear-gradient(to bottom,#fff,#7fd4ff);
    -webkit-background-clip:text; -webkit-text-fill-color:transparent;
    text-shadow:0 0 20px rgba(0,195,255,0.4);
    padding:0 80px;
  }
  .header .title::before, .header .title::after {
    content:""; position:absolute; top:30px; width:60px; height:3px;
    background:linear-gradient(to right,transparent,#03e6f1);
  }
  .header .title::before { left:0; }
  .header .title::after { right:0; transform:scaleX(-1); }
  .header-band {
    position:absolute; top:0; left:0; width:100%; height:70px;
    background:linear-gradient(to bottom,rgba(8,28,72,0.9),rgba(8,28,72,0));
    border-bottom:1px solid rgba(3,230,241,0.15);
  }
  .kpi-group { position:absolute; top:30px; display:flex; gap:34px; pointer-events:none; }
  .kpi-left { left:40px; }
  .kpi-right { right:300px; }
  .kpi { text-align:center; }
  .kpi .num { font-size:26px; font-weight:700; color:#47ffff; text-shadow:0 0 8px rgba(71,255,255,0.5); }
  .kpi .num small { font-size:15px; color:#7fd4ff; }
  .kpi .lbl { font-size:13px; color:#9db4d8; margin-top:2px; }
  .datetime { position:absolute; top:30px; right:40px; text-align:right; font-size:14px; color:#9db4d8; }
  .datetime .t { font-size:20px; color:#fff; font-weight:600; }

  /* top button row */
  .topbtns { position:absolute; top:100px; left:50%; transform:translateX(-50%); display:flex; gap:18px; z-index:18; }
  .topbtn {
    padding:7px 26px; font-size:15px; color:#7fe6ff; cursor:pointer;
    border:1px solid rgba(3,230,241,0.5);
    background:linear-gradient(to bottom,rgba(3,230,241,0.12),rgba(3,230,241,0.02));
    clip-path:polygon(8px 0,100% 0,100% calc(100% - 8px),calc(100% - 8px) 100%,0 100%,0 8px);
    transition:.2s;
  }
  .topbtn:hover,.topbtn.active { background:linear-gradient(to bottom,rgba(3,230,241,0.35),rgba(3,230,241,0.1)); color:#fff; box-shadow:0 0 14px rgba(3,230,241,0.4); }

  /* ===== panels ===== */
  .panel {
    position:absolute; width:380px;
    background:rgba(17,24,70,0.2);
    border:1px solid rgba(40,102,205,0.35);
    backdrop-filter:blur(2px);
  }
  .panel-hd {
    height:38px; line-height:38px; padding-left:18px;
    font-size:18px; font-weight:600; color:#fff;
    background:linear-gradient(to right,#2866cd,#2867cd27);
    position:relative;
  }
  .panel-hd::before { content:""; position:absolute; left:0; top:0; width:4px; height:100%; background:#03e6f1; }
  .panel-bd { padding:12px 16px; }

  .col-left { left:30px; }
  .col-right { right:30px; }

  .chart { width:100%; height:150px; }

  /* number stat row */
  .stat-row { display:flex; justify-content:space-around; margin:6px 0 10px; }
  .stat { text-align:center; }
  .stat .n { font-size:24px; font-weight:700; color:#00c3ff; }
  .stat .l { font-size:12px; color:#9db4d8; margin-top:2px; }

  /* list */
  .ulist { font-size:13px; }
  .ulist .row { display:flex; justify-content:space-between; padding:7px 4px; border-bottom:1px dashed rgba(40,102,205,0.25); color:#c7d6f0; }
  .ulist .row span:last-child { color:#47ffff; }

  /* ===== center: clipped viewport, image stays inside frame, zoom/pan within ===== */
  #center {
    position:absolute; left:418px; top:150px; width:1084px; height:782px;
    z-index:5; overflow:hidden;
    border:1px solid rgba(40,102,205,0.5); background:#06122e;
  }
  #vp { position:absolute; inset:0; cursor:grab; }
  #vp.grabbing { cursor:grabbing; }
  #zoom { position:absolute; left:0; top:0; transform-origin:0 0; will-change:transform; }
  .basewrap { position:relative; width:1084px; height:558px; }  /* 3000x1545 -> aspect 1.9417 */
  .baseimg { width:100%; height:100%; display:block; filter:saturate(1.05) brightness(0.96); -webkit-user-drag:none; user-select:none; }

  /* SVG hotspots overlay — viewBox 对齐底图原始像素，多边形精确贴合，随缩放一起变换 */
  .hotsvg { position:absolute; inset:0; width:100%; height:100%; overflow:visible; }
  /* 默认全透明(仍可点/可悬浮)，仅 hover 时显示高亮框 */
  .hotsvg polygon {
    fill:transparent; stroke:transparent; stroke-width:5;
    cursor:pointer; transition:fill .15s, stroke .15s;
  }
  .hotsvg polygon:hover { fill:rgba(0,195,255,0.42); stroke:#7fffff; }
  .hotsvg .clab { fill:#fff; font-size:30px; font-weight:700; paint-order:stroke; stroke:#06122e; stroke-width:6; pointer-events:none; }

  .zoomhint { position:absolute; right:10px; bottom:8px; font-size:12px; color:#7fa8d8; background:rgba(6,20,52,0.6); padding:3px 10px; border-radius:3px; z-index:6; pointer-events:none; }

  /* tooltip */
  #tip {
    position:absolute; z-index:60; padding:8px 14px; font-size:14px;
    background:rgba(6,20,52,0.95); border:1px solid #03e6f1; color:#fff;
    border-radius:4px; pointer-events:none; display:none; white-space:nowrap;
    box-shadow:0 0 14px rgba(3,230,241,0.5);
  }
  #tip .tno { color:#47ffff; font-weight:700; }

  /* ===== F-tags ===== */
  .ftag {
    position:absolute; z-index:30; font-size:12px; font-weight:700; color:#1a1a1a;
    background:#ffe24d; padding:3px 9px; border-radius:3px;
    box-shadow:0 2px 8px rgba(0,0,0,0.4); white-space:nowrap;
    border:1px solid #ffcf00;
  }

  /* bottom panel */
  .bottom {
    position:absolute; left:430px; right:430px; bottom:18px; height:120px;
    background:rgba(17,24,70,0.2); border:1px solid rgba(40,102,205,0.35); z-index:4;
  }
  .bottom .panel-hd { font-size:16px; }
  .devgrid { display:flex; gap:10px; padding:10px 16px; }
  .devitem { flex:1; text-align:center; padding:6px; background:rgba(0,195,255,0.06); border:1px solid rgba(40,102,205,0.3); }
  .devitem .dn { font-size:20px; font-weight:700; color:#47ffff; }
  .devitem .dl { font-size:12px; color:#9db4d8; margin-top:4px; }
  .devitem .dot { display:inline-block; width:8px; height:8px; border-radius:50%; margin-right:5px; }
</style>
</head>
<body>
<div id="stage">
  <!-- header -->
  <div class="header-band"></div>
  <div class="header">
    <div class="title">全景管控</div>
  </div>
  <div class="kpi-group kpi-left">
    <div class="kpi"><div class="num">30<small>/216</small></div><div class="lbl">参培总人数</div></div>
    <div class="kpi"><div class="num">628</div><div class="lbl">参培班级</div></div>
    <div class="kpi"><div class="num">31,997</div><div class="lbl">实训人次</div></div>
  </div>
  <div class="kpi-group kpi-right">
    <div class="kpi"><div class="num">96.4<small>%</small></div><div class="lbl">设备完好率</div></div>
    <div class="kpi"><div class="num">142</div><div class="lbl">在训设备</div></div>
    <div class="kpi"><div class="num">87.2<small>%</small></div><div class="lbl">考评通过率</div></div>
  </div>
  <div class="datetime">
    <div class="t" id="clock">2026-05-31 10:24:36</div>
    <div id="weekday">星期日 · 晴 12℃</div>
  </div>

  <!-- top buttons -->
  <div class="topbtns">
    <div class="topbtn active">智慧教室</div>
    <div class="topbtn">智能实训</div>
    <div class="topbtn">智慧教务</div>
    <div class="topbtn">智能考评</div>
  </div>

  <!-- LEFT panels -->
  <div class="panel col-left" style="top:150px;">
    <div class="panel-hd">当天培训情况</div>
    <div class="panel-bd">
      <div class="stat-row">
        <div class="stat"><div class="n">18</div><div class="l">开班数</div></div>
        <div class="stat"><div class="n">426</div><div class="l">在训学员</div></div>
        <div class="stat"><div class="n">52</div><div class="l">授课教师</div></div>
      </div>
      <div class="chart" id="chartTrain"></div>
    </div>
  </div>
  <div class="panel col-left" style="top:430px;">
    <div class="panel-hd">设备考勤统计</div>
    <div class="panel-bd"><div class="chart" id="chartAttend"></div></div>
  </div>
  <div class="panel col-left" style="top:690px;">
    <div class="panel-hd">实训区域人员分布</div>
    <div class="panel-bd"><div class="chart" id="chartArea" style="height:180px;"></div></div>
  </div>

  <!-- RIGHT panels -->
  <div class="panel col-right" style="top:150px;">
    <div class="panel-hd">考核成绩分析</div>
    <div class="panel-bd"><div class="chart" id="chartScore"></div></div>
  </div>
  <div class="panel col-right" style="top:430px;">
    <div class="panel-hd">实训项目排行</div>
    <div class="panel-bd">
      <div class="ulist" id="rankList"></div>
    </div>
  </div>
  <div class="panel col-right" style="top:690px;">
    <div class="panel-hd">设备运行时长</div>
    <div class="panel-bd"><div class="chart" id="chartRun" style="height:180px;"></div></div>
  </div>

  <!-- CENTER (clipped viewport) -->
  <div id="center">
    <div class="ftag" style="left:12px; top:10px; z-index:7;">🔧 本次优化 F1 · 车厢区域可分块交互（区域内可缩放）</div>
    <div id="vp">
      <div id="zoom">
        <div class="basewrap">
          <img class="baseimg" src="base-1f.png" alt="沈阳客运实训基地1F" draggable="false" />
          <svg class="hotsvg" viewBox="0 0 3000 1545" preserveAspectRatio="none" id="hotsvg"></svg>
        </div>
      </div>
    </div>
    <div class="zoomhint">滚轮缩放 · 拖拽平移 · 双击复位</div>
  </div>

  <!-- BOTTOM -->
  <div class="bottom">
    <div class="panel-hd">实训设备运行状态</div>
    <div class="devgrid">
      <div class="devitem"><div class="dn"><span class="dot" style="background:#2ecc71;"></span>118</div><div class="dl">正常运行</div></div>
      <div class="devitem"><div class="dn"><span class="dot" style="background:#f1c40f;"></span>16</div><div class="dl">待机</div></div>
      <div class="devitem"><div class="dn"><span class="dot" style="background:#e74c3c;"></span>5</div><div class="dl">告警</div></div>
      <div class="devitem"><div class="dn"><span class="dot" style="background:#95a5a6;"></span>3</div><div class="dl">离线</div></div>
      <div class="devitem"><div class="dn">96.4%</div><div class="dl">完好率</div></div>
      <div class="devitem"><div class="dn">2,184h</div><div class="dl">今日累计</div></div>
    </div>
  </div>

  <div id="tip"></div>
</div>

<script>
/* ===== scale to fit ===== */
var stageScale = 1;
function fit(){
  stageScale = Math.min(window.innerWidth/1920, window.innerHeight/1080);
  document.getElementById('stage').style.transform = 'scale('+stageScale+')';
}
window.addEventListener('resize', fit); fit();

/* ===== clock ===== */
function tick(){
  var d=new Date();
  var p=n=>String(n).padStart(2,'0');
  document.getElementById('clock').textContent =
    d.getFullYear()+'-'+p(d.getMonth()+1)+'-'+p(d.getDate())+' '+p(d.getHours())+':'+p(d.getMinutes())+':'+p(d.getSeconds());
}
setInterval(tick,1000); tick();

/* ===== ECharts ===== */
var barGrad = new echarts.graphic.LinearGradient(0,0,0,1,[
  {offset:0,color:'#00c3ff'},{offset:1,color:'rgba(0,195,255,0.05)'}
]);
function baseGrid(){ return {top:20,left:36,right:12,bottom:24}; }
function axisStyle(){ return {axisLine:{lineStyle:{color:'rgba(120,160,220,0.4)'}},axisLabel:{color:'#9db4d8',fontSize:11},splitLine:{lineStyle:{color:'rgba(40,102,205,0.18)'}}}; }

echarts.init(document.getElementById('chartTrain')).setOption({
  grid:baseGrid(), tooltip:{trigger:'axis'},
  xAxis:Object.assign({type:'category',data:['8时','10时','12时','14时','16时','18时']},axisStyle()),
  yAxis:Object.assign({type:'value'},axisStyle()),
  series:[{type:'bar',barWidth:'45%',data:[120,200,150,260,180,90],itemStyle:{color:barGrad}}]
});
echarts.init(document.getElementById('chartAttend')).setOption({
  grid:baseGrid(), tooltip:{trigger:'axis'},
  xAxis:Object.assign({type:'category',data:['周一','周二','周三','周四','周五']},axisStyle()),
  yAxis:Object.assign({type:'value'},axisStyle()),
  series:[{type:'bar',barWidth:'40%',data:[88,95,90,98,93],itemStyle:{color:barGrad}}]
});
echarts.init(document.getElementById('chartArea')).setOption({
  tooltip:{trigger:'item'}, legend:{show:false},
  series:[{type:'pie',radius:['40%','68%'],center:['50%','50%'],
    label:{color:'#cfe0ff',fontSize:11},
    data:[
      {value:120,name:'接发列车区',itemStyle:{color:'#00c3ff'}},
      {value:80,name:'检修区',itemStyle:{color:'#47ffff'}},
      {value:60,name:'调度区',itemStyle:{color:'#2866cd'}},
      {value:40,name:'检测区',itemStyle:{color:'#7fd4ff'}}
    ]}]
});
echarts.init(document.getElementById('chartScore')).setOption({
  grid:baseGrid(), tooltip:{trigger:'axis'},
  xAxis:Object.assign({type:'category',data:['优','良','中','及格','不及格']},axisStyle()),
  yAxis:Object.assign({type:'value'},axisStyle()),
  series:[{type:'bar',barWidth:'45%',data:[156,210,98,46,12],itemStyle:{color:barGrad}}]
});
echarts.init(document.getElementById('chartRun')).setOption({
  grid:baseGrid(), tooltip:{trigger:'axis'},
  xAxis:Object.assign({type:'value'},axisStyle()),
  yAxis:Object.assign({type:'category',data:['接发','检修','调度','检测','信号']},axisStyle()),
  series:[{type:'bar',barWidth:'50%',data:[420,380,300,260,210],
    itemStyle:{color:new echarts.graphic.LinearGradient(0,0,1,0,[{offset:0,color:'rgba(0,195,255,0.05)'},{offset:1,color:'#00c3ff'}])}}]
});
var rank=['接发列车实训','轨道异物检测','行车调度演练','信号设备检修','应急处置演练','客运服务实训'];
document.getElementById('rankList').innerHTML = rank.map((r,i)=>
  '<div class="row"><span>'+(i+1)+'. '+r+'</span><span>'+(980-i*120)+' 人次</span></div>').join('');

/* ===== F1: carriages — SVG irregular polygons over the base image (viewBox = 底图原始像素) ===== */
var VBW=3000, VBH=1545;
var CARRIAGES = [
  {car:'普速列车',          name:'普速列车乘务演练实训模块',          poly:[[0.413,0.348],[0.689,0.348],[0.689,0.442],[0.413,0.442]]},
  {car:'CR400BF-GS',        name:'CR400BF-GS 型动车组乘务实训',        poly:[[0.296,0.454],[0.724,0.454],[0.724,0.546],[0.296,0.546]]},
  {car:'CR400BF-G·CRH380BG',name:'CR400BF-G / CRH380BG 型动车组乘务实训',poly:[[0.284,0.546],[0.735,0.546],[0.735,0.646],[0.284,0.646]]},
  {car:'CR200J·CRH5G',      name:'CR200J / CRH5G 型动车组乘务实训',     poly:[[0.187,0.646],[0.411,0.646],[0.411,0.722],[0.187,0.722]]}
];
var SVGNS='http://www.w3.org/2000/svg';
var svg=document.getElementById('hotsvg');
var tip=document.getElementById('tip');
var stage=document.getElementById('stage');
CARRIAGES.forEach(function(c,i){
  var ptsAbs=c.poly.map(p=>[p[0]*VBW, p[1]*VBH]);
  var poly=document.createElementNS(SVGNS,'polygon');
  poly.setAttribute('points', ptsAbs.map(p=>p.join(',')).join(' '));
  poly.dataset.i=i;
  // tooltip on hover
  poly.addEventListener('mousemove', function(e){
    tip.style.display='block';
    tip.innerHTML='<span class="tno">'+c.name+'</span><br>点击进入全景管控详情';
    var r=stage.getBoundingClientRect();
    tip.style.left=((e.clientX-r.left)/stageScale+14)+'px';
    tip.style.top=((e.clientY-r.top)/stageScale+14)+'px';
  });
  poly.addEventListener('mouseleave', function(){ tip.style.display='none'; });
  poly.addEventListener('click', function(){
    if(panMoved) return;           // 拖拽误触不跳转
    tip.style.display='none';
    window.location.href = 'carriage-detail.html?car=' + encodeURIComponent(c.car);
  });
  svg.appendChild(poly);
  // centroid label
  var cx=ptsAbs.reduce((s,p)=>s+p[0],0)/ptsAbs.length;
  var cy=ptsAbs.reduce((s,p)=>s+p[1],0)/ptsAbs.length;
  var t=document.createElementNS(SVGNS,'text');
  t.setAttribute('x',cx); t.setAttribute('y',cy);
  t.setAttribute('text-anchor','middle'); t.setAttribute('dominant-baseline','middle');
  t.setAttribute('class','clab'); t.textContent=c.car;
  svg.appendChild(t);
});

/* ===== zoom + pan inside #center only ===== */
var center=document.getElementById('center'), vp=document.getElementById('vp'), zoom=document.getElementById('zoom');
var BW=1084, BH=558, CH=782;        // basewrap & center sizes
var scale=1, tx=0, ty=(CH-BH)/2;    // 初始垂直居中
var MIN=1, MAX=3.2;
function applyT(){ zoom.style.transform='translate('+tx+'px,'+ty+'px) scale('+scale+')'; }
function clampPan(){
  // 内容比视口小→居中；比视口大→限制在边缘内（不留黑边）
  var w=BW*scale, h=BH*scale;
  var V=center.clientWidth, Vy=center.clientHeight;
  tx = (w<=V) ? (V-w)/2 : Math.min(0, Math.max(V-w, tx));
  ty = (h<=Vy) ? (Vy-h)/2 : Math.min(0, Math.max(Vy-h, ty));
}
applyT();
// 滚轮缩放（以光标为锚点；换算掉 stage 整体缩放）
center.addEventListener('wheel', function(e){
  e.preventDefault();
  var r=center.getBoundingClientRect();
  var mx=(e.clientX-r.left)/stageScale, my=(e.clientY-r.top)/stageScale;
  var factor = e.deltaY<0 ? 1.15 : 1/1.15;
  var ns=Math.min(MAX, Math.max(MIN, scale*factor));
  if(ns===scale) return;
  tx = mx - (mx-tx)*(ns/scale);
  ty = my - (my-ty)*(ns/scale);
  scale=ns; clampPan(); applyT();
}, {passive:false});
// 拖拽平移
var dragging=false, sx=0, sy=0, panMoved=false;
vp.addEventListener('mousedown', function(e){ dragging=true; panMoved=false; sx=e.clientX; sy=e.clientY; vp.classList.add('grabbing'); });
window.addEventListener('mousemove', function(e){
  if(!dragging) return;
  var dx=(e.clientX-sx)/stageScale, dy=(e.clientY-sy)/stageScale;
  if(Math.abs(e.clientX-sx)+Math.abs(e.clientY-sy)>4) panMoved=true;
  sx=e.clientX; sy=e.clientY;
  tx+=dx; ty+=dy; clampPan(); applyT();
});
window.addEventListener('mouseup', function(){ dragging=false; vp.classList.remove('grabbing'); setTimeout(function(){panMoved=false;},0); });
// 双击复位
center.addEventListener('dblclick', function(){ scale=1; tx=0; ty=(CH-BH)/2; applyT(); });
</script>
</body>
</html>
