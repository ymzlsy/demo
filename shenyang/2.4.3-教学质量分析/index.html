<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>教学质量分析 - 沈阳客运职培基地</title>
  <script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100vh; overflow: hidden; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif; background: #f0f2f5; color: rgba(0,0,0,.85); display: flex; flex-direction: column; }
    .header { background: #fff; padding: 0 24px; height: 42px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #f0f0f0; flex-shrink: 0; }
    .breadcrumb { font-size: 14px; color: rgba(0,0,0,.45); }
    .breadcrumb a { color: #1677ff; text-decoration: none; }
    .breadcrumb a:hover { text-decoration: underline; }
    .content { width: 100%; padding: 8px 24px 0; flex: 1; display: flex; flex-direction: column; min-height: 0; overflow: hidden; }
    .page-title-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px; flex-shrink: 0; }
    .page-title { font-size: 16px; font-weight: 600; color: rgba(0,0,0,.85); }
    .card { background: #fff; border-radius: 8px; padding: 10px 14px; margin-bottom: 8px; box-shadow: 0 1px 2px rgba(0,0,0,.03); border: 1px solid #f0f0f0; flex-shrink: 0; }
    .card-title { font-size: 13px; font-weight: 600; margin-bottom: 6px; color: rgba(0,0,0,.85); display: flex; align-items: center; gap: 8px; }
    .card-title::before { content: ''; display: inline-block; width: 3px; height: 14px; background: #1677ff; border-radius: 2px; }
    .card-subtitle { font-size: 11px; color: rgba(0,0,0,.35); font-weight: 400; margin-left: 8px; }
    .btn { display: inline-flex; align-items: center; padding: 5px 14px; border-radius: 6px; font-size: 13px; cursor: pointer; border: 1px solid #d9d9d9; background: #fff; color: rgba(0,0,0,.85); transition: all .2s; gap: 6px; }
    .btn:hover { border-color: #1677ff; color: #1677ff; }
    .btn-primary { background: #1677ff; color: #fff; border-color: #1677ff; }
    .btn-primary:hover { background: #4096ff; border-color: #4096ff; color: #fff; }
    .tag { display: inline-block; padding: 1px 6px; border-radius: 4px; font-size: 12px; }
    .tag-green { background: #f6ffed; color: #52c41a; border: 1px solid #b7eb8f; }
    .tag-blue { background: #e6f7ff; color: #1677ff; border: 1px solid #91d5ff; }
    .tag-orange { background: #fff7e6; color: #fa8c16; border: 1px solid #ffd591; }
    .tag-red { background: #fff2f0; color: #ff4d4f; border: 1px solid #ffccc7; }

    /* KPI Row */
    .kpi-row { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; margin-bottom: 8px; flex-shrink: 0; }
    .kpi-card { background: #fff; border-radius: 8px; padding: 12px 16px; text-align: center; border: 1px solid #f0f0f0; }
    .kpi-value { font-size: 24px; font-weight: 700; color: #1677ff; line-height: 1.2; }
    .kpi-value .unit { font-size: 13px; font-weight: 400; color: rgba(0,0,0,.45); margin-left: 2px; }
    .kpi-label { font-size: 12px; color: rgba(0,0,0,.45); margin-top: 2px; }

    /* Table */
    .table-wrapper { flex: 1; overflow-y: auto; border-radius: 8px; }
    .data-table { width: 100%; border-collapse: collapse; font-size: 14px; table-layout: fixed; }
    .data-table thead { position: sticky; top: 0; z-index: 2; }
    .data-table th { background: #fafafa; padding: 8px 10px; text-align: center; font-weight: 600; border-bottom: 1px solid #f0f0f0; white-space: nowrap; font-size: 12px; color: rgba(0,0,0,.65); }
    .data-table td { padding: 7px 10px; border-bottom: 1px solid #f5f5f5; text-align: center; white-space: nowrap; }
    .data-table tbody tr { cursor: pointer; transition: background .15s; }
    .data-table tbody tr:hover { background: #e6f4ff; }
    .data-table .name-cell { color: #1677ff; font-weight: 500; cursor: pointer; }
    .data-table .name-cell:hover { text-decoration: underline; }
    .score-bold { font-weight: 700; }
    .score-green { color: #52c41a; }
    .score-blue { color: #1677ff; }
    .score-orange { color: #fa8c16; }
    .score-red { color: #ff4d4f; }
    .formula-note { font-size: 11px; color: rgba(0,0,0,.35); padding: 6px 0 0; flex-shrink: 0; }

    /* Detail View */
    .back-btn { display: inline-flex; align-items: center; gap: 6px; font-size: 14px; color: #1677ff; cursor: pointer; margin-bottom: 8px; padding: 4px 0; flex-shrink: 0; }
    .back-btn:hover { text-decoration: underline; }
    .detail-layout { display: grid; grid-template-columns: 280px 1fr 1fr; gap: 12px; flex: 1; min-height: 0; overflow: hidden; }
    .detail-col { display: flex; flex-direction: column; gap: 10px; min-height: 0; overflow-y: auto; }
    .profile-card { text-align: center; padding: 16px 12px; }
    .profile-avatar { width: 64px; height: 64px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 26px; font-weight: 700; color: #fff; margin: 0 auto 10px; border: 3px solid #e6f0ff; background: #1677ff; }
    .profile-name { font-size: 17px; font-weight: 600; margin-bottom: 2px; }
    .profile-dept { font-size: 13px; color: rgba(0,0,0,.45); margin-bottom: 12px; }
    .info-list { list-style: none; text-align: left; }
    .info-list li { display: flex; justify-content: space-between; padding: 7px 0; border-bottom: 1px solid #f5f5f5; font-size: 13px; }
    .info-list li .lbl { color: rgba(0,0,0,.45); }
    .info-list li .val { color: rgba(0,0,0,.85); font-weight: 500; }
    .gauge-box { height: 180px; }
    .add-score-text { text-align: center; font-size: 13px; color: #fa8c16; font-weight: 500; margin-top: -4px; }
    .chart-box { min-height: 180px; }
    .dim-bar-row { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; font-size: 13px; }
    .dim-bar-label { width: 60px; flex-shrink: 0; color: rgba(0,0,0,.65); text-align: right; }
    .dim-bar-track { flex: 1; height: 20px; background: #f5f5f5; border-radius: 4px; overflow: hidden; position: relative; }
    .dim-bar-fill { height: 100%; border-radius: 4px; transition: width .5s; }
    .dim-bar-text { width: 130px; flex-shrink: 0; font-size: 12px; color: rgba(0,0,0,.55); text-align: left; }

    /* Grouped horizontal bars for sub-dimensions */
    .sub-dim-group { margin-bottom: 10px; }
    .sub-dim-group-name { font-size: 12px; font-weight: 600; color: rgba(0,0,0,.75); margin-bottom: 4px; }
    .sub-bar-row { display: flex; align-items: center; gap: 6px; margin-bottom: 3px; font-size: 11px; }
    .sub-bar-label { width: 48px; flex-shrink: 0; color: rgba(0,0,0,.45); text-align: right; }
    .sub-bar-track { flex: 1; height: 14px; background: #f5f5f5; border-radius: 3px; overflow: hidden; }
    .sub-bar-fill { height: 100%; border-radius: 3px; }
    .sub-bar-val { width: 40px; font-size: 11px; color: rgba(0,0,0,.55); }

    .hidden { display: none !important; }

    /* Xiaoan FAB */
    .xiaoan-fab {
      position: fixed; bottom: 28px; right: 28px; z-index: 900;
      cursor: grab; user-select: none;
    }
    .xiaoan-fab:active { cursor: grabbing; }
    .xiaoan-fab-inner {
      width: 72px; height: 72px; border-radius: 50%; overflow: hidden;
      position: relative; background: #f0f5ff;
      box-shadow: 0 4px 16px rgba(22,119,255,0.15);
      transition: transform .2s;
      animation: xiaoanBreathe 3s ease-in-out infinite;
    }
    .xiaoan-fab:hover .xiaoan-fab-inner { transform: scale(1.06); }
    .xiaoan-fab-inner img { width: 100%; height: 100%; object-fit: cover; object-position: center top; }
    @keyframes xiaoanBreathe {
      0%, 100% { box-shadow: 0 4px 16px rgba(22,119,255,0.15); }
      50% { box-shadow: 0 4px 24px rgba(22,119,255,0.35), 0 0 0 4px rgba(22,119,255,0.08); }
    }
    .xiaoan-label { text-align: center; margin-top: 6px; font-size: 12px; color: #1677ff; font-weight: 500; }

    /* Xiaoan Panel Overlay */
    .xiaoan-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.35); z-index: 950; opacity: 0; pointer-events: none; transition: opacity .3s; }
    .xiaoan-overlay.open { opacity: 1; pointer-events: all; }

    .xiaoan-wrapper {
      position: fixed; bottom: 40px; right: 28px; z-index: 960;
      display: flex; align-items: flex-end; gap: 0;
      transform: translateY(30px) scale(.95); opacity: 0; pointer-events: none;
      transition: all .35s cubic-bezier(.4,0,.2,1);
    }
    .xiaoan-wrapper.open { transform: translateY(0) scale(1); opacity: 1; pointer-events: all; }

    .xiaoan-avatar-side {
      width: 160px; flex-shrink: 0; align-self: flex-end;
      pointer-events: none; position: relative; z-index: 1;
      margin-right: -20px; margin-bottom: -4px;
    }
    .xiaoan-avatar-side img { width: 100%; display: block; filter: drop-shadow(2px 2px 8px rgba(0,0,0,.10)); }

    .xiaoan-panel {
      width: 560px; background: #fff; border-radius: 16px;
      box-shadow: 0 12px 40px rgba(0,0,0,.12); overflow: hidden;
      display: flex; flex-direction: column; max-height: 720px; position: relative; z-index: 2;
    }
    .xiaoan-panel-header {
      padding: 16px 20px; background: #fff; border-bottom: 1px solid #f0f0f0;
      display: flex; align-items: center; gap: 12px; cursor: grab; user-select: none;
    }
    .xiaoan-panel-header:active { cursor: grabbing; }
    .xiaoan-panel-header .xa-dot { width: 8px; height: 8px; border-radius: 50%; background: #52c41a; flex-shrink: 0; }
    .xiaoan-panel-header .xa-info { flex: 1; }
    .xiaoan-panel-header .xa-name { font-size: 15px; font-weight: 600; color: rgba(0,0,0,.85); }
    .xiaoan-panel-header .xa-sub { font-size: 12px; color: rgba(0,0,0,.45); }
    .xiaoan-panel-close {
      width: 28px; height: 28px; border-radius: 50%; background: #f5f5f5; border: none;
      color: rgba(0,0,0,.45); font-size: 18px; cursor: pointer;
      display: flex; align-items: center; justify-content: center; transition: all .2s;
    }
    .xiaoan-panel-close:hover { background: #ffe6e6; color: #ff4d4f; }

    .xa-wave-bar { display: flex; gap: 2px; align-items: flex-end; height: 16px; margin-left: 8px; }
    .xa-wave-bar.active .xa-wave-line { animation: xaWave .6s ease-in-out infinite alternate; }
    .xa-wave-line { width: 2px; background: #1677ff; border-radius: 1px; height: 4px; }
    .xa-wave-line:nth-child(1) { animation-delay: 0s; }
    .xa-wave-line:nth-child(2) { animation-delay: .1s; }
    .xa-wave-line:nth-child(3) { animation-delay: .2s; }
    .xa-wave-line:nth-child(4) { animation-delay: .15s; }
    .xa-wave-line:nth-child(5) { animation-delay: .05s; }
    @keyframes xaWave {
      0% { height: 4px; }
      100% { height: 16px; }
    }

    .xiaoan-chat-body {
      flex: 1; overflow-y: auto; padding: 16px 20px; min-height: 280px; max-height: 420px;
      display: flex; flex-direction: column; gap: 12px;
    }

    .xa-msg { max-width: 100%; animation: xaMsgIn .3s ease; }
    @keyframes xaMsgIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    .xa-msg-system {
      background: #fff; border: 1px solid #f0f0f0; border-left: 3px solid #1677ff;
      border-radius: 0 10px 10px 0; padding: 12px 16px;
      font-size: 13px; color: rgba(0,0,0,.75); line-height: 1.7;
    }
    .xa-msg-system .xa-highlight { color: #1677ff; font-weight: 600; }
    .xa-msg-user {
      background: #1677ff; color: #fff; border-radius: 10px 0 10px 10px;
      padding: 10px 16px; font-size: 13px; line-height: 1.6;
      align-self: flex-end; max-width: 85%;
    }
    .xa-msg-chart { width: 100%; height: 200px; margin-top: 8px; border-radius: 8px; background: #fafafa; }
    .xa-typing-cursor { display: inline-block; width: 2px; height: 14px; background: #1677ff; margin-left: 2px; vertical-align: middle; animation: xaBlink 1s step-end infinite; }
    @keyframes xaBlink { 50% { opacity: 0; } }

    .xa-chips { display: flex; flex-wrap: wrap; gap: 8px; padding: 10px 20px; border-top: 1px solid #f5f5f5; }
    .xa-chip {
      padding: 6px 14px; border-radius: 16px; font-size: 12px;
      background: #f0f5ff; color: #1677ff; border: 1px solid #d6e4ff;
      cursor: pointer; transition: all .2s; white-space: nowrap;
    }
    .xa-chip:hover { background: #1677ff; color: #fff; border-color: #1677ff; }

    .xa-input-bar {
      display: flex; align-items: center; gap: 8px; padding: 12px 16px;
      border-top: 1px solid #f0f0f0; background: #fff;
    }
    .xa-input {
      flex: 1; padding: 8px 12px; border: 1px solid #d9d9d9; border-radius: 20px;
      font-size: 13px; outline: none; background: #fafafa; transition: all .2s;
    }
    .xa-input:focus { border-color: #1677ff; background: #fff; box-shadow: 0 0 0 2px rgba(22,119,255,.1); }
    .xa-mic-btn {
      width: 36px; height: 36px; border-radius: 50%; border: 1px solid #d9d9d9;
      background: #fff; cursor: pointer; display: flex; align-items: center; justify-content: center;
      transition: all .2s; flex-shrink: 0;
    }
    .xa-mic-btn:hover { border-color: #1677ff; color: #1677ff; }
    .xa-mic-btn.recording { background: #ff4d4f; border-color: #ff4d4f; }
    .xa-mic-btn.recording svg { fill: #fff; }
    .xa-send-btn {
      width: 36px; height: 36px; border-radius: 50%; border: none;
      background: #1677ff; cursor: pointer; display: flex; align-items: center;
      justify-content: center; transition: all .2s; flex-shrink: 0;
    }
    .xa-send-btn:hover { background: #4096ff; }
    .xa-send-btn svg { fill: #fff; width: 16px; height: 16px; }

    /* Chart Info Modal */
    .chart-info-btn {
      display: inline-flex; align-items: center; justify-content: center;
      width: 16px; height: 16px; border-radius: 50%; border: 1px solid #d9d9d9;
      background: #fafafa; color: rgba(0,0,0,.45); font-size: 10px; font-weight: 700;
      cursor: pointer; margin-left: auto; flex-shrink: 0; transition: all .2s;
      font-style: italic; font-family: Georgia, serif; line-height: 1;
    }
    .chart-info-btn:hover { border-color: #1677ff; color: #1677ff; background: #f0f5ff; }
    .chart-info-overlay {
      position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,.45); z-index: 1100;
      display: flex; align-items: center; justify-content: center;
      opacity: 0; pointer-events: none; transition: opacity .2s;
    }
    .chart-info-overlay.active { opacity: 1; pointer-events: auto; }
    .chart-info-modal {
      background: #fff; border-radius: 12px; width: 580px; max-height: 80vh;
      box-shadow: 0 12px 48px rgba(0,0,0,.15); overflow: hidden;
      transform: translateY(20px) scale(0.95); transition: transform .25s cubic-bezier(.4,0,.2,1);
    }
    .chart-info-overlay.active .chart-info-modal { transform: translateY(0) scale(1); }
    .chart-info-header {
      padding: 16px 20px; background: linear-gradient(135deg, #1677ff 0%, #4096ff 100%);
      color: #fff; display: flex; align-items: center; justify-content: space-between;
    }
    .chart-info-header h3 { font-size: 15px; font-weight: 600; margin: 0; }
    .chart-info-close {
      width: 28px; height: 28px; border-radius: 50%; border: none;
      background: rgba(255,255,255,.2); color: #fff; font-size: 18px;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
    }
    .chart-info-close:hover { background: rgba(255,255,255,.35); }
    .chart-info-body { padding: 16px 20px; overflow-y: auto; max-height: calc(80vh - 56px); }
    .chart-info-section { margin-bottom: 14px; }
    .chart-info-section:last-child { margin-bottom: 0; }
    .chart-info-label {
      font-size: 11px; color: rgba(0,0,0,.45); font-weight: 600; text-transform: uppercase;
      letter-spacing: 0.5px; margin-bottom: 4px;
    }
    .chart-info-value {
      font-size: 13px; color: rgba(0,0,0,.85); line-height: 1.6;
      background: #fafafa; border-radius: 6px; padding: 8px 12px;
      border: 1px solid #f0f0f0; word-break: break-all;
    }
    .chart-info-value code {
      background: #e6f7ff; color: #1677ff; padding: 1px 4px; border-radius: 3px;
      font-size: 12px; font-family: 'SF Mono', Monaco, monospace;
    }
    .chart-info-confidence {
      display: inline-block; padding: 2px 10px; border-radius: 10px;
      font-size: 12px; font-weight: 600;
    }
    .conf-100 { background: #f6ffed; color: #52c41a; border: 1px solid #b7eb8f; }
    .conf-need { background: #fff7e6; color: #fa8c16; border: 1px solid #ffd591; }
    .conf-partial { background: #e6f7ff; color: #1677ff; border: 1px solid #91d5ff; }
  </style>
</head>
<body>

<!-- Header -->
<div class="header">
  <div class="breadcrumb">
    <a href="../">Demo</a> / <a href="#">实训技能评价分析</a> / 教学质量分析
  </div>
</div>

<!-- ===== View 1: Overview ===== -->
<div class="content" id="overviewView">
  <div class="page-title-row">
    <div class="page-title">教学质量分析 - 整体概览</div>
  </div>

  <!-- KPI Cards -->
  <div class="kpi-row" id="kpiRow"></div>

  <!-- Teacher Table -->
  <div class="card" style="flex:1; display:flex; flex-direction:column; min-height:0; margin-bottom:0; padding-bottom:6px;">
    <div class="card-title">教师评估列表 <span class="card-subtitle">数据来源: evaqualityteachassessList | 点击教师姓名查看详情</span><span class="chart-info-btn" onclick="showChartInfo('quality-table')">i</span></div>
    <div class="table-wrapper">
      <table class="data-table">
        <thead>
          <tr>
            <th>年度</th>
            <th>教师姓名</th>
            <th>教师类型</th>
            <th>单位</th>
            <th>随堂听课</th>
            <th>教学检查</th>
            <th>学员评价</th>
            <th>三项合计</th>
            <th>加分</th>
            <th>总分</th>
          </tr>
        </thead>
        <tbody id="teacherTableBody"></tbody>
      </table>
    </div>
    <div class="formula-note">总分 = 随堂听课 + 教学检查 + 学员评价 + 加分项</div>
  </div>
</div>

<!-- ===== View 2: Teacher Detail ===== -->
<div class="content hidden" id="detailView">
  <div class="back-btn" onclick="showOverview()">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#1677ff" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
    返回概览
  </div>
  <div class="detail-layout" id="detailContent"></div>
</div>

<!-- Xiaoan FAB -->
<div class="xiaoan-fab" id="xiaoanFab" onclick="xiaoanFabClick(event)">
  <div class="xiaoan-fab-inner">
    <img src="xiaoan.png" alt="小安">
  </div>
  <div class="xiaoan-label">小安</div>
</div>

<!-- Xiaoan Overlay -->
<div class="xiaoan-overlay" id="xiaoanOverlay" onclick="closeXiaoan()"></div>

<!-- Xiaoan Wrapper -->
<div class="xiaoan-wrapper" id="xiaoanWrapper">
  <div class="xiaoan-avatar-side">
    <img src="xiaoan.png" alt="小安">
  </div>
  <div class="xiaoan-panel" id="xiaoanPanel">
    <div class="xiaoan-panel-header" id="xiaoanPanelHeader">
      <div class="xa-dot"></div>
      <div class="xa-info">
        <div class="xa-name">小安 - 智能分析</div>
        <div class="xa-sub">教学质量分析数据洞察</div>
      </div>
      <div class="xa-wave-bar" id="xaWaveBar">
        <div class="xa-wave-line"></div><div class="xa-wave-line"></div><div class="xa-wave-line"></div><div class="xa-wave-line"></div><div class="xa-wave-line"></div>
      </div>
      <button class="xiaoan-panel-close" onclick="closeXiaoan()">&times;</button>
    </div>
    <div class="xiaoan-chat-body" id="xiaoanChatBody"></div>
    <div class="xa-chips" id="xiaoanChips"></div>
    <div class="xa-input-bar">
      <input class="xa-input" id="xiaoanInput" placeholder="输入问题，分析教学质量数据..." onkeydown="if(event.key==='Enter')sendXiaoanMsg()">
      <button class="xa-mic-btn" id="xiaoanMic" onclick="xiaoanVoice()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="rgba(0,0,0,.45)"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm-1-9c0-.55.45-1 1-1s1 .45 1 1v6c0 .55-.45 1-1 1s-1-.45-1-1V5zm6 6c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/></svg>
      </button>
      <button class="xa-send-btn" onclick="sendXiaoanMsg()">
        <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
      </button>
    </div>
  </div>
</div>

<!-- Chart Info Modal -->
<div class="chart-info-overlay" id="chartInfoOverlay" onclick="if(event.target===this)closeChartInfo()">
  <div class="chart-info-modal">

  document.getElementById('chartInfoBody').innerHTML = html;

}

function scoreClass(v) {
  if (v >= 90) return 'score-green';
  if (v >= 75) return 'score-blue';
  if (v >= 60) return 'score-orange';
  return 'score-red';
}

let xiaoanFabDragged = false;
(function() {
  const fab = document.getElementById('xiaoanFab');
  let startX, startY, origX, origY;
  fab.addEventListener('mousedown', function(e) {
    if (e.button !== 0) return;
    xiaoanFabDragged = false;
    startX = e.clientX; startY = e.clientY;
    const rect = fab.getBoundingClientRect();
    origX = rect.left; origY = rect.top;
    fab.style.transition = 'none';
    function onMove(e2) {
      const dx = e2.clientX - startX, dy = e2.clientY - startY;
      if (Math.abs(dx) > 3 || Math.abs(dy) > 3) xiaoanFabDragged = true;
      fab.style.left = (origX + dx) + 'px';
      fab.style.top = (origY + dy) + 'px';
      fab.style.right = 'auto'; fab.style.bottom = 'auto';
    }
    function onUp() {
      document.removeEventListener('mousemove', onMove);
      document.removeEventListener('mouseup', onUp);
      fab.style.transition = '';
    }
    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup', onUp);
  });
})();

  xiaoanHistory.push({ role: 'user', content: userMsg });
  const sysPrompt = '你是"小安"，沈阳客运段职培基地的智能培训分析助手（教学质量分析模块）。基于以下真实教学质量数据回答问题。\n\n' +
    '要求：1.必须基于提供的真实数据 2.包含具体数字 3.分析教师优劣势 4.给出具体建议 5.回答简洁200字以内 6.中文回答\n\n' +
    collectDataContext();
  const msgs = [{ role: 'system', content: sysPrompt }, ...xiaoanHistory.slice(-6)];
  document.getElementById('xaWaveBar').classList.add('active');
  try {
    const resp = await fetch(DEEPSEEK_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + DEEPSEEK_KEY },
      body: JSON.stringify({ model: 'deepseek-chat', messages: msgs, stream: true, max_tokens: 800, temperature: 0.7 })
    });
    if (!resp.ok) throw new Error('API ' + resp.status);
    const reader = resp.body.getReader();
    const decoder = new TextDecoder();
    let full = '';
    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      const chunk = decoder.decode(value, { stream: true });
      for (const line of chunk.split('\n')) {
        const trimmed = line.trim();
        if (!trimmed.startsWith('data: ')) continue;
        const d = trimmed.slice(6);
        if (d === '[DONE]') continue;
        try {
          const p = JSON.parse(d);
          const tk = p.choices?.[0]?.delta?.content;
          if (tk) { full += tk; textEl.textContent = full; document.getElementById('xiaoanChatBody').scrollTop = document.getElementById('xiaoanChatBody').scrollHeight; }
        } catch(e) {}
      }
    }
    xiaoanHistory.push({ role: 'assistant', content: full });
  } catch(err) {
    textEl.textContent = '网络异常，请稍后再试。(' + err.message + ')';
  }
  document.getElementById('xaWaveBar').classList.remove('active');
}

function sendXiaoanMsg() {
  const input = document.getElementById('xiaoanInput');
  const text = input.value.trim();
  if (!text) return;
  input.value = '';
  addUserMsg(text);
  const textEl = addStreamMsg();
  callDeepSeek(text, textEl);
}

function xiaoanVoice() {
  const mic = document.getElementById('xiaoanMic');
  if (mic.classList.contains('recording')) return;
  mic.classList.add('recording');
  setTimeout(() => {
    mic.classList.remove('recording');
    const input = document.getElementById('xiaoanInput');
    input.value = currentTeacherName ? `分析${currentTeacherName}的教学优劣势` : '哪位教师评分最高？分析原因';
    sendXiaoanMsg();
  }, 2000);
}

function updateChips() {
  const container = document.getElementById('xiaoanChips');
  let chips;
  if (currentTeacherName) {
    chips = [
      { label: `分析${currentTeacherName}的优劣势`, q: `详细分析${currentTeacherName}的教学质量各维度优势和不足` },
      { label: '和其他教师对比', q: `${currentTeacherName}和其他教师相比，各维度得分如何？` },
      { label: '提升建议', q: `给${currentTeacherName}生成教学质量提升建议` }
    ];
  } else {
    chips = [
      { label: '谁的评分最高？', q: '教学质量评估中哪位教师总分最高？分析其优势' },
      { label: '哪位教师需要关注？', q: '哪位教师总分最低，需要重点关注和提升？' },
      { label: '各单位对比分析', q: '各单位教师的教学质量评估情况对比分析' }
    ];
  }
  container.innerHTML = chips.map((c, i) =>
    `<div class="xa-chip" data-idx="${i}">${c.label}</div>`
  ).join('');
  container.querySelectorAll('.xa-chip').forEach((el, i) => {
    el.addEventListener('click', () => {
      addUserMsg(chips[i].label);
      const textEl = addStreamMsg();
      callDeepSeek(chips[i].q, textEl);
    });
  });
}

// ===== Init =====
renderOverview();
</script>
