<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1440" />
  <title>教学质量分析 - 沈阳客运职培基地</title>
  <script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif; background: #f0f2f5; min-width: 1440px; color: rgba(0,0,0,.85); }
    .header { background: #fff; padding: 0 24px; height: 56px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #f0f0f0; }
    .breadcrumb { font-size: 14px; color: rgba(0,0,0,.45); }
    .breadcrumb a { color: #1677ff; text-decoration: none; }
    .breadcrumb a:hover { text-decoration: underline; }
    .content { max-width: 1400px; margin: 0 auto; padding: 6px 24px 0; }
    .page-title-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 4px; }
    .page-title { font-size: 16px; font-weight: 600; color: rgba(0,0,0,.85); }
    .card { background: #fff; border-radius: 8px; padding: 8px 12px; margin-bottom: 8px; box-shadow: 0 1px 2px rgba(0,0,0,.03); border: 1px solid #f0f0f0; }
    .card-title { font-size: 14px; font-weight: 600; margin-bottom: 6px; color: rgba(0,0,0,.85); display: flex; align-items: center; gap: 8px; }
    .card-title::before { content: ''; display: inline-block; width: 3px; height: 14px; background: #1677ff; border-radius: 2px; }
    .btn { display: inline-flex; align-items: center; padding: 5px 14px; border-radius: 6px; font-size: 13px; cursor: pointer; border: 1px solid #d9d9d9; background: #fff; color: rgba(0,0,0,.85); transition: all .2s; gap: 6px; }
    .btn:hover { border-color: #1677ff; color: #1677ff; }
    .btn-primary { background: #1677ff; color: #fff; border-color: #1677ff; }
    .btn-primary:hover { background: #4096ff; border-color: #4096ff; color: #fff; }
    .btn-sm { padding: 3px 10px; font-size: 13px; }
    .form-select { padding: 5px 10px; border: 1px solid #d9d9d9; border-radius: 6px; font-size: 13px; background: #fff; color: rgba(0,0,0,.85); min-width: 130px; }
    .form-select:focus { outline: none; border-color: #1677ff; box-shadow: 0 0 0 2px rgba(22,119,255,.1); }
    .form-input { padding: 5px 10px; border: 1px solid #d9d9d9; border-radius: 6px; font-size: 13px; background: #fff; min-width: 180px; }
    .form-input:focus { outline: none; border-color: #1677ff; box-shadow: 0 0 0 2px rgba(22,119,255,.1); }
    .tag { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 12px; }
    .tag-green { background: #f6ffed; color: #52c41a; border: 1px solid #b7eb8f; }
    .tag-blue { background: #e6f7ff; color: #1677ff; border: 1px solid #91d5ff; }
    .tag-orange { background: #fff7e6; color: #fa8c16; border: 1px solid #ffd591; }
    .tag-red { background: #fff2f0; color: #ff4d4f; border: 1px solid #ffccc7; }
    .tag-purple { background: #f9f0ff; color: #722ed1; border: 1px solid #d3adf7; }

    .filter-bar { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }

    /* Tabs */
    .tab-bar { display: flex; gap: 0; margin-bottom: 6px; border-bottom: 2px solid #f0f0f0; }
    .tab-item { padding: 5px 20px; font-size: 13px; font-weight: 500; color: rgba(0,0,0,.45); cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -2px; transition: all .2s; user-select: none; }
    .tab-item:hover { color: #1677ff; }
    .tab-item.active { color: #1677ff; border-bottom-color: #1677ff; font-weight: 600; }
    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    /* Teacher Card Grid */
    .teacher-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
    .teacher-card { background: #fff; border-radius: 8px; border: 1px solid #f0f0f0; padding: 8px 10px; cursor: pointer; transition: all .25s; position: relative; overflow: hidden; }
    .teacher-card:hover { border-color: #1677ff; box-shadow: 0 4px 12px rgba(22,119,255,.12); transform: translateY(-1px); }
    .teacher-card-top { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
    .avatar { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 700; color: #fff; flex-shrink: 0; }
    .teacher-info { flex: 1; }
    .teacher-name { font-size: 13px; font-weight: 600; color: rgba(0,0,0,.85); margin-bottom: 0; }
    .teacher-meta { font-size: 11px; color: rgba(0,0,0,.45); }
    .teacher-card-mid { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
    .mini-radar { width: 80px; height: 58px; flex-shrink: 0; }
    .score-block { text-align: center; flex: 1; }
    .score-number { font-size: 22px; font-weight: 700; color: #1677ff; line-height: 1.1; }
    .score-label { font-size: 11px; color: rgba(0,0,0,.45); margin-top: 1px; }
    .teacher-card-bottom { display: flex; align-items: center; justify-content: space-between; padding-top: 2px; }
    .view-detail-btn { padding: 2px 10px; border-radius: 6px; font-size: 11px; cursor: pointer; border: 1px solid #1677ff; background: #fff; color: #1677ff; transition: all .2s; }
    .view-detail-btn:hover { background: #1677ff; color: #fff; }

    /* Detail Page */
    .detail-layout { display: grid; grid-template-columns: 280px 1fr 360px; gap: 16px; }
    .back-btn { display: inline-flex; align-items: center; gap: 6px; font-size: 14px; color: #1677ff; cursor: pointer; margin-bottom: 12px; padding: 4px 0; }
    .back-btn:hover { text-decoration: underline; }
    .profile-card { text-align: center; }
    .profile-avatar { width: 80px; height: 80px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 32px; font-weight: 700; color: #fff; margin: 0 auto 12px; border: 3px solid #e6f0ff; }
    .profile-name { font-size: 18px; font-weight: 600; margin-bottom: 4px; }
    .profile-id { font-size: 13px; color: rgba(0,0,0,.45); margin-bottom: 16px; }
    .info-list { list-style: none; text-align: left; }
    .info-list li { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #f5f5f5; font-size: 14px; }
    .info-list li .lbl { color: rgba(0,0,0,.45); }
    .info-list li .val { color: rgba(0,0,0,.85); font-weight: 500; }
    .big-score { text-align: center; padding: 12px 0; }
    .big-score .number { font-size: 48px; font-weight: 700; color: #1677ff; }
    .big-score .rank { font-size: 14px; color: rgba(0,0,0,.45); margin-top: 4px; }
    .big-score .level { display: inline-block; margin-top: 8px; padding: 4px 16px; border-radius: 20px; font-size: 14px; }
    .level-excellent { background: #f6ffed; color: #52c41a; border: 1px solid #b7eb8f; }
    .level-good { background: #e6f7ff; color: #1677ff; border: 1px solid #91d5ff; }
    .level-pass { background: #fff7e6; color: #fa8c16; border: 1px solid #ffd591; }

    .dim-card { margin-bottom: 12px; }
    .dim-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
    .dim-title { font-size: 14px; font-weight: 600; color: rgba(0,0,0,.85); }
    .dim-weight { font-size: 12px; color: rgba(0,0,0,.45); }
    .dim-stat { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; font-size: 14px; }
    .dim-stat .ds-label { color: rgba(0,0,0,.45); min-width: 120px; }
    .dim-stat .ds-value { font-weight: 600; color: rgba(0,0,0,.85); }
    .progress-bar { height: 8px; background: #f0f0f0; border-radius: 4px; flex: 1; overflow: hidden; }
    .progress-fill { height: 100%; border-radius: 4px; background: #1677ff; }
    .review-item { padding: 10px 12px; background: #fafafa; border-radius: 6px; margin-bottom: 8px; font-size: 13px; color: rgba(0,0,0,.65); border-left: 3px solid #1677ff; }
    .review-item .ri-score { color: #fa8c16; font-weight: 600; }
    .research-table { width: 100%; font-size: 13px; border-collapse: collapse; }
    .research-table th { background: #fafafa; padding: 8px 10px; text-align: left; font-weight: 600; border-bottom: 1px solid #f0f0f0; }
    .research-table td { padding: 8px 10px; border-bottom: 1px solid #f0f0f0; }

    /* Overview Section */
    .overview-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 8px; }
    .overview-kpi { text-align: center; padding: 6px 6px; }
    .kpi-value { font-size: 20px; font-weight: 700; color: #1677ff; line-height: 1.1; }
    .kpi-label { font-size: 11px; color: rgba(0,0,0,.45); margin-top: 2px; }
    .kpi-trend { font-size: 11px; margin-top: 1px; }
    .kpi-trend.up { color: #52c41a; }
    .kpi-trend.down { color: #ff4d4f; }
    .charts-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 0; }
    .chart-box { height: 180px; }
    .section-title { font-size: 13px; font-weight: 600; margin-bottom: 4px; color: rgba(0,0,0,.85); display: flex; align-items: center; gap: 8px; }
    .section-title::before { content: ''; display: inline-block; width: 3px; height: 14px; background: #1677ff; border-radius: 2px; }

    /* Weight Modal */
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.45); z-index: 1000; display: flex; align-items: center; justify-content: center; opacity: 0; pointer-events: none; transition: opacity .25s; }
    .modal-overlay.open { opacity: 1; pointer-events: all; }
    .modal { background: #fff; border-radius: 12px; width: 480px; padding: 24px; box-shadow: 0 8px 24px rgba(0,0,0,.15); }
    .modal-title { font-size: 16px; font-weight: 600; margin-bottom: 20px; }
    .weight-row { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; }
    .weight-label { width: 80px; font-size: 14px; color: rgba(0,0,0,.65); }
    .weight-slider { flex: 1; -webkit-appearance: none; height: 6px; border-radius: 3px; background: #f0f0f0; outline: none; }
    .weight-slider::-webkit-slider-thumb { -webkit-appearance: none; width: 18px; height: 18px; border-radius: 50%; background: #1677ff; cursor: pointer; border: 2px solid #fff; box-shadow: 0 1px 4px rgba(0,0,0,.2); }
    .weight-value { width: 50px; text-align: right; font-size: 14px; font-weight: 600; color: #1677ff; }
    .weight-total { text-align: center; font-size: 14px; margin: 12px 0; padding: 8px; border-radius: 6px; }
    .weight-total.ok { background: #f6ffed; color: #52c41a; }
    .weight-total.err { background: #fff2f0; color: #ff4d4f; }
    .modal-actions { display: flex; justify-content: flex-end; gap: 10px; margin-top: 16px; }

    /* Xiaoan FAB */
    .xiaoan-fab {
      position: fixed; bottom: 28px; right: 28px; z-index: 900;
      cursor: grab; user-select: none;
    }
    .xiaoan-fab:active { cursor: grabbing; }
    .xiaoan-fab-inner {
      width: 72px; height: 72px; border-radius: 50%; overflow: hidden;
      position: relative; background: #f0f5ff;
      box-shadow: 0 4px 16px rgba(22,119,255,0.15);
      transition: transform .2s;
      animation: xiaoanBreathe 3s ease-in-out infinite;
    }
    .xiaoan-fab:hover .xiaoan-fab-inner { transform: scale(1.06); }
    .xiaoan-fab-inner img { width: 100%; height: 100%; object-fit: cover; object-position: center top; }
    @keyframes xiaoanBreathe {
      0%, 100% { box-shadow: 0 4px 16px rgba(22,119,255,0.15); }
      50% { box-shadow: 0 4px 24px rgba(22,119,255,0.35), 0 0 0 4px rgba(22,119,255,0.08); }
    }
    .xiaoan-label { text-align: center; margin-top: 6px; font-size: 12px; color: #1677ff; font-weight: 500; }

    /* Xiaoan Panel Overlay */
    .xiaoan-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.35); z-index: 950; opacity: 0; pointer-events: none; transition: opacity .3s; }
    .xiaoan-overlay.open { opacity: 1; pointer-events: all; }

    /* Xiaoan Panel Wrapper */
    .xiaoan-wrapper {
      position: fixed; bottom: 40px; right: 28px; z-index: 960;
      display: flex; align-items: flex-end; gap: 0;
      transform: translateY(30px) scale(.95); opacity: 0; pointer-events: none;
      transition: all .35s cubic-bezier(.4,0,.2,1);
    }
    .xiaoan-wrapper.open { transform: translateY(0) scale(1); opacity: 1; pointer-events: all; }

    /* Left half-body image */
    .xiaoan-avatar-side {
      width: 160px; flex-shrink: 0; align-self: flex-end;
      pointer-events: none; position: relative; z-index: 1;
      margin-right: -20px; margin-bottom: -4px;
    }
    .xiaoan-avatar-side img { width: 100%; display: block; filter: drop-shadow(2px 2px 8px rgba(0,0,0,.10)); }

    /* Right panel */
    .xiaoan-panel {
      width: 560px; background: #fff; border-radius: 16px;
      box-shadow: 0 12px 40px rgba(0,0,0,.12); overflow: hidden;
      display: flex; flex-direction: column; max-height: 720px; position: relative; z-index: 2;
    }
    .xiaoan-panel-header {
      padding: 16px 20px; background: #fff; border-bottom: 1px solid #f0f0f0;
      display: flex; align-items: center; gap: 12px; cursor: grab; user-select: none;
    }
    .xiaoan-panel-header:active { cursor: grabbing; }
    .xiaoan-panel-header .xa-dot { width: 8px; height: 8px; border-radius: 50%; background: #52c41a; flex-shrink: 0; }
    .xiaoan-panel-header .xa-info { flex: 1; }
    .xiaoan-panel-header .xa-name { font-size: 15px; font-weight: 600; color: rgba(0,0,0,.85); }
    .xiaoan-panel-header .xa-sub { font-size: 12px; color: rgba(0,0,0,.45); }
    .xiaoan-panel-close {
      width: 28px; height: 28px; border-radius: 50%; background: #f5f5f5; border: none;
      color: rgba(0,0,0,.45); font-size: 18px; cursor: pointer;
      display: flex; align-items: center; justify-content: center; transition: all .2s;
    }
    .xiaoan-panel-close:hover { background: #ffe6e6; color: #ff4d4f; }

    /* Sound wave bar */
    .xa-wave-bar { display: flex; gap: 2px; align-items: flex-end; height: 16px; margin-left: 8px; }
    .xa-wave-bar.active .xa-wave-line { animation: xaWave .6s ease-in-out infinite alternate; }
    .xa-wave-line { width: 2px; background: #1677ff; border-radius: 1px; height: 4px; }
    .xa-wave-line:nth-child(1) { animation-delay: 0s; }
    .xa-wave-line:nth-child(2) { animation-delay: .1s; }
    .xa-wave-line:nth-child(3) { animation-delay: .2s; }
    .xa-wave-line:nth-child(4) { animation-delay: .15s; }
    .xa-wave-line:nth-child(5) { animation-delay: .05s; }
    @keyframes xaWave {
      0% { height: 4px; }
      100% { height: 16px; }
    }

    /* Chat body */
    .xiaoan-chat-body {
      flex: 1; overflow-y: auto; padding: 16px 20px; min-height: 280px; max-height: 420px;
      display: flex; flex-direction: column; gap: 12px;
    }

    /* Message bubbles */
    .xa-msg { max-width: 100%; animation: xaMsgIn .3s ease; }
    @keyframes xaMsgIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    .xa-msg-system {
      background: #fff; border: 1px solid #f0f0f0; border-left: 3px solid #1677ff;
      border-radius: 0 10px 10px 0; padding: 12px 16px;
      font-size: 13px; color: rgba(0,0,0,.75); line-height: 1.7;
    }
    .xa-msg-system .xa-highlight { color: #1677ff; font-weight: 600; }
    .xa-msg-user {
      background: #1677ff; color: #fff; border-radius: 10px 0 10px 10px;
      padding: 10px 16px; font-size: 13px; line-height: 1.6;
      align-self: flex-end; max-width: 85%;
    }
    .xa-msg-chart { width: 100%; height: 200px; margin-top: 8px; border-radius: 8px; background: #fafafa; }
    .xa-typing-cursor { display: inline-block; width: 2px; height: 14px; background: #1677ff; margin-left: 2px; vertical-align: middle; animation: xaBlink 1s step-end infinite; }
    @keyframes xaBlink { 50% { opacity: 0; } }

    /* Quick action chips */
    .xa-chips { display: flex; flex-wrap: wrap; gap: 8px; padding: 10px 20px; border-top: 1px solid #f5f5f5; }
    .xa-chip {
      padding: 6px 14px; border-radius: 16px; font-size: 12px;
      background: #f0f5ff; color: #1677ff; border: 1px solid #d6e4ff;
      cursor: pointer; transition: all .2s; white-space: nowrap;
    }
    .xa-chip:hover { background: #1677ff; color: #fff; border-color: #1677ff; }

    /* Input bar */
    .xa-input-bar {
      display: flex; align-items: center; gap: 8px; padding: 12px 16px;
      border-top: 1px solid #f0f0f0; background: #fff;
    }
    .xa-input {
      flex: 1; padding: 8px 12px; border: 1px solid #d9d9d9; border-radius: 20px;
      font-size: 13px; outline: none; background: #fafafa; transition: all .2s;
    }
    .xa-input:focus { border-color: #1677ff; background: #fff; box-shadow: 0 0 0 2px rgba(22,119,255,.1); }
    .xa-mic-btn {
      width: 36px; height: 36px; border-radius: 50%; border: 1px solid #d9d9d9;
      background: #fff; cursor: pointer; display: flex; align-items: center; justify-content: center;
      transition: all .2s; flex-shrink: 0;
    }
    .xa-mic-btn:hover { border-color: #1677ff; color: #1677ff; }
    .xa-mic-btn.recording { background: #ff4d4f; border-color: #ff4d4f; }
    .xa-mic-btn.recording svg { fill: #fff; }
    .xa-send-btn {
      width: 36px; height: 36px; border-radius: 50%; border: none;
      background: #1677ff; cursor: pointer; display: flex; align-items: center;
      justify-content: center; transition: all .2s; flex-shrink: 0;
    }
    .xa-send-btn:hover { background: #4096ff; }
    .xa-send-btn svg { fill: #fff; width: 16px; height: 16px; }

    .hidden { display: none !important; }
  </style>
</head>
<body>

<!-- Header -->
<div class="header">
  <div class="breadcrumb">
    <a href="#">首页</a> / <a href="#">实训技能评价分析</a> / 教学质量分析
  </div>
</div>

<!-- List View -->
<div class="content" id="listView">
  <div class="page-title-row">
    <div class="page-title">教学质量分析</div>
    <button class="btn" onclick="openWeightModal()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 3v18M3 12h18"/><circle cx="12" cy="6" r="2"/><circle cx="6" cy="12" r="2"/><circle cx="18" cy="12" r="2"/><circle cx="12" cy="18" r="2"/></svg>
      权重配置
    </button>
  </div>

  <!-- Filter Bar -->
  <div class="card" style="padding: 6px 12px; margin-bottom: 6px;">
    <div class="filter-bar" style="margin-bottom:0;">
      <input class="form-input" id="searchName" placeholder="搜索教师姓名..." oninput="filterTeachers()">
      <select class="form-select" id="filterDept" onchange="filterTeachers()">
        <option value="">全部部门</option>
        <option value="客运一车间">客运一车间</option>
        <option value="客运二车间">客运二车间</option>
        <option value="安全科">安全科</option>
        <option value="培训中心">培训中心</option>
      </select>
      <select class="form-select" id="filterPost" onchange="filterTeachers()">
        <option value="">全部岗位</option>
        <option value="高级讲师">高级讲师</option>
        <option value="讲师">讲师</option>
        <option value="助理讲师">助理讲师</option>
        <option value="实训指导员">实训指导员</option>
      </select>
    </div>
  </div>

  <!-- Tabs -->
  <div class="tab-bar">
    <div class="tab-item active" onclick="switchTab('overview')">整体概览</div>
    <div class="tab-item" onclick="switchTab('teachers')">教师分析</div>
  </div>

  <!-- Tab 1: Overview -->
  <div class="tab-panel active" id="tabOverview">
    <div class="overview-grid" id="overviewKpis"></div>
    <div class="charts-row" style="margin-bottom: 8px;">
      <div class="card" style="margin-bottom:0;">
        <div class="section-title">四维能力全站均值</div>
        <div class="chart-box" id="chartDimAvg"></div>
      </div>
      <div class="card" style="margin-bottom:0;">
        <div class="section-title">部门教学质量对比</div>
        <div class="chart-box" id="chartDeptCompare"></div>
      </div>
    </div>
    <div class="charts-row">
      <div class="card" style="margin-bottom:0;">
        <div class="section-title">教师综合评分分布</div>
        <div class="chart-box" id="chartScoreDist"></div>
      </div>
      <div class="card" style="margin-bottom:0;">
        <div class="section-title">全站教学质量趋势</div>
        <div class="chart-box" id="chartTrend"></div>
      </div>
    </div>
  </div>

  <!-- Tab 2: Teacher Grid -->
  <div class="tab-panel" id="tabTeachers">
    <div style="margin-bottom:4px;">
      <div class="section-title">教师个人分析 <span style="font-size:11px;font-weight:400;color:rgba(0,0,0,.45);margin-left:8px;">点击卡片查看详情</span></div>
    </div>
    <div class="teacher-grid" id="teacherGrid"></div>
  </div>
</div>

<!-- Detail View -->
<div class="content hidden" id="detailView">
  <div class="back-btn" onclick="showList()">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#1677ff" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
    返回教师列表
  </div>
  <div class="detail-layout" id="detailContent"></div>
</div>

<!-- Weight Modal -->
<div class="modal-overlay" id="weightModal">

let weights = { teach: 40, feedback: 25, profess: 20, research: 15 };
let currentTeacher = null;

function calcScore(t) {
  return +(t.dims.teach * weights.teach / 100 + t.dims.feedback * weights.feedback / 100 + t.dims.profess * weights.profess / 100 + t.dims.research * weights.research / 100).toFixed(1);
}

function getLevel(score) {
  if (score >= 85) return { text: '优秀', cls: 'tag-green', lcls: 'level-excellent' };
  if (score >= 70) return { text: '良好', cls: 'tag-blue', lcls: 'level-good' };
  return { text: '合格', cls: 'tag-orange', lcls: 'level-pass' };
}

function getRank(t) {
  const scores = teachers.map(x => calcScore(x)).sort((a,b) => b - a);
  return scores.indexOf(calcScore(t)) + 1;
}

// ===== Render List =====
function renderList() {
  const grid = document.getElementById('teacherGrid');
  const search = document.getElementById('searchName').value.trim().toLowerCase();
  const dept = document.getElementById('filterDept').value;
  const post = document.getElementById('filterPost').value;

  let filtered = teachers.filter(t => {
    if (search && !t.name.toLowerCase().includes(search)) return false;
    if (dept && t.dept !== dept) return false;
    if (post && t.post !== post) return false;
    return true;
  });

  grid.innerHTML = filtered.map(t => {
    const score = calcScore(t);
    const level = getLevel(score);
    return `
      <div class="teacher-card" onclick="showDetail('${t.id}')">
        <div class="teacher-card-top">
          <div class="avatar" style="background:${t.avatar}">${t.name[0]}</div>
          <div class="teacher-info">
            <div class="teacher-name">${t.name}</div>
            <div class="teacher-meta">${t.id} | ${t.dept} | ${t.post}</div>
          </div>
        </div>
        <div class="teacher-card-mid">
          <div class="mini-radar" id="mini-${t.id}"></div>
          <div class="score-block">
            <div class="score-number">${score}</div>
            <div class="score-label">综合评分</div>
          </div>
          <span class="tag ${level.cls}">${level.text}</span>
        </div>
        <div class="teacher-card-bottom">
          <span style="font-size:11px;color:rgba(0,0,0,.45);">入职${t.years}年 | 本期${t.courses}门课</span>
          <button class="view-detail-btn" onclick="event.stopPropagation();showDetail('${t.id}')">查看详情</button>
        </div>
      </div>`;
  }).join('');

  // Render mini radars
  filtered.forEach(t => {
    const el = document.getElementById('mini-' + t.id);
    if (!el) return;
    const chart = echarts.init(el);
    chart.setOption({
      radar: {
        indicator: [
          { name: '', max: 100 }, { name: '', max: 100 },
          { name: '', max: 100 }, { name: '', max: 100 }
        ],
        radius: '70%', center: ['50%','50%'],
        axisLine: { lineStyle: { color: 'rgba(0,0,0,.08)' } },
        splitLine: { lineStyle: { color: 'rgba(0,0,0,.06)' } },
        splitArea: { show: false }
      },
      series: [{ type: 'radar', symbol: 'none', lineStyle: { width: 2, color: '#1677ff' },
        areaStyle: { color: 'rgba(22,119,255,.15)' },
        data: [{ value: [t.dims.teach, t.dims.feedback, t.dims.profess, t.dims.research] }]
      }]
    });
  });
}

(function() {

    function onUp() {
      document.removeEventListener('mousemove', onMove);
      document.removeEventListener('mouseup', onUp);
      fab.style.transition = '';
    }
    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup', onUp);
  });
})();

async function callDeepSeek243(userMsg, textEl) {
  xiaoanHistory243.push({ role: 'user', content: userMsg });
  const sysPrompt = '你是"小安"，沈阳客运段职培基地的智能培训分析助手（教学质量分析模块）。你基于以下真实教学质量数据回答问题。\n\n' +
    '要求：1.必须基于提供的真实数据，不要编造 2.包含具体数字和百分比 3.分析教师优劣势和发展趋势 4.给出具体可操作的建议 5.回答简洁，200字以内 6.中文回答\n\n' +
    xiaoan243CollectData();
  const msgs = [{ role: 'system', content: sysPrompt }, ...xiaoanHistory243.slice(-6)];
  try {
    const resp = await fetch(DEEPSEEK_URL_243, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + DEEPSEEK_KEY_243 },
      body: JSON.stringify({ model: 'deepseek-chat', messages: msgs, stream: true, max_tokens: 800, temperature: 0.7 })
    });
    if (!resp.ok) throw new Error('API ' + resp.status);
    const reader = resp.body.getReader();
    const decoder = new TextDecoder();
    let full = '';
    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      const chunk = decoder.decode(value, { stream: true });
      for (const line of chunk.split('\n')) {
        const trimmed = line.trim();
        if (!trimmed.startsWith('data: ')) continue;
        const d = trimmed.slice(6);
        if (d === '[DONE]') continue;
        try {
          const p = JSON.parse(d);
          const tk = p.choices?.[0]?.delta?.content;
          if (tk) { full += tk; textEl.textContent = full; document.getElementById('xiaoanChatBody').scrollTop = document.getElementById('xiaoanChatBody').scrollHeight; }
        } catch(e) {}
      }
    }
    xiaoanHistory243.push({ role: 'assistant', content: full });
  } catch(err) {
    textEl.textContent = '网络异常，请稍后再试。(' + err.message + ')';
  }
}

const analysisHandlers = {
  best: function() {
    const sorted = [...teachers].sort((a,b) => calcScore(b) - calcScore(a));
    const top3 = sorted.slice(0, 3);
    let text = '根据当前数据，<span class="xa-highlight">教学效果综合评分前三</span>的教师：<br>';
    top3.forEach((t, i) => {
      const s = calcScore(t);

    });
    const avg = +(teachers.reduce((s,t) => s + calcScore(t), 0) / teachers.length).toFixed(1);
    text += `<br>全站平均分 ${avg} 分，${top3[0].name}老师以 ${calcScore(top3[0])} 分领先。`;

    const chart = {
      tooltip: { trigger: 'axis' },

      series: [{ type: 'bar', data: sorted.map(t => calcScore(t)).reverse(),
        itemStyle: { color: function(p) { return p.dataIndex >= sorted.length - 3 ? '#1677ff' : '#d9d9d9'; }, borderRadius: [0,4,4,0] },
        label: { show: true, position: 'right', fontSize: 11 }
      }]
    };
    return { text, chart };
  },

  attention: function() {
    const needAtt = teachers.filter(t => {
      const s = calcScore(t);
      const trend = t.trends;
      const declining = trend[4] < trend[2]; // latest < mid
      return s < 80 || declining;
    }).sort((a,b) => calcScore(a) - calcScore(b));

    let text = '根据当前数据，以下教师<span class="xa-highlight">需要重点关注</span>：<br>';
    if (needAtt.length === 0) {
      text = '根据当前数据，所有教师综合评分均在80分以上且趋势向好，暂无需要特别关注的教师。';
      return { text };
    }
    needAtt.forEach(t => {
      const s = calcScore(t);
      const trend = t.trends;
      const dir = trend[4] > trend[0] ? '上升' : trend[4] < trend[0] ? '下降' : '持平';
      const dims = [
        { name: '教学效果', val: t.dims.teach },
        { name: '学员反馈', val: t.dims.feedback },
        { name: '职业素养', val: t.dims.profess },
        { name: '教研成果', val: t.dims.research }
      ];

      text += `<span class="xa-highlight">${t.name}</span>（${t.dept}）：${s}分，趋势${dir}，最弱项为${weakest.name}（${weakest.val}分）<br>`;
    });
    return { text };
  },

  dept: function() {
    const depts = {};
    teachers.forEach(t => {
      if (!depts[t.dept]) depts[t.dept] = [];
      depts[t.dept].push(t);
    });
    let text = '根据当前数据，各<span class="xa-highlight">部门教学质量概况</span>：<br>';
    const deptNames = Object.keys(depts);
    const deptAvgs = deptNames.map(d => {
      const avg = +(depts[d].reduce((s,t) => s + calcScore(t), 0) / depts[d].length).toFixed(1);
      const best = depts[d].sort((a,b) => calcScore(b) - calcScore(a))[0];
      text += `<span class="xa-highlight">${d}</span>：${depts[d].length}人，均分 ${avg}，标杆 ${best.name}（${calcScore(best)}分）<br>`;
      return avg;
    });
    const topDept = deptNames[deptAvgs.indexOf(Math.max(...deptAvgs))];
    text += `<br><span class="xa-highlight">${topDept}</span>整体教学质量最优。`;

    const chart = {
      tooltip: { trigger: 'axis' },
      grid: { top: 20, right: 20, bottom: 30, left: 80 },
      xAxis: { type: 'value', min: 60, max: 100 },
      yAxis: { type: 'category', data: deptNames },
      series: [{ type: 'bar', data: deptAvgs,
        itemStyle: { color: '#1677ff', borderRadius: [0,4,4,0] },
        label: { show: true, position: 'right', fontSize: 11 }
      }]
    };
    return { text, chart };
  },

  strengths: function() {
    const t = currentTeacher;
    if (!t) return { text: '请先进入教师详情页再使用此功能。' };
    const score = calcScore(t);
    const dims = [
      { name: '教学效果', val: t.dims.teach, key: 'teach' },
      { name: '学员反馈', val: t.dims.feedback, key: 'feedback' },
      { name: '职业素养', val: t.dims.profess, key: 'profess' },
      { name: '教研成果', val: t.dims.research, key: 'research' }
    ];
    const sorted = [...dims].sort((a,b) => b.val - a.val);
    // Compute avg across all teachers per dimension
    const avgDims = {};
    dims.forEach(d => {
      avgDims[d.key] = +(teachers.reduce((s,x) => s + x.dims[d.key], 0) / teachers.length).toFixed(1);
    });

    let text = `根据当前数据，<span class="xa-highlight">${t.name}</span>老师四维分析：<br>`;
    sorted.forEach(d => {
      const diff = (d.val - avgDims[d.key]).toFixed(1);
      const dir = diff > 0 ? `高于均值${diff}分` : `低于均值${Math.abs(diff)}分`;
      text += `${d.name}：<span class="xa-highlight">${d.val}分</span>（全站均值${avgDims[d.key]}，${dir}）<br>`;
    });
    text += `<br>优势领域：<span class="xa-highlight">${sorted[0].name}</span>；提升空间：<span class="xa-highlight">${sorted[3].name}</span>。`;

    const chart = {
      tooltip: {},
      radar: {
        indicator: dims.map(d => ({ name: d.name, max: 100 })),
        radius: '60%',
        axisName: { color: 'rgba(0,0,0,.65)', fontSize: 11 },
        splitArea: { areaStyle: { color: ['rgba(22,119,255,.02)','rgba(22,119,255,.05)'] } }
      },
      series: [{
        type: 'radar',
        data: [
          { value: dims.map(d => d.val), name: t.name, lineStyle: { color: '#1677ff', width: 2 }, areaStyle: { color: 'rgba(22,119,255,.2)' }, itemStyle: { color: '#1677ff' } },
          { value: dims.map(d => avgDims[d.key]), name: '全站均值', lineStyle: { color: '#fa8c16', width: 1, type: 'dashed' }, itemStyle: { color: '#fa8c16' } }
        ]
      }],
      legend: { bottom: 0, data: [t.name, '全站均值'], textStyle: { fontSize: 11 } }
    };
    return { text, chart };
  },

  comparison: function() {
    const t = currentTeacher;
    if (!t) return { text: '请先进入教师详情页再使用此功能。' };
    const sameDept = teachers.filter(x => x.dept === t.dept);
    const deptAvg = +(sameDept.reduce((s,x) => s + calcScore(x), 0) / sameDept.length).toFixed(1);
    const allSorted = [...teachers].sort((a,b) => calcScore(b) - calcScore(a));
    const topTeacher = allSorted[0];
    const score = calcScore(t);
    const topScore = calcScore(topTeacher);

    let text = `根据当前数据，<span class="xa-highlight">${t.name}</span>与其他教师对比：<br>`;
    text += `综合评分 <span class="xa-highlight">${score}</span> 分，排名第 ${getRank(t)}/${teachers.length}<br>`;
    text += `部门（${t.dept}）均分：${deptAvg}，${score > deptAvg ? '高于' : '低于'}均值 ${Math.abs(score - deptAvg).toFixed(1)} 分<br>`;
    text += `全站标杆 ${topTeacher.name}：${topScore} 分`;
    if (t.id !== topTeacher.id) {
      text += `，差距 ${(topScore - score).toFixed(1)} 分`;
    }

    const dimNames = ['教学效果','学员反馈','职业素养','教研成果'];
    const dimKeys = ['teach','feedback','profess','research'];
    const chart = {
      tooltip: { trigger: 'axis' },
      legend: { bottom: 0, data: [t.name, '部门均值', topTeacher.name], textStyle: { fontSize: 11 } },
      grid: { top: 10, right: 20, bottom: 40, left: 60 },
      xAxis: { type: 'category', data: dimNames, axisLabel: { fontSize: 11 } },
      yAxis: { type: 'value', min: 40, max: 100 },
      series: [
        { name: t.name, type: 'bar', data: dimKeys.map(k => t.dims[k]), itemStyle: { color: '#1677ff' }, barGap: '10%' },
        { name: '部门均值', type: 'bar', data: dimKeys.map(k => +(sameDept.reduce((s,x) => s + x.dims[k], 0) / sameDept.length).toFixed(1)), itemStyle: { color: '#52c41a' } },
        { name: topTeacher.name, type: 'bar', data: dimKeys.map(k => topTeacher.dims[k]), itemStyle: { color: '#fa8c16' } }
      ]
    };
    return { text, chart };
  },

  suggestion: function() {
    const t = currentTeacher;
    if (!t) return { text: '请先进入教师详情页再使用此功能。' };
    const score = calcScore(t);
    const dims = [
      { name: '教学效果', val: t.dims.teach, key: 'teach' },
      { name: '学员反馈', val: t.dims.feedback, key: 'feedback' },
      { name: '职业素养', val: t.dims.profess, key: 'profess' },
      { name: '教研成果', val: t.dims.research, key: 'research' }
    ];
    const sorted = [...dims].sort((a,b) => a.val - b.val);

    let text = `根据当前数据，为<span class="xa-highlight">${t.name}</span>老师生成评估建议：<br><br>`;
    text += `<b>综合评价</b>：${score}分（${getLevel(score).text}），全站排名第${getRank(t)}名。<br><br>`;
    text += `<b>重点提升方向</b>：<br>`;

    const suggestions = {
      teach: `教学效果（${t.dims.teach}分）：建议优化教学设计，加强重难点实操练习，关注学员平均进步幅度，提升考试通过率。`,
      feedback: `学员反馈（${t.dims.feedback}分）：建议增强课堂互动，采用案例教学、小组讨论等方式提升学员参与感和满意度。`,
      profess: `职业素养（${t.dims.profess}分）：建议保持高出勤率，积极参与教研活动，加强职业道德和团队协作意识。`,
      research: `教研成果（${t.dims.research}分）：建议增加论文发表和课题申报，参与教材编写和标准制定，提升学术产出。`
    };

    // Show bottom 2 suggestions
    sorted.slice(0, 2).forEach(d => {
      text += `- ${suggestions[d.key]}<br>`;
    });

    text += `<br><b>保持优势</b>：${sorted[3].name}（${sorted[3].val}分）表现突出，继续保持并发挥示范作用。`;
    return { text };
  },

  trend: function() {
    const t = currentTeacher;
    if (!t) return { text: '请先进入教师详情页再使用此功能。' };
    const trends = t.trends;
    const diff = (trends[4] - trends[0]).toFixed(1);
    const direction = diff > 0 ? '上升' : diff < 0 ? '下降' : '持平';
    const avgGrowth = ((trends[4] - trends[0]) / 4).toFixed(1);

    let text = `根据当前数据，<span class="xa-highlight">${t.name}</span>老师近5期评分趋势分析：<br>`;
    text += `起始分 ${trends[0]} -> 最新分 <span class="xa-highlight">${trends[4]}</span>，整体<span class="xa-highlight">${direction}</span> ${Math.abs(diff)} 分<br>`;
    text += `期均增长 ${avgGrowth} 分/期<br>`;
    if (diff > 5) text += `持续进步明显，教学能力稳步提升。`;
    else if (diff > 0) text += `呈缓慢上升趋势，建议加大提升力度。`;
    else if (diff < 0) text += `<span class="xa-highlight">呈下降趋势，需要重点关注并分析原因。</span>`;
    else text += `评分稳定，可适当设定更高目标。`;

    // Also show overall avg trend for comparison
    const avgTrends = [0,1,2,3,4].map(i => +(teachers.reduce((s,x) => s + x.trends[i], 0) / teachers.length).toFixed(1));

    const chart = {
      tooltip: { trigger: 'axis' },
      legend: { bottom: 0, data: [t.name, '全站均值'], textStyle: { fontSize: 11 } },
      grid: { top: 10, right: 20, bottom: 40, left: 40 },
      xAxis: { type: 'category', data: ['第1期','第2期','第3期','第4期','第5期'], axisLabel: { fontSize: 11 } },
      yAxis: { type: 'value', min: 60, max: 100 },
      series: [
        { name: t.name, type: 'line', data: trends, smooth: true, lineStyle: { color: '#1677ff', width: 2 }, itemStyle: { color: '#1677ff' }, symbol: 'circle', symbolSize: 6, areaStyle: { color: { type: 'linear', x:0,y:0,x2:0,y2:1, colorStops:[{offset:0,color:'rgba(22,119,255,.2)'},{offset:1,color:'rgba(22,119,255,.02)'}] } } },
        { name: '全站均值', type: 'line', data: avgTrends, smooth: true, lineStyle: { color: '#fa8c16', width: 1, type: 'dashed' }, itemStyle: { color: '#fa8c16' }, symbol: 'none' }
      ]
    };
    return { text, chart };
  },

  dimDive: function(dimKey) {
    const t = currentTeacher;
    if (!t) return { text: '请先进入教师详情页再使用此功能。' };
    const dimMap = { teach: '教学效果', feedback: '学员反馈', profess: '职业素养', research: '教研成果' };
    const dimName = dimMap[dimKey] || '教学效果';
    const dimVal = t.dims[dimKey];
    const avg = +(teachers.reduce((s,x) => s + x.dims[dimKey], 0) / teachers.length).toFixed(1);
    const rank = [...teachers].sort((a,b) => b.dims[dimKey] - a.dims[dimKey]).findIndex(x => x.id === t.id) + 1;

    let text = `根据当前数据，<span class="xa-highlight">${t.name}</span>的<span class="xa-highlight">${dimName}</span>维度深度分析：<br>`;
    text += `得分 <span class="xa-highlight">${dimVal}</span> 分，全站排名第 ${rank}/${teachers.length}<br>`;
    text += `全站均值 ${avg} 分，${dimVal > avg ? '高于' : '低于'}均值 ${Math.abs(dimVal - avg).toFixed(1)} 分<br>`;

    if (dimKey === 'teach') {
      text += `<br>考试通过率：${t.passRate}%，学员平均进步：+${t.progress}分`;
    } else if (dimKey === 'feedback') {
      text += `<br>满意度：${t.satisfaction}/5.0，教学态度：${t.attitude}，内容质量：${t.quality}，互动效果：${t.interact}`;
    } else if (dimKey === 'profess') {
      text += `<br>出勤率：${t.attendance}%`;
      t.profItems.forEach(p => { text += `，${p.n}：${p.s}分`; });
    } else if (dimKey === 'research') {
      text += `<br>教研成果${t.researches.length}项：`;
      t.researches.forEach(r => { text += `${r.n}（${r.s}）、`; });
      text = text.replace(/、$/, '');
    }

    // Bar chart: all teachers on this dimension
    const sorted = [...teachers].sort((a,b) => b.dims[dimKey] - a.dims[dimKey]);
    const chart = {
      tooltip: { trigger: 'axis' },
      grid: { top: 10, right: 20, bottom: 30, left: 80 },
      xAxis: { type: 'value', min: 40, max: 100 },
      yAxis: { type: 'category', data: sorted.map(x => x.name).reverse() },
      series: [{ type: 'bar', data: sorted.map(x => x.dims[dimKey]).reverse(),
        itemStyle: { color: function(p) { return sorted[sorted.length - 1 - p.dataIndex].id === t.id ? '#1677ff' : '#d9d9d9'; }, borderRadius: [0,4,4,0] },
        label: { show: true, position: 'right', fontSize: 11 }
      }]
    };
    return { text, chart };
  }
};

// ===== Overview Charts =====
let overviewCharts = [];
function renderOverview() {
  overviewCharts.forEach(c => { try { c.dispose(); } catch(e){} });
  overviewCharts = [];

  const scores = teachers.map(t => ({ name: t.name, score: calcScore(t) }));
  const avgScore = +(scores.reduce((s,x) => s + x.score, 0) / scores.length).toFixed(1);
  const excellent = scores.filter(x => x.score >= 85).length;
  const avgPassRate = +(teachers.reduce((s,t) => s + t.passRate, 0) / teachers.length).toFixed(1);
  const avgSatisfaction = +(teachers.reduce((s,t) => s + t.satisfaction, 0) / teachers.length).toFixed(1);

  // KPI cards
  document.getElementById('overviewKpis').innerHTML = [
    { label: '教师总数', value: teachers.length, unit: '人', trend: '', up: true },
    { label: '平均综合评分', value: avgScore, unit: '分', trend: '+2.3 较上期', up: true },
    { label: '优秀教师占比', value: Math.round(excellent / teachers.length * 100), unit: '%', trend: excellent + '/' + teachers.length + ' 达优秀', up: true },
    { label: '平均学员满意度', value: avgSatisfaction, unit: '', trend: avgPassRate + '% 平均通过率', up: true },
  ].map(k => `<div class="card overview-kpi">
    <div class="kpi-value">${k.value}<span style="font-size:13px;font-weight:400;color:rgba(0,0,0,.45);margin-left:3px">${k.unit}</span></div>
    <div class="kpi-label">${k.label}</div>
    <div class="kpi-trend ${k.up ? 'up' : 'down'}">${k.up ? '&#9650;' : '&#9660;'} ${k.trend}</div>
  </div>`).join('');

  // Chart 1: Four-dimension average radar
  const dimAvg = {
    teach: +(teachers.reduce((s,t) => s + t.dims.teach, 0) / teachers.length).toFixed(1),
    feedback: +(teachers.reduce((s,t) => s + t.dims.feedback, 0) / teachers.length).toFixed(1),
    profess: +(teachers.reduce((s,t) => s + t.dims.profess, 0) / teachers.length).toFixed(1),
    research: +(teachers.reduce((s,t) => s + t.dims.research, 0) / teachers.length).toFixed(1),
  };
  const dimMax = teachers.reduce((m, t) => ({
    teach: Math.max(m.teach, t.dims.teach), feedback: Math.max(m.feedback, t.dims.feedback),
    profess: Math.max(m.profess, t.dims.profess), research: Math.max(m.research, t.dims.research)
  }), { teach: 0, feedback: 0, profess: 0, research: 0 });
  const c1 = echarts.init(document.getElementById('chartDimAvg'));
  c1.setOption({
    radar: { indicator: [
      { name: '教学效果('+weights.teach+'%)', max: 100 }, { name: '学员反馈('+weights.feedback+'%)', max: 100 },
      { name: '职业素养('+weights.profess+'%)', max: 100 }, { name: '教研成果('+weights.research+'%)', max: 100 }
    ], radius: '60%' },
    legend: { bottom: 0, data: ['全站均值','最高水平'] },
    series: [{ type: 'radar', data: [
      { value: [dimAvg.teach, dimAvg.feedback, dimAvg.profess, dimAvg.research], name: '全站均值', areaStyle: { color: 'rgba(22,119,255,.15)' }, lineStyle: { color: '#1677ff' }, itemStyle: { color: '#1677ff' } },
      { value: [dimMax.teach, dimMax.feedback, dimMax.profess, dimMax.research], name: '最高水平', lineStyle: { color: '#52c41a', type: 'dashed' }, itemStyle: { color: '#52c41a' } }
    ] }],
    tooltip: {}
  });
  overviewCharts.push(c1);

  // Chart 2: Department comparison grouped bar
  const depts = [...new Set(teachers.map(t => t.dept))];
  const deptData = depts.map(d => {
    const dt = teachers.filter(t => t.dept === d);
    return {
      name: d, count: dt.length,
      score: +(dt.reduce((s,t) => s + calcScore(t), 0) / dt.length).toFixed(1),
      pass: +(dt.reduce((s,t) => s + t.passRate, 0) / dt.length).toFixed(1)
    };
  });
  const c2 = echarts.init(document.getElementById('chartDeptCompare'));
  c2.setOption({
    tooltip: { trigger: 'axis' },
    legend: { bottom: 0 },
    grid: { left: 50, right: 20, top: 20, bottom: 40 },
    xAxis: { type: 'category', data: deptData.map(d => d.name), axisLabel: { fontSize: 11, color: 'rgba(0,0,0,.65)' } },
    yAxis: [
      { type: 'value', name: '评分', min: 60, axisLabel: { fontSize: 11, color: 'rgba(0,0,0,.45)' }, splitLine: { lineStyle: { color: '#f5f5f5' } } },
      { type: 'value', name: '通过率%', min: 60, max: 100, axisLabel: { fontSize: 11, color: 'rgba(0,0,0,.45)' }, splitLine: { show: false } }
    ],
    series: [
      { name: '综合评分', type: 'bar', data: deptData.map(d => d.score), itemStyle: { color: '#1677ff', borderRadius: [4,4,0,0] }, barMaxWidth: 28 },
      { name: '通过率', type: 'line', yAxisIndex: 1, data: deptData.map(d => d.pass), itemStyle: { color: '#52c41a' }, lineStyle: { color: '#52c41a' }, symbol: 'circle', symbolSize: 6 }
    ]
  });
  overviewCharts.push(c2);

  // Chart 3: Score distribution
  const bins = [
    { range: '<70', min: 0, max: 70 }, { range: '70-75', min: 70, max: 75 },
    { range: '75-80', min: 75, max: 80 }, { range: '80-85', min: 80, max: 85 },
    { range: '85-90', min: 85, max: 90 }, { range: '>=90', min: 90, max: 200 }
  ];
  const binCounts = bins.map(b => scores.filter(s => s.score >= b.min && s.score < b.max).length);
  const c3 = echarts.init(document.getElementById('chartScoreDist'));
  c3.setOption({
    tooltip: { trigger: 'axis', formatter: '{b}: {c} 人' },
    grid: { left: 40, right: 20, top: 20, bottom: 30 },
    xAxis: { type: 'category', data: bins.map(b => b.range), axisLabel: { fontSize: 11, color: 'rgba(0,0,0,.65)' } },
    yAxis: { type: 'value', minInterval: 1, axisLabel: { fontSize: 11, color: 'rgba(0,0,0,.45)' }, splitLine: { lineStyle: { color: '#f5f5f5' } } },
    series: [{ type: 'bar', data: binCounts, itemStyle: {
      color: (p) => ['#ff4d4f','#fa8c16','#faad14','#1677ff','#52c41a','#13c2c2'][p.dataIndex],
      borderRadius: [4,4,0,0]
    }, barMaxWidth: 36, label: { show: true, position: 'top', fontSize: 11, color: 'rgba(0,0,0,.65)' } }]
  });
  overviewCharts.push(c3);

  // Chart 4: Overall trend (average score across periods)
  const periods = ['2025 Q1','2025 Q2','2025 Q3','2025 Q4','2026 Q1'];
  const trendAvg = periods.map((_, i) => {
    const avg = teachers.reduce((s,t) => s + t.trends[i], 0) / teachers.length;
    return +avg.toFixed(1);
  });
  const trendMax = periods.map((_, i) => Math.max(...teachers.map(t => t.trends[i])));
  const trendMin = periods.map((_, i) => Math.min(...teachers.map(t => t.trends[i])));
  const c4 = echarts.init(document.getElementById('chartTrend'));
  c4.setOption({
    tooltip: { trigger: 'axis' },
    legend: { bottom: 0 },
    grid: { left: 45, right: 20, top: 20, bottom: 40 },
    xAxis: { type: 'category', data: periods, axisLabel: { fontSize: 11, color: 'rgba(0,0,0,.65)' } },
    yAxis: { type: 'value', min: 60, axisLabel: { fontSize: 11, color: 'rgba(0,0,0,.45)' }, splitLine: { lineStyle: { color: '#f5f5f5' } } },
    series: [
      { name: '全站均值', type: 'line', data: trendAvg, smooth: true, lineStyle: { color: '#1677ff', width: 3 }, itemStyle: { color: '#1677ff' }, symbol: 'circle', symbolSize: 6,
        areaStyle: { color: { type: 'linear', x:0,y:0,x2:0,y2:1, colorStops: [{offset:0,color:'rgba(22,119,255,.15)'},{offset:1,color:'rgba(22,119,255,.02)'}] } } },
      { name: '最高分', type: 'line', data: trendMax, lineStyle: { color: '#52c41a', type: 'dashed', width: 1 }, itemStyle: { color: '#52c41a' }, symbol: 'none' },
      { name: '最低分', type: 'line', data: trendMin, lineStyle: { color: '#ff4d4f', type: 'dashed', width: 1 }, itemStyle: { color: '#ff4d4f' }, symbol: 'none' }
    ]
  });
  overviewCharts.push(c4);
}

window.addEventListener('resize', function() {
  overviewCharts.forEach(c => { if (c && !c.isDisposed()) c.resize(); });
});

// Init
renderOverview();
</script>
</body>
</html>
