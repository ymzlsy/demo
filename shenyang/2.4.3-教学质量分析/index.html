    .xiaoan-panel-close:hover { background: rgba(255,255,255,.35); }
    .xiaoan-panel-body { padding: 16px 20px; max-height: 420px; overflow-y: auto; }

let weights = { teach: 40, feedback: 25, profess: 20, research: 15 };

function calcScore(t) {
  return +(t.dims.teach * weights.teach / 100 + t.dims.feedback * weights.feedback / 100 + t.dims.profess * weights.profess / 100 + t.dims.research * weights.research / 100).toFixed(1);
}

function getLevel(score) {
  if (score >= 85) return { text: '优秀', cls: 'tag-green', lcls: 'level-excellent' };
  if (score >= 70) return { text: '良好', cls: 'tag-blue', lcls: 'level-good' };
  return { text: '合格', cls: 'tag-orange', lcls: 'level-pass' };
}

function getRank(t) {
  const scores = teachers.map(x => calcScore(x)).sort((a,b) => b - a);
  return scores.indexOf(calcScore(t)) + 1;
}

// ===== Render List =====
function renderList() {
  const grid = document.getElementById('teacherGrid');
  const search = document.getElementById('searchName').value.trim().toLowerCase();
  const dept = document.getElementById('filterDept').value;
  const post = document.getElementById('filterPost').value;

  let filtered = teachers.filter(t => {
    if (search && !t.name.toLowerCase().includes(search)) return false;
    if (dept && t.dept !== dept) return false;
    if (post && t.post !== post) return false;
    return true;
  });

  grid.innerHTML = filtered.map(t => {
    const score = calcScore(t);
    const level = getLevel(score);
    return `
      <div class="teacher-card" onclick="showDetail('${t.id}')">
        <div class="teacher-card-top">
          <div class="avatar" style="background:${t.avatar}">${t.name[0]}</div>

// ===== Weight Modal =====
function openWeightModal() {
  document.getElementById('w1').value = weights.teach;
  document.getElementById('w2').value = weights.feedback;
  document.getElementById('w3').value = weights.profess;
  document.getElementById('w4').value = weights.research;
  updateWeights();
  document.getElementById('weightModal').classList.add('open');
}
function closeWeightModal() { document.getElementById('weightModal').classList.remove('open'); }
function updateWeights() {
  const v1 = +document.getElementById('w1').value;
  const v2 = +document.getElementById('w2').value;
  const v3 = +document.getElementById('w3').value;
  const v4 = +document.getElementById('w4').value;
  document.getElementById('w1v').textContent = v1 + '%';
  document.getElementById('w2v').textContent = v2 + '%';
  document.getElementById('w3v').textContent = v3 + '%';
  document.getElementById('w4v').textContent = v4 + '%';
  const total = v1 + v2 + v3 + v4;
  const totalEl = document.getElementById('weightTotal');
  const saveBtn = document.getElementById('weightSaveBtn');
  if (total === 100) {
    totalEl.className = 'weight-total ok';
    totalEl.textContent = '合计：100%';
    saveBtn.disabled = false;
    saveBtn.style.opacity = '1';
  } else {
    totalEl.className = 'weight-total err';
    totalEl.textContent = `合计：${total}%（需等于100%）`;
    saveBtn.disabled = true;
    saveBtn.style.opacity = '.5';
  }
}
function saveWeights() {
  const v1 = +document.getElementById('w1').value;
  const v2 = +document.getElementById('w2').value;
  const v3 = +document.getElementById('w3').value;
  const v4 = +document.getElementById('w4').value;
  if (v1 + v2 + v3 + v4 !== 100) return;
  weights = { teach: v1, feedback: v2, profess: v3, research: v4 };
  closeWeightModal();
  if (currentTeacher) showDetail(currentTeacher.id);
  else renderList();
}

      </div>
      <div class="xa-item">
        <span class="xa-highlight">${weakest.name}</span>维度得分${weakest.val}分，为当前最短板。
        ${weakest.name === '教研成果' ? '建议增加论文发表、课题申报，参与教材编写。' :
          weakest.name === '学员反馈' ? '建议增强课堂互动，采用案例教学法提升学员参与感。' :
          weakest.name === '教学效果' ? '建议优化教学设计，加强重难点练习，关注学员进步。' :
          '建议提高出勤率，加强职业素养自我提升。'}
      </div>
      ${t.interact < 4.5 ? '<div class="xa-item">互动效果评分偏低，建议引入小组讨论、角色扮演等互动教学方式。</div>' : ''}
    </div>
    <div class="xa-section">
      <div class="xa-section-title">
        <svg viewBox="0 0 24 24"><path d="M16 6l2.29 2.29-4.88 4.88-4-4L2 16.59 3.41 18l6-6 4 4 6.3-6.29L22 12V6h-6z"/></svg>
        与同岗位对比
      </div>
      <div class="xa-compare-bar">
        <span class="cb-label">${t.name}</span>
        <div class="cb-bar"><div class="cb-fill" style="width:${score}%;background:#1677ff"></div></div>
        <span class="cb-val" style="color:#1677ff">${score}</span>
      </div>
      <div class="xa-compare-bar">
        <span class="cb-label">${t.dept}均值</span>
        <div class="cb-bar"><div class="cb-fill" style="width:${deptAvg}%;background:#52c41a"></div></div>
        <span class="cb-val" style="color:#52c41a">${deptAvg}</span>
      </div>
      <div class="xa-compare-bar">
        <span class="cb-label">${t.post}均值</span>
        <div class="cb-bar"><div class="cb-fill" style="width:${postAvg}%;background:#fa8c16"></div></div>
        <span class="cb-val" style="color:#fa8c16">${postAvg}</span>
      </div>
      <div class="xa-item" style="margin-top:8px;">
        ${score > postAvg ? `综合评分<span class="xa-highlight">高于</span>同岗位平均${(score - postAvg).toFixed(1)}分` : `综合评分<span class="xa-highlight">低于</span>同岗位平均${(postAvg - score).toFixed(1)}分`}，
        ${score > deptAvg ? `高于部门平均${(score - deptAvg).toFixed(1)}分。` : `低于部门平均${(deptAvg - score).toFixed(1)}分。`}
      </div>
    </div>
  `;
}

// Init
renderList();
</script>
</body>
</html>
