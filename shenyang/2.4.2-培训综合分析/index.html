<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1440" />
  <title>培训综合分析 - 沈阳客运职培基地</title>
  <script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif; background: #f0f2f5; min-width: 1440px; color: rgba(0,0,0,.85); }
    .header { background: #fff; padding: 0 24px; height: 56px; display: flex; align-items: center; border-bottom: 1px solid #f0f0f0; }
    .breadcrumb { font-size: 14px; color: rgba(0,0,0,.45); }
    .breadcrumb a { color: #1677ff; text-decoration: none; }
    .breadcrumb a:hover { text-decoration: underline; }
    .content { max-width: 1400px; margin: 0 auto; padding: 20px 24px; }
    .page-title { font-size: 20px; font-weight: 600; color: rgba(0,0,0,.85); margin-bottom: 16px; }
    .card { background: #fff; border-radius: 8px; padding: 20px; margin-bottom: 16px; box-shadow: 0 1px 2px rgba(0,0,0,.03); border: 1px solid #f0f0f0; }
    .card-title { font-size: 15px; font-weight: 600; margin-bottom: 16px; color: rgba(0,0,0,.85); display: flex; align-items: center; gap: 8px; }
    .card-title::before { content: ''; display: inline-block; width: 3px; height: 14px; background: #1677ff; border-radius: 2px; }
    .form-select { padding: 6px 12px; border: 1px solid #d9d9d9; border-radius: 6px; font-size: 14px; background: #fff; color: rgba(0,0,0,.85); cursor: pointer; }
    .form-select:focus { outline: none; border-color: #1677ff; box-shadow: 0 0 0 2px rgba(22,119,255,.1); }

    /* Time selector bar */
    .time-bar { display: flex; gap: 12px; align-items: center; padding: 0; background: transparent; border: none; }
    .time-bar label { font-size: 14px; color: rgba(0,0,0,.65); font-weight: 500; white-space: nowrap; }
    .time-quick-btn { padding: 4px 12px; border-radius: 4px; border: 1px solid #d9d9d9; background: #fff; font-size: 13px; cursor: pointer; color: rgba(0,0,0,.65); transition: all .2s; }
    .time-quick-btn:hover { border-color: #1677ff; color: #1677ff; }
    .time-quick-btn.active { background: #1677ff; color: #fff; border-color: #1677ff; }
    .update-time { font-size: 12px; color: rgba(0,0,0,.35); margin-left: auto; }

    /* KPI Cards */
    .kpi-row { display: grid; grid-template-columns: repeat(5, 1fr); gap: 16px; margin-bottom: 16px; }
    .kpi-card { background: #fff; border-radius: 8px; padding: 20px; text-align: center; border: 1px solid #f0f0f0; cursor: default; transition: box-shadow .2s; position: relative; }
    .kpi-card:hover { box-shadow: 0 4px 12px rgba(0,0,0,.08); }
    .kpi-label { font-size: 13px; color: rgba(0,0,0,.45); margin-bottom: 8px; }
    .kpi-value { font-size: 28px; font-weight: 700; color: #1677ff; }
    .kpi-value .unit { font-size: 13px; font-weight: 400; color: rgba(0,0,0,.45); margin-left: 2px; }
    .kpi-trend { font-size: 12px; margin-top: 6px; }
    .trend-up { color: #52c41a; }
    .trend-down { color: #ff4d4f; }
    .kpi-tooltip { display: none; position: absolute; bottom: calc(100% + 8px); left: 50%; transform: translateX(-50%); background: rgba(0,0,0,.75); color: #fff; padding: 8px 12px; border-radius: 6px; font-size: 12px; white-space: nowrap; z-index: 10; pointer-events: none; }
    .kpi-tooltip::after { content: ''; position: absolute; top: 100%; left: 50%; transform: translateX(-50%); border: 5px solid transparent; border-top-color: rgba(0,0,0,.75); }
    .kpi-card:hover .kpi-tooltip { display: block; }

    /* Charts layout */
    .charts-row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 16px; }
    .charts-row-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; margin-bottom: 16px; }
    .chart-box { min-height: 340px; }

    /* Digital human button */
    .dh-fab { position: fixed; right: 32px; bottom: 32px; width: 56px; height: 56px; border-radius: 50%; background: linear-gradient(135deg, #1677ff, #4096ff); color: #fff; border: none; cursor: pointer; box-shadow: 0 4px 16px rgba(22,119,255,.4); display: flex; align-items: center; justify-content: center; font-size: 24px; z-index: 999; transition: transform .2s; }
    .dh-fab:hover { transform: scale(1.1); }
    .dh-panel { position: fixed; right: 32px; bottom: 100px; width: 380px; max-height: 520px; background: #fff; border-radius: 12px; box-shadow: 0 8px 32px rgba(0,0,0,.15); z-index: 998; display: none; flex-direction: column; overflow: hidden; border: 1px solid #f0f0f0; }
    .dh-panel.open { display: flex; animation: slideUp .3s ease; }
    @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    .dh-panel-header { padding: 16px 20px; border-bottom: 1px solid #f0f0f0; display: flex; align-items: center; gap: 10px; }
    .dh-avatar { width: 36px; height: 36px; border-radius: 50%; background: linear-gradient(135deg, #1677ff, #69b1ff); display: flex; align-items: center; justify-content: center; color: #fff; font-size: 16px; font-weight: 600; flex-shrink: 0; }
    .dh-panel-header .dh-name { font-size: 15px; font-weight: 600; }
    .dh-panel-header .dh-desc { font-size: 12px; color: rgba(0,0,0,.45); }
    .dh-panel-close { margin-left: auto; cursor: pointer; color: rgba(0,0,0,.35); font-size: 18px; background: none; border: none; width: 28px; height: 28px; border-radius: 4px; display: flex; align-items: center; justify-content: center; }
    .dh-panel-close:hover { background: #f5f5f5; color: rgba(0,0,0,.65); }
    .dh-tabs { display: flex; border-bottom: 1px solid #f0f0f0; }
    .dh-tab { flex: 1; padding: 10px 0; text-align: center; font-size: 13px; color: rgba(0,0,0,.65); cursor: pointer; border-bottom: 2px solid transparent; transition: all .2s; }
    .dh-tab:hover { color: #1677ff; }
    .dh-tab.active { color: #1677ff; border-bottom-color: #1677ff; font-weight: 500; }
    .dh-body { padding: 16px 20px; flex: 1; overflow-y: auto; font-size: 13px; line-height: 1.8; color: rgba(0,0,0,.65); }
    .dh-body h4 { font-size: 14px; color: rgba(0,0,0,.85); margin: 12px 0 6px; font-weight: 600; }
    .dh-body h4:first-child { margin-top: 0; }
    .dh-body ul { padding-left: 18px; margin: 4px 0; }
    .dh-insight { padding: 10px 12px; background: #f6ffed; border: 1px solid #b7eb8f; border-radius: 6px; margin: 8px 0; font-size: 12px; color: rgba(0,0,0,.85); }
    .dh-warn { padding: 10px 12px; background: #fffbe6; border: 1px solid #ffe58f; border-radius: 6px; margin: 8px 0; font-size: 12px; color: rgba(0,0,0,.85); }
    .dh-alert { padding: 10px 12px; background: #fff2f0; border: 1px solid #ffccc7; border-radius: 6px; margin: 8px 0; font-size: 12px; color: rgba(0,0,0,.85); }

    /* Notice bar */
    .notice-bar { position: fixed; bottom: 0; left: 0; right: 0; background: #fffbe6; border-top: 1px solid #ffe58f; padding: 10px 24px; display: flex; align-items: center; gap: 10px; font-size: 13px; color: rgba(0,0,0,.85); z-index: 900; }
    .notice-icon { color: #faad14; font-size: 16px; flex-shrink: 0; }
    .notice-close { margin-left: auto; cursor: pointer; color: rgba(0,0,0,.35); background: none; border: none; font-size: 16px; }
    .notice-close:hover { color: rgba(0,0,0,.65); }

    body { padding-bottom: 48px; }
  </style>
</head>
<body>

</div>

<!-- Digital Human FAB -->
<button class="dh-fab" id="dhFab" title="小安 - AI培训分析助手" onclick="toggleDhPanel()">

      { label: '班级合格率', value: '89.7', unit: '%', trend: '-1.6%', up: false, tip: '本季度合格率略有下降' },

let currentPeriod = 'quarter';

// ========== TIME QUICK BUTTONS ==========
function setQuick(btn, period) {
  document.querySelectorAll('.time-quick-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentPeriod = period;
  renderAll();
}

// Also react to select changes
document.getElementById('selYear').addEventListener('change', () => { clearQuickBtns(); renderAll(); });
document.getElementById('selQuarter').addEventListener('change', function() {
  clearQuickBtns();
  if (this.value) { currentPeriod = 'quarter'; } else { currentPeriod = 'year'; }
  renderAll();
});
document.getElementById('selMonth').addEventListener('change', function() {
  clearQuickBtns();
  if (this.value) { currentPeriod = 'month'; } else { currentPeriod = 'year'; }
  renderAll();
});

function clearQuickBtns() {
  document.querySelectorAll('.time-quick-btn').forEach(b => b.classList.remove('active'));
}

// ========== KPI CARDS ==========
function renderKPI(data) {
  const row = document.getElementById('kpiRow');
  row.innerHTML = data.kpi.map(k => `
    <div class="kpi-card">
      <div class="kpi-tooltip">${k.tip}</div>
      <div class="kpi-label">${k.label}</div>
      <div class="kpi-value">${k.value}<span class="unit">${k.unit}</span></div>
      <div class="kpi-trend ${k.up ? 'trend-up' : 'trend-down'}">${k.up ? '&#9650;' : '&#9660;'} ${k.trend} 同比上期</div>
    </div>
  `).join('');
}

// ========== CHARTS ==========
let charts = {};

function initCharts() {
  ['chartPlanRing','chartMonthlyClass','chartPersonDays','chartJobCompletion','chartWorkshop','chartWeakTop5','chartScoreDist'].forEach(id => {
    charts[id] = echarts.init(document.getElementById(id));
  });
  window.addEventListener('resize', () => {
    Object.values(charts).forEach(c => c.resize());
  });
}

function renderCharts(data) {
  // 1. Plan ring
  const gap = data.planRing.total - data.planRing.completed;
  charts.chartPlanRing.setOption({
    tooltip: { trigger: 'item', formatter: '{b}: {c}项 ({d}%)' },
    legend: { bottom: 10, textStyle: { color: 'rgba(0,0,0,.65)' } },
    series: [{
      type: 'pie', radius: ['50%', '72%'], center: ['50%', '45%'],
      avoidLabelOverlap: false,
      label: {
        show: true, position: 'center',
        formatter: () => `{val|${data.planRing.completed}%}\n{lbl|完成率}`,
        rich: {
          val: { fontSize: 28, fontWeight: 700, color: '#1677ff', lineHeight: 36 },
          lbl: { fontSize: 13, color: 'rgba(0,0,0,.45)', lineHeight: 20 },
        }
      },
      emphasis: { label: { show: true } },
      data: [
        { value: data.planRing.completed, name: '已完成', itemStyle: { color: '#1677ff' } },
        { value: gap, name: '未完成 ' + gap + '项', itemStyle: { color: '#ff4d4f' } },
      ],
    }],
  });

  // 2. Monthly class plan vs actual
  const months = ['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
  const mLen = currentPeriod === 'month' ? 1 : currentPeriod === 'quarter' ? 3 : 12;
  const mOffset = currentPeriod === 'quarter' ? 3 : 0; // Q2 starts at index 3 for yearly view
  const mLabels = currentPeriod === 'year' ? months : currentPeriod === 'quarter' ? ['4月','5月','6月'] : ['6月'];
  const mPlan = data.monthlyClass.plan.slice(0, mLen);
  const mActual = data.monthlyClass.actual.slice(0, mLen);
  charts.chartMonthlyClass.setOption({
    tooltip: { trigger: 'axis' },
    legend: { bottom: 10, textStyle: { color: 'rgba(0,0,0,.65)' } },
    grid: { left: 50, right: 20, top: 20, bottom: 50 },
    xAxis: { type: 'category', data: mLabels, axisLabel: { color: 'rgba(0,0,0,.45)' } },
    yAxis: { type: 'value', axisLabel: { color: 'rgba(0,0,0,.45)' }, splitLine: { lineStyle: { color: '#f0f0f0' } } },
    series: [
      { name: '计划班次', type: 'bar', data: mPlan, itemStyle: { color: '#bae0ff', borderRadius: [4,4,0,0] }, barGap: '10%', barMaxWidth: 32 },
      { name: '实际班次', type: 'bar', data: mActual, itemStyle: { color: '#1677ff', borderRadius: [4,4,0,0] }, barMaxWidth: 32 },
    ],
  });

  // 3. Person days trend
  const pdLabels = currentPeriod === 'year' ? months : currentPeriod === 'quarter' ? ['4月','5月','6月'] : ['6月'];
  const pdData = data.personDays.slice(0, mLen);
  charts.chartPersonDays.setOption({
    tooltip: { trigger: 'axis', formatter: '{b}<br/>{a}: {c} 人天' },
    grid: { left: 60, right: 20, top: 20, bottom: 40 },
    xAxis: { type: 'category', data: pdLabels, axisLabel: { color: 'rgba(0,0,0,.45)' } },
    yAxis: { type: 'value', axisLabel: { color: 'rgba(0,0,0,.45)' }, splitLine: { lineStyle: { color: '#f0f0f0' } } },
    series: [{
      name: '培训人天数', type: 'line', data: pdData,
      smooth: true, symbol: 'circle', symbolSize: 6,
      lineStyle: { color: '#1677ff', width: 2 },
      itemStyle: { color: '#1677ff' },
      areaStyle: { color: { type: 'linear', x: 0, y: 0, x2: 0, y2: 1, colorStops: [{ offset: 0, color: 'rgba(22,119,255,.15)' }, { offset: 1, color: 'rgba(22,119,255,.02)' }] } },
    }],
  });

  // 4. Job completion horizontal bar
  const jd = data.jobCompletion;
  charts.chartJobCompletion.setOption({
    tooltip: { trigger: 'axis', axisPointer: { type: 'shadow' } },
    legend: { bottom: 10, textStyle: { color: 'rgba(0,0,0,.65)' } },
    grid: { left: 100, right: 30, top: 10, bottom: 50 },
    xAxis: { type: 'value', axisLabel: { color: 'rgba(0,0,0,.45)' }, splitLine: { lineStyle: { color: '#f0f0f0' } } },
    yAxis: { type: 'category', data: jd.jobs, axisLabel: { color: 'rgba(0,0,0,.65)' }, inverse: true },
    series: [
      { name: '计划人数', type: 'bar', data: jd.plan, itemStyle: { color: '#bae0ff', borderRadius: [0,4,4,0] }, barMaxWidth: 18 },
      { name: '实际人数', type: 'bar', data: jd.actual, itemStyle: { color: '#1677ff', borderRadius: [0,4,4,0] }, barMaxWidth: 18 },
    ],
  });

  // 5. Workshop comparison grouped bar
  const wd = data.workshop;
  charts.chartWorkshop.setOption({
    tooltip: { trigger: 'axis', axisPointer: { type: 'shadow' } },
    legend: { bottom: 10, textStyle: { color: 'rgba(0,0,0,.65)' } },
    grid: { left: 50, right: 20, top: 10, bottom: 50 },
    xAxis: { type: 'category', data: wd.names, axisLabel: { color: 'rgba(0,0,0,.45)', fontSize: 11, rotate: 15 } },
    yAxis: { type: 'value', axisLabel: { color: 'rgba(0,0,0,.45)' }, splitLine: { lineStyle: { color: '#f0f0f0' } } },
    series: [
      { name: '计划人数', type: 'bar', data: wd.plan, itemStyle: { color: '#bae0ff', borderRadius: [4,4,0,0] }, barMaxWidth: 28 },
      { name: '实际人数', type: 'bar', data: wd.actual, itemStyle: { color: '#1677ff', borderRadius: [4,4,0,0] }, barMaxWidth: 28 },
    ],
  });

  // 6. Weak TOP 5 horizontal bar (red tones)
  const wk = data.weakTop5;
  charts.chartWeakTop5.setOption({
    tooltip: { trigger: 'axis', axisPointer: { type: 'shadow' }, formatter: function(p) { return p[0].name + '<br/>人均失分: ' + p[0].value + ' 分'; } },
    grid: { left: 140, right: 50, top: 10, bottom: 30 },
    xAxis: { type: 'value', axisLabel: { color: 'rgba(0,0,0,.45)', formatter: '{value} 分' }, splitLine: { lineStyle: { color: '#f0f0f0' } } },
    yAxis: { type: 'category', data: wk.subjects, axisLabel: { color: 'rgba(0,0,0,.65)', fontSize: 12 }, inverse: true },
    series: [{
      type: 'bar', data: wk.scores,
      itemStyle: {
        color: function(params) {
          const colors = ['#ff4d4f','#ff7875','#ffa39e','#ffccc7','#ffe0de'];
          return colors[params.dataIndex] || '#ffa39e';
        },
        borderRadius: [0,4,4,0],
      },
      barMaxWidth: 22,
      label: { show: true, position: 'right', formatter: '{c} 分', color: 'rgba(0,0,0,.45)', fontSize: 12 },
    }],
  });

  // 7. Score distribution histogram + normal curve
  const sd = data.scoreDist;
  // Normal distribution curve points
  const normX = [], normY = [];
  const totalCount = sd.counts.reduce((a,b) => a + b, 0);
  for (let x = 30; x <= 105; x += 1) {
    normX.push(x);
    const z = (x - sd.mean) / sd.std;
    const pdf = (1 / (sd.std * Math.sqrt(2 * Math.PI))) * Math.exp(-0.5 * z * z);
    normY.push(Math.round(pdf * totalCount * 10 * 100) / 100); // scaled to match histogram bin width ~10
  }

  charts.chartScoreDist.setOption({
    tooltip: { trigger: 'axis' },
    legend: { bottom: 10, data: ['人数', '正态分布'], textStyle: { color: 'rgba(0,0,0,.65)' } },
    grid: { left: 50, right: 30, top: 20, bottom: 50 },
    xAxis: [
      { type: 'category', data: sd.ranges, axisLabel: { color: 'rgba(0,0,0,.45)' } },
      { type: 'category', data: normX.map(String), show: false },
    ],
    yAxis: [
      { type: 'value', axisLabel: { color: 'rgba(0,0,0,.45)' }, splitLine: { lineStyle: { color: '#f0f0f0' } } },
      { type: 'value', show: false },
    ],
    series: [
      {
        name: '人数', type: 'bar', data: sd.counts, xAxisIndex: 0, yAxisIndex: 0,
        itemStyle: { color: '#1677ff', borderRadius: [4,4,0,0] }, barMaxWidth: 40,
        label: { show: true, position: 'top', color: 'rgba(0,0,0,.45)', fontSize: 11 },
      },
      {
        name: '正态分布', type: 'line', data: normY, xAxisIndex: 1, yAxisIndex: 1,
        smooth: true, symbol: 'none', lineStyle: { color: '#ff7875', width: 2, type: 'dashed' },
      },
    ],
  });
}
