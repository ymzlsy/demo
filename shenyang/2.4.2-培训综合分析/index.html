<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>培训综合分析 - 沈阳客运职培基地</title>
  <script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100vh; overflow: hidden; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif; background: #f0f2f5; color: rgba(0,0,0,.85); display: flex; flex-direction: column; }
    .header { background: #fff; padding: 0 20px; height: 40px; display: flex; align-items: center; border-bottom: 1px solid #f0f0f0; flex-shrink: 0; }
    .breadcrumb { font-size: 13px; color: rgba(0,0,0,.45); }
    .breadcrumb a { color: #1677ff; text-decoration: none; }
    .breadcrumb a:hover { text-decoration: underline; }
    .content { width: 100%; padding: 4px 16px; flex: 1; display: flex; flex-direction: column; min-height: 0; overflow: hidden; }
    .page-title { font-size: 14px; font-weight: 600; color: rgba(0,0,0,.85); margin-bottom: 3px; flex-shrink: 0; }
    .card { background: #fff; border-radius: 6px; padding: 6px 10px; box-shadow: 0 1px 2px rgba(0,0,0,.03); border: 1px solid #f0f0f0; }
    .card-title { font-size: 11px; font-weight: 600; margin-bottom: 2px; color: rgba(0,0,0,.85); display: flex; align-items: center; gap: 5px; }
    .card-title::before { content: ''; display: inline-block; width: 3px; height: 11px; background: #1677ff; border-radius: 2px; }
    .card-subtitle { font-size: 9px; color: rgba(0,0,0,.35); font-weight: 400; margin-left: 4px; }
    .form-select { padding: 3px 8px; border: 1px solid #d9d9d9; border-radius: 4px; font-size: 12px; background: #fff; color: rgba(0,0,0,.85); cursor: pointer; }
    .form-select:focus { outline: none; border-color: #1677ff; box-shadow: 0 0 0 2px rgba(22,119,255,.1); }

    /* Toolbar */
    .toolbar { display: flex; gap: 8px; align-items: center; padding: 0; background: transparent; flex-shrink: 0; margin-bottom: 4px; }
    .toolbar label { font-size: 12px; color: rgba(0,0,0,.65); font-weight: 500; white-space: nowrap; }
    .update-time { font-size: 11px; color: rgba(0,0,0,.35); margin-left: auto; }

    /* KPI Cards */
    .kpi-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; margin-bottom: 4px; flex-shrink: 0; }
    .kpi-card { background: #fff; border-radius: 6px; padding: 8px 12px; border: 1px solid #f0f0f0; cursor: default; transition: box-shadow .2s; display: flex; align-items: center; gap: 10px; }
    .kpi-card:hover { box-shadow: 0 4px 12px rgba(0,0,0,.08); }
    .kpi-icon { width: 36px; height: 36px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }
    .kpi-icon.blue { background: #e6f4ff; color: #1677ff; }
    .kpi-icon.green { background: #f6ffed; color: #52c41a; }
    .kpi-icon.orange { background: #fff7e6; color: #fa8c16; }
    .kpi-icon.purple { background: #f9f0ff; color: #722ed1; }
    .kpi-info { flex: 1; }
    .kpi-label { font-size: 11px; color: rgba(0,0,0,.45); margin-bottom: 1px; }
    .kpi-value { font-size: 18px; font-weight: 700; color: rgba(0,0,0,.85); line-height: 1.2; }
    .kpi-value .unit { font-size: 11px; font-weight: 400; color: rgba(0,0,0,.45); margin-left: 2px; }
    .kpi-api { font-size: 9px; color: rgba(0,0,0,.25); margin-top: 1px; }

    /* Charts layout */
    .charts-area { flex: 1; display: flex; flex-direction: column; min-height: 0; gap: 6px; }
    .charts-row { display: grid; gap: 6px; flex: 1; min-height: 0; }
    .charts-row.row-3 { grid-template-columns: 1fr 1fr 1fr; }
    .charts-row > .card { display: flex; flex-direction: column; min-height: 0; overflow: hidden; }
    .chart-box { flex: 1; min-height: 0; width: 100%; }

    /* Tab selector inside chart card */
    .chart-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 2px; }
    .chart-tabs { display: flex; gap: 0; }
    .chart-tab { padding: 2px 10px; font-size: 11px; border: 1px solid #d9d9d9; background: #fff; color: rgba(0,0,0,.65); cursor: pointer; transition: all .2s; }
    .chart-tab:first-child { border-radius: 4px 0 0 4px; }
    .chart-tab:last-child { border-radius: 0 4px 4px 0; }
    .chart-tab + .chart-tab { border-left: none; }
    .chart-tab.active { background: #1677ff; color: #fff; border-color: #1677ff; }
    .chart-tab.active + .chart-tab { border-left-color: #1677ff; }

    /* Device info header */
    .device-info { display: flex; gap: 16px; margin-bottom: 4px; }
    .device-stat { font-size: 12px; color: rgba(0,0,0,.65); }
    .device-stat b { color: #1677ff; font-size: 14px; }

    /* Device utilization bars */
    .device-bars { flex: 1; display: flex; flex-direction: column; justify-content: center; gap: 10px; padding: 4px 0; }
    .device-bar-item { display: flex; align-items: center; gap: 8px; }
    .device-bar-label { font-size: 11px; color: rgba(0,0,0,.65); width: 70px; flex-shrink: 0; text-align: right; }
    .device-bar-track { flex: 1; height: 20px; background: #f5f5f5; border-radius: 4px; overflow: hidden; position: relative; }
    .device-bar-fill { height: 100%; border-radius: 4px; transition: width .6s ease; display: flex; align-items: center; justify-content: flex-end; padding-right: 6px; }
    .device-bar-value { font-size: 11px; font-weight: 600; color: #fff; text-shadow: 0 1px 2px rgba(0,0,0,.2); }
    .device-bar-value.outside { position: absolute; right: -40px; color: rgba(0,0,0,.65); text-shadow: none; }

    /* Plan analysis */
    .plan-analysis { flex: 1; display: flex; align-items: center; min-height: 0; }
    .plan-metrics { width: 50%; display: flex; flex-direction: column; gap: 8px; padding: 8px; }
    .plan-metric-item { display: flex; align-items: center; gap: 8px; }
    .plan-metric-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .plan-metric-info { flex: 1; }
    .plan-metric-label { font-size: 11px; color: rgba(0,0,0,.45); }
    .plan-metric-value { font-size: 16px; font-weight: 700; color: rgba(0,0,0,.85); }
    .plan-metric-rate { font-size: 12px; color: rgba(0,0,0,.45); margin-left: 4px; }

    /* Scrolling table */
    .scroll-table-wrap { flex: 1; overflow: hidden; position: relative; min-height: 0; }
    .scroll-table { width: 100%; border-collapse: collapse; font-size: 11px; }
    .scroll-table thead { background: #fafafa; position: sticky; top: 0; z-index: 1; }
    .scroll-table th { padding: 4px 6px; text-align: left; font-weight: 500; color: rgba(0,0,0,.65); border-bottom: 1px solid #f0f0f0; font-size: 10px; white-space: nowrap; }
    .scroll-table td { padding: 3px 6px; border-bottom: 1px solid #f5f5f5; color: rgba(0,0,0,.75); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 0; }
    .scroll-table tbody { display: block; overflow: hidden; }
    .scroll-table thead, .scroll-table tbody tr { display: table; width: 100%; table-layout: fixed; }
    .state-tag { padding: 1px 8px; border-radius: 4px; font-size: 11px; display: inline-block; }
    .state-0 { background: #f5f5f5; color: rgba(0,0,0,.45); }
    .state-1 { background: #e6f4ff; color: #1677ff; }
    .state-2 { background: #f6ffed; color: #52c41a; }

    /* Xiaoan FAB */
    .xiaoan-fab {
      position: fixed; bottom: 28px; right: 28px; z-index: 900;
      cursor: grab; user-select: none;
    }
    .xiaoan-fab:active { cursor: grabbing; }
    .xiaoan-fab-inner {
      width: 72px; height: 72px; border-radius: 50%; overflow: hidden;
      position: relative; background: #f0f5ff;
      box-shadow: 0 4px 16px rgba(22,119,255,0.15);
      transition: transform .2s;
      animation: xiaoanBreathe 3s ease-in-out infinite;
    }
    .xiaoan-fab:hover .xiaoan-fab-inner { transform: scale(1.06); }
    .xiaoan-fab-inner img { width: 100%; height: 100%; object-fit: cover; object-position: center top; }
    @keyframes xiaoanBreathe {
      0%, 100% { box-shadow: 0 4px 16px rgba(22,119,255,0.15); }
      50% { box-shadow: 0 4px 24px rgba(22,119,255,0.35), 0 0 0 4px rgba(22,119,255,0.08); }
    }
    .xiaoan-label { text-align: center; margin-top: 6px; font-size: 12px; color: #1677ff; font-weight: 500; }

    /* Xiaoan Overlay & Panel */
    .xiaoan-overlay {
      position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,.35); z-index: 950;
      opacity: 0; transition: opacity .3s;
      pointer-events: none;
    }
    .xiaoan-overlay.active { opacity: 1; pointer-events: auto; }

    .xiaoan-wrapper {
      position: fixed; z-index: 960;
      bottom: 40px; right: 28px;
      display: flex; align-items: flex-end; gap: 0;
      transform: translateY(20px) scale(0.95); opacity: 0;
      transition: transform .35s cubic-bezier(.4,0,.2,1), opacity .3s;
      pointer-events: none;
    }
    .xiaoan-wrapper.active { transform: translateY(0) scale(1); opacity: 1; pointer-events: auto; }

    .xiaoan-avatar-col {
      width: 160px; flex-shrink: 0; display: flex; flex-direction: column; justify-content: flex-end;
      align-items: center; pointer-events: none;
    }
    .xiaoan-avatar-col img {
      width: 140px; height: auto; border-radius: 0 0 0 12px;
      filter: drop-shadow(2px 2px 8px rgba(0,0,0,.1));
    }

    .xiaoan-panel {
      width: 560px; height: 680px; background: #fff;
      border-radius: 12px; box-shadow: 0 8px 32px rgba(0,0,0,.12);
      display: flex; flex-direction: column; overflow: hidden;
    }

    .xiaoan-panel-header {
      padding: 16px 20px; border-bottom: 1px solid #f0f0f0;
      display: flex; align-items: center; gap: 12px; cursor: grab; user-select: none;
    }
    .xiaoan-panel-header:active { cursor: grabbing; }
    .xiaoan-panel-header .xa-title { font-size: 16px; font-weight: 600; color: rgba(0,0,0,.85); }
    .xiaoan-panel-header .xa-subtitle { font-size: 12px; color: rgba(0,0,0,.45); margin-top: 2px; }
    .xiaoan-sound-wave { display: none; align-items: center; gap: 2px; height: 20px; margin-right: 8px; }
    .xiaoan-sound-wave.active { display: flex; }
    .xiaoan-sound-wave span { display: block; width: 3px; background: #1677ff; border-radius: 2px; animation: soundWave .6s ease-in-out infinite alternate; }
    .xiaoan-sound-wave span:nth-child(1) { height: 8px; animation-delay: 0s; }
    .xiaoan-sound-wave span:nth-child(2) { height: 14px; animation-delay: .15s; }
    .xiaoan-sound-wave span:nth-child(3) { height: 10px; animation-delay: .3s; }
    .xiaoan-sound-wave span:nth-child(4) { height: 16px; animation-delay: .1s; }
    .xiaoan-sound-wave span:nth-child(5) { height: 6px; animation-delay: .25s; }
    @keyframes soundWave { from { height: 4px; } to { height: 18px; } }
    .xiaoan-panel-close { cursor: pointer; color: rgba(0,0,0,.35); font-size: 20px; background: none; border: none; width: 32px; height: 32px; border-radius: 6px; display: flex; align-items: center; justify-content: center; }
    .xiaoan-panel-close:hover { background: #f5f5f5; color: rgba(0,0,0,.65); }

    .xiaoan-chat {
      flex: 1; overflow-y: auto; padding: 16px 20px; display: flex; flex-direction: column; gap: 12px;
    }
    .xiaoan-chat::-webkit-scrollbar { width: 4px; }
    .xiaoan-chat::-webkit-scrollbar-thumb { background: #d9d9d9; border-radius: 2px; }

    .xiaoan-msg { max-width: 92%; animation: msgFadeIn .3s ease; }
    .xiaoan-msg.system { align-self: flex-start; }
    .xiaoan-msg.user { align-self: flex-end; }
    @keyframes msgFadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

    .xiaoan-msg-card {
      padding: 12px 16px; border-radius: 10px; font-size: 13px; line-height: 1.8; color: rgba(0,0,0,.75);
    }
    .xiaoan-msg.system .xiaoan-msg-card {
      background: #fff; border: 1px solid #f0f0f0; border-left: 3px solid #1677ff;
    }
    .xiaoan-msg.user .xiaoan-msg-card {
      background: #1677ff; color: #fff; border-radius: 10px 10px 2px 10px;
    }
    .xiaoan-msg-card .msg-chart { width: 100%; height: 200px; margin-top: 8px; border-radius: 6px; }
    .xiaoan-msg-card b { color: rgba(0,0,0,.85); }
    .xiaoan-msg.user .xiaoan-msg-card b { color: #fff; }
    .xiaoan-msg-card .highlight { color: #1677ff; font-weight: 600; }
    .xiaoan-msg.user .xiaoan-msg-card .highlight { color: #fff; text-decoration: underline; }

    .xiaoan-typing { display: inline-flex; align-items: center; gap: 4px; padding: 8px 16px; background: #f5f5f5; border-radius: 10px; }
    .xiaoan-typing span { width: 6px; height: 6px; border-radius: 50%; background: #bfbfbf; animation: typingDot 1.2s infinite; }
    .xiaoan-typing span:nth-child(2) { animation-delay: .2s; }
    .xiaoan-typing span:nth-child(3) { animation-delay: .4s; }
    @keyframes typingDot { 0%, 60%, 100% { opacity: .3; transform: scale(.8); } 30% { opacity: 1; transform: scale(1); } }

    .xiaoan-quick-actions {
      padding: 8px 20px; display: flex; flex-wrap: wrap; gap: 8px; border-top: 1px solid #f0f0f0;
    }
    .xiaoan-chip {
      padding: 6px 14px; border-radius: 16px; border: 1px solid #d9d9d9;
      background: #fff; font-size: 12px; color: rgba(0,0,0,.65);
      cursor: pointer; transition: all .2s; white-space: nowrap;
    }
    .xiaoan-chip:hover { border-color: #1677ff; color: #1677ff; background: #f0f5ff; }

    .xiaoan-input-bar {
      padding: 12px 20px; border-top: 1px solid #f0f0f0;
      display: flex; align-items: center; gap: 8px;
    }
    .xiaoan-input {
      flex: 1; padding: 8px 14px; border: 1px solid #d9d9d9; border-radius: 8px;
      font-size: 13px; outline: none; transition: border-color .2s;
    }
    .xiaoan-input:focus { border-color: #1677ff; box-shadow: 0 0 0 2px rgba(22,119,255,.1); }
    .xiaoan-mic {
      width: 36px; height: 36px; border-radius: 50%; border: 1px solid #d9d9d9;
      background: #fff; cursor: pointer; display: flex; align-items: center; justify-content: center;
      transition: all .2s; color: rgba(0,0,0,.45); font-size: 16px;
    }
    .xiaoan-mic:hover { border-color: #1677ff; color: #1677ff; }
    .xiaoan-mic.recording { background: #ff4d4f; border-color: #ff4d4f; color: #fff; animation: micPulse 1s infinite; }
    @keyframes micPulse { 0%, 100% { box-shadow: 0 0 0 0 rgba(255,77,79,.3); } 50% { box-shadow: 0 0 0 8px rgba(255,77,79,0); } }
    .xiaoan-send {
      width: 36px; height: 36px; border-radius: 8px; border: none;
      background: #1677ff; color: #fff; cursor: pointer; display: flex;
      align-items: center; justify-content: center; font-size: 16px; transition: background .2s;
    }
    .xiaoan-send:hover { background: #4096ff; }
    .xiaoan-send:disabled { background: #d9d9d9; cursor: not-allowed; }

    /* Chart Info Modal */
    .chart-info-btn {
      display: inline-flex; align-items: center; justify-content: center;
      width: 16px; height: 16px; border-radius: 50%; border: 1px solid #d9d9d9;
      background: #fafafa; color: rgba(0,0,0,.45); font-size: 10px; font-weight: 700;
      cursor: pointer; margin-left: auto; flex-shrink: 0; transition: all .2s;
      font-style: italic; font-family: Georgia, serif; line-height: 1;
    }
    .chart-info-btn:hover { border-color: #1677ff; color: #1677ff; background: #f0f5ff; }
    .chart-info-overlay {
      position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,.45); z-index: 1100;
      display: flex; align-items: center; justify-content: center;
      opacity: 0; pointer-events: none; transition: opacity .2s;
    }
    .chart-info-overlay.active { opacity: 1; pointer-events: auto; }
    .chart-info-modal {
      background: #fff; border-radius: 12px; width: 580px; max-height: 80vh;
      box-shadow: 0 12px 48px rgba(0,0,0,.15); overflow: hidden;
      transform: translateY(20px) scale(0.95); transition: transform .25s cubic-bezier(.4,0,.2,1);
    }
    .chart-info-overlay.active .chart-info-modal { transform: translateY(0) scale(1); }
    .chart-info-header {
      padding: 16px 20px; background: linear-gradient(135deg, #1677ff 0%, #4096ff 100%);
      color: #fff; display: flex; align-items: center; justify-content: space-between;
    }
    .chart-info-header h3 { font-size: 15px; font-weight: 600; margin: 0; }
    .chart-info-close {
      width: 28px; height: 28px; border-radius: 50%; border: none;
      background: rgba(255,255,255,.2); color: #fff; font-size: 18px;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
    }
    .chart-info-close:hover { background: rgba(255,255,255,.35); }
    .chart-info-body { padding: 16px 20px; overflow-y: auto; max-height: calc(80vh - 56px); }
    .chart-info-section { margin-bottom: 14px; }
    .chart-info-section:last-child { margin-bottom: 0; }
    .chart-info-label {
      font-size: 11px; color: rgba(0,0,0,.45); font-weight: 600; text-transform: uppercase;
      letter-spacing: 0.5px; margin-bottom: 4px;
    }
    .chart-info-value {
      font-size: 13px; color: rgba(0,0,0,.85); line-height: 1.6;
      background: #fafafa; border-radius: 6px; padding: 8px 12px;
      border: 1px solid #f0f0f0; word-break: break-all;
    }
    .chart-info-value code {
      background: #e6f7ff; color: #1677ff; padding: 1px 4px; border-radius: 3px;
      font-size: 12px; font-family: 'SF Mono', Monaco, monospace;
    }
    .chart-info-confidence {
      display: inline-block; padding: 2px 10px; border-radius: 10px;
      font-size: 12px; font-weight: 600;
    }
    .conf-100 { background: #f6ffed; color: #52c41a; border: 1px solid #b7eb8f; }
    .conf-need { background: #fff7e6; color: #fa8c16; border: 1px solid #ffd591; }
    .conf-partial { background: #e6f7ff; color: #1677ff; border: 1px solid #91d5ff; }
  </style>
</head>
<body>

<!-- Header -->
<div class="header">
  <div class="breadcrumb"><a href="../">Demo</a> &gt; <a href="#">实训技能评价分析</a> &gt; 培训综合分析</div>
</div>

<div class="content">
  <div class="page-title">培训综合分析</div>

  <!-- KPI Cards -->
  <div class="kpi-row" id="kpiRow"></div>

  <!-- Toolbar -->
  <div class="card toolbar" style="padding: 4px 12px; margin-bottom: 6px;">
    <label>培训班：</label>
    <select class="form-select" id="selClass">
      <option value="0">2025年第3期理论培训班</option>
      <option value="1">2025年第2期实作培训班</option>
      <option value="2">2025年第1期综合培训班</option>
      <option value="3">2024年第4期安全培训班</option>
      <option value="4">2024年第3期技能强化班</option>
    </select>
    <label style="margin-left:12px;">考试：</label>
    <select class="form-select" id="selExam">
      <option value="0">2025年6月理论考试</option>
      <option value="1">2025年6月实作考试</option>
      <option value="2">2025年5月综合考核</option>
    </select>
    <span class="update-time">数据更新时间：2026-06-19 08:30</span>
  </div>

  <!-- Charts area -->
  <div class="charts-area">
    <!-- Row 1: 3 charts -->
    <div class="charts-row row-3">
      <div class="card">
        <div class="card-title">培训班出勤率对比<span class="card-subtitle">API: getTrainAttendRatio</span><span class="chart-info-btn" onclick="showChartInfo('class-attendance')">i</span></div>
        <div id="chartAttend" class="chart-box"></div>
      </div>
      <div class="card">
        <div class="chart-header">
          <div class="card-title">培训班成绩对比<span class="card-subtitle">API: getTrainResultExam</span><span class="chart-info-btn" onclick="showChartInfo('class-score-comparison')">i</span></div>
          <div class="chart-tabs">
            <div class="chart-tab active" onclick="switchTestModel(this,0)">理论</div>
            <div class="chart-tab" onclick="switchTestModel(this,1)">实作</div>
          </div>
        </div>
        <div id="chartResult" class="chart-box"></div>
      </div>
      <div class="card">
        <div class="card-title">成绩分布曲线<span class="card-subtitle">API: scoreDistribution</span><span class="chart-info-btn" onclick="showChartInfo('score-distribution')">i</span></div>
        <div id="chartScoreDist" class="chart-box"></div>
      </div>
    </div>

    <!-- Row 2: 3 charts -->
    <div class="charts-row row-3">
      <div class="card">
        <div class="card-title">设备利用率分析<span class="card-subtitle">API: getIndexData</span><span class="chart-info-btn" onclick="showChartInfo('device-utilization')">i</span></div>
        <div class="device-info" id="deviceInfo"></div>
        <div class="device-bars" id="deviceBars"></div>
      </div>
      <div class="card">
        <div class="card-title">培训执行进度分析<span class="card-subtitle">API: getTrainPlanData</span><span class="chart-info-btn" onclick="showChartInfo('train-plan-status')">i</span></div>
        <div class="plan-analysis">
          <div id="chartPlanPie" style="width:50%;height:100%;"></div>
          <div class="plan-metrics" id="planMetrics"></div>
        </div>
      </div>
      <div class="card">

// 1. Attendance bar
function renderAttendChart() {
  const names = trainAttendData.map(d => {
    // shorten class names for display
    const m = d.className.match(/第(\d+)期(.+?)班/);
    return m ? m[2] + m[1] + '期' : d.className;
  });
  const values = trainAttendData.map(d => d.trainClassAttendRatio);
  charts.chartAttend.setOption({
    tooltip: { trigger: 'axis', formatter: function(p) { return p[0].name + '<br/>出勤率: ' + p[0].value + '%<br/>人数: ' + trainAttendData[p[0].dataIndex].trainClassPersonNum + '人'; } },
    grid: { left: 50, right: 16, top: 12, bottom: 24 },
    xAxis: { type: 'category', data: names, axisLabel: { color: 'rgba(0,0,0,.45)', fontSize: 11, rotate: 15 } },
    yAxis: { type: 'value', max: 100, axisLabel: { color: 'rgba(0,0,0,.45)', fontSize: 11, formatter: '{value}%' }, splitLine: { lineStyle: { color: '#f0f0f0' } } },
    series: [{
      type: 'bar', data: values, barMaxWidth: 36,
      itemStyle: {
        borderRadius: [4,4,0,0],
        color: function(params) { return params.value < 80 ? '#fa8c16' : '#1677ff'; }
      },
      label: { show: true, position: 'top', formatter: '{c}%', fontSize: 11, color: 'rgba(0,0,0,.55)' }

const DEEPSEEK_KEY = 'sk-6420a1c0196149ecac72720513863fd0';
const DEEPSEEK_URL = 'https://api.deepseek.com/chat/completions';
let xiaoanHistory = [];

function collectPageData() {

  ctx += '### 培训班出勤率 (getTrainAttendRatio)\n';
  trainAttendData.forEach(c => { ctx += c.className + ': 出勤率' + c.trainClassAttendRatio + '%, 人数' + c.trainClassPersonNum + '人\n'; });
  ctx += '\n### 成绩对比 (getTrainResultExam)\n';

  ctx += '全校平均: 高分率' + r.avgData[0][0] + '%, 优良率' + r.avgData[0][1] + '%, 合格率' + r.avgData[0][2] + '%, 全校均分' + r.allAvgScore + '\n\n';
  ctx += '### 设备利用率 (getIndexData) - 水平进度条展示\n';
  ctx += '设备总数(deviceNum): ' + getIndexData.deviceNum + '台, 设备总值(deviceValue): ' + getIndexData.deviceValue + '万元, 投入增长率: +12.5%\n';
  getIndexData.deviceUseRate.forEach(d => { ctx += d.name + ': ' + d.value + '% (进度条)\n'; });
  ctx += '\n### 培训执行进度分析 (getTrainPlanData) - 环形饼图+指标卡\n';
  ctx += '培训班总数: 18期, 已结束: 4期(22.2%), 进行中: 5期(27.8%), 未开始: 9期(50.0%)\n';

  getWeakAnalysis.weakData.forEach((w, i) => { ctx += (i+1) + '. ' + w.taskName + ' 失分率' + w.subtractScoreRate + '\n'; });

const xiaoan = {
  fab: null, overlay: null, wrapper: null, chat: null, input: null, quickActions: null,
  soundWave: null, mic: null, isOpen: false, chartInstances: [], msgId: 0,

  init() {
    this.fab = document.getElementById('xiaoanFab');
    this.overlay = document.getElementById('xiaoanOverlay');
    this.wrapper = document.getElementById('xiaoanWrapper');
    this.chat = document.getElementById('xiaoanChat');
    this.input = document.getElementById('xiaoanInput');
    this.quickActions = document.getElementById('xiaoanQuickActions');
    this.soundWave = document.getElementById('xiaoanSoundWave');
    this.mic = document.getElementById('xiaoanMic');

    this.fab.addEventListener('click', (e) => { if (!this._fabDragged) this.open(); });
    document.getElementById('xiaoanClose').addEventListener('click', () => this.close());
    this.overlay.addEventListener('click', () => this.close());
    document.getElementById('xiaoanSend').addEventListener('click', () => this.sendFromInput());
    this.input.addEventListener('keydown', (e) => { if (e.key === 'Enter') this.sendFromInput(); });
    this.mic.addEventListener('click', () => this.simulateVoice());

    this._initFabDrag();
    this._initPanelDrag();
    this.renderQuickActions();
  },

  _initFabDrag() {
    let startX, startY, origX, origY, moved;
    const fab = this.fab;
    fab.addEventListener('mousedown', (e) => {
      e.preventDefault();
      startX = e.clientX; startY = e.clientY;
      const rect = fab.getBoundingClientRect();
      origX = rect.left; origY = rect.top;
      moved = false; this._fabDragged = false;
      const onMove = (ev) => {
        const dx = ev.clientX - startX, dy = ev.clientY - startY;
        if (Math.abs(dx) > 3 || Math.abs(dy) > 3) moved = true;
        fab.style.left = (origX + dx) + 'px'; fab.style.top = (origY + dy) + 'px';
        fab.style.right = 'auto'; fab.style.bottom = 'auto';
      };
      const onUp = () => {
        document.removeEventListener('mousemove', onMove);
        document.removeEventListener('mouseup', onUp);
        this._fabDragged = moved;
      };
      document.addEventListener('mousemove', onMove);
      document.addEventListener('mouseup', onUp);
    });
  },

  _initPanelDrag() {
    let startX, startY, origX, origY;
    const header = document.getElementById('xiaoanPanelHeader');
    const wrapper = this.wrapper;
    header.addEventListener('mousedown', (e) => {
      if (e.target.closest('.xiaoan-panel-close')) return;
      e.preventDefault();
      startX = e.clientX; startY = e.clientY;
      const rect = wrapper.getBoundingClientRect();
      origX = rect.left; origY = rect.top;
      const onMove = (ev) => {
        const dx = ev.clientX - startX, dy = ev.clientY - startY;
        wrapper.style.left = (origX + dx) + 'px';
        wrapper.style.top = (origY + dy) + 'px';
        wrapper.style.right = 'auto';
        wrapper.style.bottom = 'auto';
      };
      const onUp = () => {
        document.removeEventListener('mousemove', onMove);
        document.removeEventListener('mouseup', onUp);
      };
      document.addEventListener('mousemove', onMove);
      document.addEventListener('mouseup', onUp);
    });
  },

  open() {
    this.isOpen = true;
    this.overlay.classList.add('active');
    this.wrapper.classList.add('active');
    this.fab.style.display = 'none';
    if (this.chat.children.length === 0) {
      this.showProactiveInsight();
    }
  },

  close() {
    this.isOpen = false;
    this.overlay.classList.remove('active');
    this.wrapper.classList.remove('active');
    this.fab.style.display = '';
  },

  renderQuickActions() {
    const chips = ['各班出勤率对比', '薄弱项TOP5分析', '设备利用情况', '培训建议'];
    this.quickActions.innerHTML = chips.map(c =>
      `<div class="xiaoan-chip" onclick="xiaoan.handleChip('${c}')">${c}</div>`
    ).join('');
  },

  handleChip(text) {
    this.addUserMsg(text);
    this.processQuery(text);
  },

  sendFromInput() {
    const text = this.input.value.trim();
    if (!text) return;
    this.input.value = '';
    this.addUserMsg(text);
    this.processQuery(text);
  },

  simulateVoice() {
    if (this.mic.classList.contains('recording')) return;
    this.mic.classList.add('recording');
    const presets = ['各班出勤率对比', '薄弱项TOP5分析', '设备利用情况', '培训建议'];
    const chosen = presets[Math.floor(Math.random() * presets.length)];
    setTimeout(() => {
      this.mic.classList.remove('recording');
      this.input.value = chosen;
      setTimeout(() => this.sendFromInput(), 300);
    }, 2000);
  },

  addUserMsg(text) {
    const div = document.createElement('div');
    div.className = 'xiaoan-msg user';
    div.innerHTML = `<div class="xiaoan-msg-card">${text}</div>`;
    this.chat.appendChild(div);
    this.scrollToBottom();
  },

  addStreamMsg() {
    const id = 'xiaoan-msg-' + (++this.msgId);
    const div = document.createElement('div');
    div.className = 'xiaoan-msg system';
    div.innerHTML = `<div class="xiaoan-msg-card"><span id="${id}-text" style="white-space:pre-wrap;line-height:1.6;font-size:13px;"></span></div>`;
    this.chat.appendChild(div);
    this.scrollToBottom();
    this.soundWave.classList.add('active');
    return document.getElementById(id + '-text');
  },

  showProactiveInsight() {
    const textEl = this.addStreamMsg();
    const weakTop = getWeakAnalysis.weakData[0];
    const lowAttend = trainAttendData.filter(d => d.trainClassAttendRatio < 80);
    let warn = '';
    if (lowAttend.length > 0) {
      warn = '，其中<b>' + lowAttend.map(d => d.className.replace(/^\d{4}年/, '')).join('、') + '</b>出勤率低于80%需关注';
    }
    const html = '您好，我是小安，您的培训综合分析助手。\n\n' +
      '当前共有 ' + get7ItemData.examTotal + ' 场考试，薄弱项TOP1为「' + weakTop.taskName + '」（失分率' + weakTop.subtractScoreRate + '）' + warn + '。\n\n' +
      '您可以问我关于出勤率、成绩对比、设备利用等问题。';
    textEl.textContent = html;
    this.soundWave.classList.remove('active');
  },

  async callDeepSeek(userMsg, textEl) {
    xiaoanHistory.push({ role: 'user', content: userMsg });
    const sysPrompt = '你是"小安"，沈阳客运段职培基地的智能培训综合分析助手。你基于以下真实培训数据回答问题。\n\n' +
      '要求：1.必须基于提供的真实数据，不要编造 2.包含具体数字和百分比 3.分析异常值和薄弱环节 4.给出具体可操作的建议 5.回答简洁，200字以内 6.中文回答\n\n' +
      collectPageData();
    const msgs = [{ role: 'system', content: sysPrompt }, ...xiaoanHistory.slice(-6)];
    try {
      const resp = await fetch(DEEPSEEK_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + DEEPSEEK_KEY },
        body: JSON.stringify({ model: 'deepseek-chat', messages: msgs, stream: true, max_tokens: 800, temperature: 0.7 })
      });
      if (!resp.ok) throw new Error('API ' + resp.status);
      const reader = resp.body.getReader();
      const decoder = new TextDecoder();
      let full = '';
      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        const chunk = decoder.decode(value, { stream: true });
        for (const line of chunk.split('\n')) {
          const trimmed = line.trim();
          if (!trimmed.startsWith('data: ')) continue;
          const d = trimmed.slice(6);
          if (d === '[DONE]') continue;
          try {
            const p = JSON.parse(d);
            const tk = p.choices?.[0]?.delta?.content;
            if (tk) { full += tk; textEl.textContent = full; this.scrollToBottom(); }
          } catch(e) {}
        }
      }
      xiaoanHistory.push({ role: 'assistant', content: full });
      this.soundWave.classList.remove('active');
    } catch(err) {
      textEl.textContent = '抱歉，连接服务暂时不可用，请稍后再试。';
      this.soundWave.classList.remove('active');
    }
  },

  processQuery(text) {
    const textEl = this.addStreamMsg();
    this.callDeepSeek(text, textEl);
  },

  scrollToBottom() {
    this.chat.scrollTop = this.chat.scrollHeight;
  }
};
