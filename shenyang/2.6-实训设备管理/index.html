<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>实训设备管理 — 维护保养中心</title>
<script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--primary:#1677ff;--success:#52c41a;--warning:#faad14;--danger:#ff4d4f;--purple:#722ed1;--bg:#f5f5f5;--card:#fff;--border:#e8e8e8;--text:#333;--text2:#666;--text3:#999;--radius:8px;--blue:#1890ff}
body{font-family:-apple-system,"PingFang SC","Microsoft YaHei",sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.6}
.header{background:#fff;padding:16px 24px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100}
.header h1{font-size:20px;font-weight:600;white-space:nowrap}
.header-actions{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.btn{padding:6px 16px;border-radius:6px;border:1px solid var(--border);background:#fff;cursor:pointer;font-size:13px;display:inline-flex;align-items:center;gap:4px;transition:all .2s;white-space:nowrap}
.btn:hover{border-color:var(--primary);color:var(--primary)}
.btn-primary{background:var(--primary);color:#fff;border-color:var(--primary)}
.btn-primary:hover{background:#4096ff;color:#fff}
.btn-success{background:var(--success);color:#fff;border-color:var(--success)}
.btn-success:hover{opacity:.85;color:#fff}
.btn-danger{background:var(--danger);color:#fff;border-color:var(--danger)}
.btn-danger:hover{opacity:.85;color:#fff}
.btn-warning{background:var(--warning);color:#fff;border-color:var(--warning)}
.btn-warning:hover{opacity:.85;color:#fff}
.btn-purple{background:var(--purple);color:#fff;border-color:var(--purple)}
.btn-purple:hover{opacity:.85;color:#fff}
.btn-link{border:none;background:none;color:var(--primary);padding:2px 4px;cursor:pointer;font-size:12px;white-space:nowrap}
.btn-link:hover{color:#4096ff}
.btn-link.danger{color:var(--danger)}
.btn-link.danger:hover{color:#ff7875}
.btn-sm{padding:4px 10px;font-size:12px;white-space:nowrap}
.btn-ghost{background:transparent;border:1px dashed var(--border);color:var(--text2)}
.btn-ghost:hover{border-color:var(--primary);color:var(--primary)}
.container{padding:16px 24px;max-width:1480px;margin:0 auto}
.stats-row{display:flex;gap:16px;margin-bottom:16px;flex-wrap:wrap;align-items:stretch}
.stat-card{background:#fff;border-radius:var(--radius);padding:16px 20px;flex:1;min-width:140px;border:1px solid var(--border);cursor:pointer;transition:all .2s}
.stat-card:hover{box-shadow:0 2px 8px rgba(0,0,0,.08)}
.stat-card .label{font-size:13px;color:var(--text2);white-space:nowrap}
.stat-card .value{font-size:28px;font-weight:700;margin-top:4px;white-space:nowrap}
.stat-card .value.green{color:var(--success)}
.stat-card .value.red{color:var(--danger)}
.stat-card .value.orange{color:var(--warning)}
.stat-card .value.purple{color:var(--purple)}
.chart-card{background:#fff;border-radius:var(--radius);padding:16px;border:1px solid var(--border);min-width:300px;flex:2}
.quick-filters{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap}
.qf-btn{padding:6px 16px;border-radius:16px;border:1px solid var(--border);background:#fff;cursor:pointer;font-size:13px;position:relative;white-space:nowrap;transition:all .2s}
.qf-btn.active{background:var(--primary);color:#fff;border-color:var(--primary)}
.badge{position:absolute;top:-6px;right:-6px;min-width:18px;height:18px;border-radius:9px;font-size:11px;display:flex;align-items:center;justify-content:center;color:#fff;padding:0 5px;white-space:nowrap}
.badge-red{background:var(--danger)}
.badge-orange{background:var(--warning)}
.badge-purple{background:var(--purple)}
.filter-row{display:flex;gap:8px;margin-bottom:10px;flex-wrap:wrap;align-items:center}
.filter-row select,.filter-row input[type="text"]{padding:5px 8px;border:1px solid var(--border);border-radius:6px;font-size:12px;min-width:110px;max-width:160px;background:#fff}
.usage-icon-btn{background:none;border:none;cursor:pointer;font-size:16px;padding:2px 6px;border-radius:4px;transition:background .2s;position:relative}
.usage-icon-btn:hover{background:#e6f7ff}
.usage-icon-btn .usage-count{position:absolute;top:-4px;right:-6px;min-width:16px;height:16px;border-radius:8px;background:var(--primary);color:#fff;font-size:10px;display:flex;align-items:center;justify-content:center;padding:0 3px}
.usage-modal{width:900px;max-width:95vw;max-height:90vh}
.usage-modal-body{padding:20px;overflow-y:auto;max-height:calc(90vh - 120px)}
.fault-modal{width:960px;max-width:95vw;max-height:92vh}
.fault-modal-body{padding:20px;overflow-y:auto;max-height:calc(92vh - 120px)}
.fault-card{background:#fff;border:1px solid var(--border);border-radius:8px;padding:16px;margin-bottom:12px;transition:box-shadow .2s}
.fault-card:hover{box-shadow:0 2px 8px rgba(0,0,0,.06)}
.fault-card-head{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px}
.fault-card-meta{display:flex;gap:12px;flex-wrap:wrap;font-size:12px;color:var(--text3);margin-top:6px}
.fault-card-desc{font-size:13px;margin:8px 0;line-height:1.6}
.fault-card-actions{margin-top:10px;padding-top:10px;border-top:1px solid #f0f0f0;display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.fault-form-inline{background:#fafafa;border:1px solid var(--border);border-radius:6px;padding:12px;margin-top:10px}
.fault-form-inline .form-group{margin-bottom:10px}
.fault-form-inline .form-group:last-child{margin-bottom:0}
.fault-form-inline label{font-size:12px;font-weight:500;display:block;margin-bottom:3px}
.fault-form-inline input,.fault-form-inline select,.fault-form-inline textarea{width:100%;padding:6px 10px;border:1px solid var(--border);border-radius:4px;font-size:13px;font-family:inherit}
.fault-form-inline textarea{resize:vertical;min-height:60px}
.fault-filter-bar{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:12px}
.fault-filter-bar select,.fault-filter-bar input{padding:5px 8px;border:1px solid var(--border);border-radius:6px;font-size:12px;min-width:100px}
.fault-summary-row{display:flex;gap:12px;margin-bottom:16px;flex-wrap:wrap}
.fault-summary-item{background:#fafafa;border:1px solid var(--border);border-radius:6px;padding:8px 16px;flex:1;min-width:80px;text-align:center}
.fault-summary-item .fs-val{font-size:20px;font-weight:700}
.fault-summary-item .fs-label{font-size:12px;color:var(--text3)}
.usage-filter-bar{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:12px}
.usage-filter-bar select,.usage-filter-bar input{padding:5px 8px;border:1px solid var(--border);border-radius:6px;font-size:12px;min-width:100px}
.usage-table{width:100%;border-collapse:collapse;font-size:13px}
.usage-table th{background:#fafafa;padding:8px 10px;text-align:left;font-weight:600;border-bottom:1px solid var(--border);white-space:nowrap;font-size:12px}
.usage-table td{padding:8px 10px;border-bottom:1px solid #f0f0f0}
.usage-table tr:hover{background:#fafafa}
.table-wrap{background:#fff;border-radius:var(--radius);border:1px solid var(--border);overflow-x:auto}
table{width:100%;border-collapse:collapse}
th{background:#fafafa;padding:10px 12px;text-align:left;font-weight:600;font-size:13px;border-bottom:1px solid var(--border);white-space:nowrap;user-select:none}
th.sortable{cursor:pointer}
th.sortable:hover{background:#f0f0f0}
th .sort-icon{margin-left:4px;color:var(--text3);font-size:11px}
th .sort-icon.asc::after{content:' ↑'}
th .sort-icon.desc::after{content:' ↓'}
td{padding:10px 12px;border-bottom:1px solid #f0f0f0;font-size:13px;vertical-align:middle}
td:last-child{white-space:nowrap}
tr:hover{background:#fafafa}
tr{cursor:pointer}
.tag{display:inline-block;padding:2px 8px;border-radius:4px;font-size:12px;white-space:nowrap}
.tag-green{background:#f6ffed;color:#389e0d;border:1px solid #b7eb8f}
.tag-red{background:#fff2f0;color:#cf1322;border:1px solid #ffccc7}
.tag-orange{background:#fff7e6;color:#d46b08;border:1px solid #ffd591}
.tag-blue{background:#e6f7ff;color:#096dd9;border:1px solid #91d5ff}
.tag-gray{background:#f5f5f5;color:#8c8c8c;border:1px solid #d9d9d9}
.tag-purple{background:#f9f0ff;color:#531dab;border:1px solid #d3adf7}
.status-badge{display:inline-flex;align-items:center;gap:4px;font-size:12px;white-space:nowrap}
.status-dot{width:6px;height:6px;border-radius:50%;display:inline-block}
.dot-green{background:var(--success)}
.dot-gray{background:#bfbfbf}
.dot-blue{background:var(--blue)}
.health-bar{width:60px;height:6px;background:#f0f0f0;border-radius:3px;display:inline-block;vertical-align:middle;margin-right:6px}
.health-bar-inner{height:100%;border-radius:3px}
.pagination{display:flex;justify-content:space-between;align-items:center;padding:12px 16px;font-size:13px;color:var(--text2)}
.pagination .pages{display:flex;gap:4px}
.pagination .page-btn{width:32px;height:32px;border:1px solid var(--border);border-radius:6px;background:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:13px}
.pagination .page-btn.active{background:var(--primary);color:#fff;border-color:var(--primary)}
.pagination .page-btn:hover:not(.active){border-color:var(--primary);color:var(--primary)}

/* Overlay */
.overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.45);z-index:1000;display:none;justify-content:center;align-items:center}
.overlay.show{display:flex}
.modal{background:#fff;border-radius:var(--radius);width:580px;max-width:95vw;max-height:85vh;overflow-y:auto;box-shadow:0 6px 16px rgba(0,0,0,.12)}
.modal-header{padding:16px 24px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.modal-header h3{font-size:16px;font-weight:600;white-space:nowrap}
.modal-close{width:32px;height:32px;border:none;background:none;cursor:pointer;font-size:18px;color:var(--text3);display:flex;align-items:center;justify-content:center;border-radius:4px}
.modal-close:hover{background:#f5f5f5}
.modal-body{padding:20px 24px}
.modal-footer{padding:12px 24px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:8px}
.form-group{margin-bottom:16px}
.form-group label{display:block;margin-bottom:4px;font-size:13px;font-weight:500;white-space:nowrap}
.form-group label .req{color:var(--danger)}
.form-group input,.form-group select,.form-group textarea{width:100%;padding:8px 12px;border:1px solid var(--border);border-radius:6px;font-size:13px;font-family:inherit}
.form-group textarea{resize:vertical;min-height:80px}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 2px rgba(22,119,255,.1)}
.form-group input[readonly],.form-group input:disabled{background:#f5f5f5;color:var(--text2);cursor:not-allowed}
.form-row{display:flex;gap:16px}
.form-row .form-group{flex:1}
.radio-group{display:flex;gap:12px;flex-wrap:wrap}
.radio-group label{display:inline-flex;align-items:center;gap:4px;font-weight:400;cursor:pointer;white-space:nowrap}
.checkbox-row{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid #f0f0f0}
.checkbox-row label{font-weight:400;cursor:pointer;white-space:nowrap}

/* Drawer */
.drawer-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.45);z-index:500;display:none}
.drawer-overlay.show{display:block}
.drawer{position:fixed;top:0;right:-700px;width:680px;height:100%;background:#fff;z-index:501;transition:right .3s ease;overflow-y:auto;box-shadow:-2px 0 8px rgba(0,0,0,.1)}
.drawer.show{right:0}
.drawer-header{padding:16px 24px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;background:#fff;z-index:10}
.drawer-header h3{font-size:16px;font-weight:600;white-space:nowrap}
.drawer-header .actions{display:flex;gap:8px;align-items:center}
.drawer-body{padding:0}

/* Collapse panels */
.collapse-panel{border-bottom:1px solid var(--border)}
.collapse-header{padding:12px 24px;display:flex;justify-content:space-between;align-items:center;cursor:pointer;background:#fafafa;user-select:none}
.collapse-header:hover{background:#f0f0f0}
.collapse-header h4{font-size:14px;font-weight:600;display:flex;align-items:center;gap:8px;white-space:nowrap}
.collapse-arrow{transition:transform .2s;font-size:12px;color:var(--text3)}
.collapse-panel.open .collapse-arrow{transform:rotate(90deg)}
.collapse-content{display:none;padding:16px 24px}
.collapse-panel.open .collapse-content{display:block}

/* Info grid */
.info-section{margin-bottom:16px;border-radius:6px;padding:16px;position:relative}
.info-section.synced{background:#f7f8fa;border:1px solid #e8e8e8}
.info-section.editable{background:#fff;border:1px solid var(--border)}
.info-section .section-label{font-size:12px;color:var(--text3);margin-bottom:12px;display:flex;align-items:center;gap:6px;white-space:nowrap}
.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px 24px}
.info-item{display:flex;flex-direction:column;gap:2px}
.info-item .field-label{font-size:12px;color:var(--text3);display:flex;align-items:center;gap:4px;white-space:nowrap}
.info-item .field-value{font-size:13px;color:var(--text);word-break:break-all}
.lock-icon{font-size:10px;color:#bfbfbf}
.info-item.full{grid-column:1/-1}

/* Param table */
.param-table{width:100%;border-collapse:collapse;font-size:13px}
.param-table th{background:#fafafa;padding:8px 12px;font-size:12px;text-align:left;border:1px solid var(--border)}
.param-table td{padding:6px 12px;border:1px solid #f0f0f0}
.param-table input{border:1px solid transparent;background:transparent;padding:4px 8px;width:100%;font-size:13px;font-family:inherit}
.param-table input:focus{border-color:var(--primary);background:#fff;outline:none;border-radius:4px}
.param-table tr:hover{background:#fafafa}

/* Usage record cards */
.usage-card{background:#fff;border:1px solid var(--border);border-radius:6px;padding:12px 16px;margin-bottom:8px}
.usage-card-header{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px}
.usage-card-header .date{font-weight:600;font-size:13px;white-space:nowrap}
.usage-card-body{display:flex;gap:16px;flex-wrap:wrap;margin-top:8px;font-size:13px;color:var(--text2)}
.usage-card-body .item{white-space:nowrap}
.usage-card-detail{display:none;margin-top:8px;padding-top:8px;border-top:1px solid #f0f0f0;font-size:13px;color:var(--text2)}
.usage-card.expanded .usage-card-detail{display:block}
.mini-stats{display:flex;gap:12px;flex-wrap:wrap;margin-top:16px}
.mini-stat{background:#fafafa;border:1px solid var(--border);border-radius:6px;padding:10px 16px;flex:1;min-width:100px;text-align:center}
.mini-stat .ms-label{font-size:12px;color:var(--text3);white-space:nowrap}
.mini-stat .ms-value{font-size:18px;font-weight:700;color:var(--text);margin-top:2px;white-space:nowrap}

/* Fault status steps */
.fault-steps{display:flex;gap:0;margin:12px 0;align-items:center}
.fault-step{display:flex;align-items:center;gap:4px;font-size:12px;white-space:nowrap}
.fault-step .step-dot{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;color:#fff;flex-shrink:0}
.fault-step .step-dot.done{background:var(--success)}
.fault-step .step-dot.current{background:var(--primary)}
.fault-step .step-dot.pending{background:#d9d9d9}
.fault-step .step-line{width:30px;height:2px;background:#d9d9d9;flex-shrink:0}
.fault-step .step-line.done{background:var(--success)}

/* Timeline */
.timeline{margin:8px 0 8px 12px;border-left:2px solid var(--border);padding-left:16px}
.timeline-item{padding:8px 0;position:relative}
.timeline-item::before{content:'';width:8px;height:8px;border-radius:50%;background:var(--primary);position:absolute;left:-21px;top:12px}
.timeline-item .tl-time{font-size:12px;color:var(--text3);white-space:nowrap}
.timeline-item .tl-content{font-size:13px;margin-top:2px}

/* Maintenance card */
.maint-card{border:1px solid var(--border);border-radius:6px;padding:12px 16px;margin-bottom:8px}
.maint-card-header{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px}
.maint-card .maint-info{display:flex;gap:16px;flex-wrap:wrap;font-size:13px;color:var(--text2);margin-top:8px}

/* Prediction alert */
.predict-alert{padding:12px 16px;border-radius:6px;margin-bottom:12px;font-size:13px;display:flex;align-items:flex-start;gap:8px}
.predict-alert.warn{background:#fffbe6;border:1px solid #ffe58f;color:#ad6800}
.predict-alert.danger{background:#fff2f0;border:1px solid #ffccc7;color:#a8071a}
.predict-alert.info{background:#e6f7ff;border:1px solid #91d5ff;color:#096dd9}
.predict-alert .alert-icon{font-size:16px;flex-shrink:0}

/* Archive file list */
.file-item{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid #f0f0f0}
.file-item:last-child{border-bottom:none}
.file-info{display:flex;align-items:center;gap:12px;flex:1}
.file-icon{font-size:20px}
.file-detail .file-name{font-size:13px;font-weight:500}
.file-detail .file-meta{font-size:12px;color:var(--text3);white-space:nowrap}

/* Toast */
.toast{position:fixed;top:24px;left:50%;transform:translateX(-50%);background:#333;color:#fff;padding:10px 24px;border-radius:6px;font-size:14px;z-index:9999;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1}
.toast.success{background:var(--success)}
.toast.error{background:var(--danger)}

/* Scrollbar */
.drawer::-webkit-scrollbar{width:6px}
.drawer::-webkit-scrollbar-thumb{background:#d9d9d9;border-radius:3px}
.modal::-webkit-scrollbar{width:6px}
.modal::-webkit-scrollbar-thumb{background:#d9d9d9;border-radius:3px}

/* Responsive */
@media(max-width:768px){
.header{flex-direction:column;gap:8px}
.stats-row{flex-direction:column}
.chart-card{min-width:auto}
.drawer{width:100%}
.info-grid{grid-template-columns:1fr}
.form-row{flex-direction:column}
}
</style>
</head>
<body>

<div class="header">
  <h1>实训设备管理 — 维护保养中心</h1>
  <div class="header-actions">
    <button class="btn" onclick="openSyncModal()">&#x1F504; 同步设备</button>
    <button class="btn" onclick="showToast('已导入设备数据','success')">&#x1F4E5; 导入数据</button>
    <button class="btn" onclick="showToast('报表导出中...','success')">&#x1F4E4; 导出报表</button>
    <button class="btn btn-danger btn-sm" onclick="openFaultModal()">+ 报修</button>
    <button class="btn btn-primary btn-sm" onclick="openMaintPlanModal()">+ 新增保养计划</button>
  </div>
</div>

<div class="container">
  <!-- Stats -->
  <div class="stats-row" id="statsRow"></div>

  <!-- Quick filters -->
  <div class="quick-filters" id="quickFilters"></div>

  <!-- Advanced filters -->
  <div id="advancedFilters"></div>

  <!-- Table -->
  <div class="table-wrap">
    <table id="deviceTable">
      <thead id="tableHead"></thead>
      <tbody id="tableBody"></tbody>
    </table>
    <div class="pagination" id="pagination"></div>
  </div>
</div>

<!-- Drawer overlay -->
<div class="drawer-overlay" id="drawerOverlay" onclick="closeDrawer()"></div>
<div class="drawer" id="drawer"></div>

<!-- Modal overlay -->
<div class="overlay" id="modalOverlay" onclick="closeModal()">
  <div class="modal" id="modalContent" onclick="event.stopPropagation()"></div>
</div>

<!-- Usage List Modal (separate, wider) -->
<div class="overlay" id="usageListOverlay" onclick="closeUsageListModal()">
  <div class="modal usage-modal" onclick="event.stopPropagation()">
    <div class="modal-header">
      <h3 id="usageListTitle">使用记录</h3>
      <button class="close-btn" onclick="closeUsageListModal()">&times;</button>
    </div>
    <div class="usage-modal-body" id="usageListBody"></div>
  </div>
</div>

<!-- Fault List Modal (separate, wider) -->
<div class="overlay" id="faultListOverlay" onclick="closeFaultListModal()">
  <div class="modal fault-modal" onclick="event.stopPropagation()">
    <div class="modal-header">
      <h3 id="faultListTitle">故障/报修记录</h3>
      <div style="display:flex;gap:8px;align-items:center">
        <button class="btn btn-sm btn-danger" id="faultListAddBtn" onclick="">+ 报修</button>
        <button class="modal-close" onclick="closeFaultListModal()">&times;</button>
      </div>
    </div>
    <div class="fault-modal-body" id="faultListBody"></div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>

function showToast(msg, type='') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show' + (type ? ' ' + type : '');
  setTimeout(() => t.className = 'toast', 2000);
}

function getDeviceFaults(deviceId) { return state.faults.filter(f => f.deviceId === deviceId); }
function getDeviceOpenFaults(deviceId) { return state.faults.filter(f => f.deviceId === deviceId && f.status !== '已完成'); }
function getDeviceUsage(deviceId) { return state.usageRecords.filter(u => u.deviceId === deviceId).sort((a,b) => b.date.localeCompare(a.date)); }
function getDevicePlans(deviceId) { return state.maintPlans.filter(p => p.deviceId === deviceId); }
function getDeviceHistory(deviceId) { return state.maintHistory.filter(h => h.deviceId === deviceId).sort((a,b) => b.date.localeCompare(a.date)); }
function getDeviceArchives(deviceId) { return state.archives.filter(a => a.deviceId === deviceId); }

function getMaintStatus(device) {
  const plans = getDevicePlans(device.id);
  if (plans.length === 0) return '无计划';
  const today = '2026-06-17';
  const soon = '2026-06-24'; // 7 days
  let hasOverdue = false, hasSoon = false;
  plans.forEach(p => {
    if (p.nextDate < today) hasOverdue = true;
    else if (p.nextDate <= soon) hasSoon = true;
  });
  if (hasOverdue) return '已逾期';
  if (hasSoon) return '即将到期';
  return '正常';
}

function getHealthColor(h) {
  if (h >= 80) return 'var(--success)';
  if (h >= 60) return 'var(--warning)';
  return 'var(--danger)';
}

function getLocationShort(loc) {
  return loc.replace('捷安高科/','').replace('仿真基地/','');
}

function formatMoney(v) { return v.toFixed(2) + ' 万元'; }

// ==================== FILTERING & SORTING ====================
function getFilteredDevices() {
  let list = [...state.devices];
  const f = state.filters;
  const qf = state.quickFilter;

  // Quick filter
  if (qf === 'fault') list = list.filter(d => getDeviceOpenFaults(d.id).length > 0);
  else if (qf === 'maint') list = list.filter(d => { const s = getMaintStatus(d); return s === '即将到期' || s === '已逾期'; });
  else if (qf === 'noplan') list = list.filter(d => getDevicePlans(d.id).length === 0);

  // Advanced filters
  if (f.deviceType) list = list.filter(d => d.deviceType === f.deviceType);
  if (f.location) list = list.filter(d => d.location.includes(f.location));
  if (f.system) list = list.filter(d => d.applicableSystem.includes(f.system));
  if (f.onlineStatus) list = list.filter(d => d.onlineStatus === f.onlineStatus);
  if (f.health) {
    if (f.health === 'high') list = list.filter(d => d.health >= 80);
    else if (f.health === 'mid') list = list.filter(d => d.health >= 60 && d.health < 80);
    else list = list.filter(d => d.health < 60);
  }
  if (f.maintStatus) list = list.filter(d => getMaintStatus(d) === f.maintStatus);
  if (f.lifecycle) list = list.filter(d => d.lifecycle === f.lifecycle);
  if (f.keyword) {
    const kw = f.keyword.toLowerCase();
    list = list.filter(d => d.id.toLowerCase().includes(kw) || d.name.toLowerCase().includes(kw) || d.shortName.toLowerCase().includes(kw));
  }

  // Sort
  const { field, dir } = state.sort;
  list.sort((a, b) => {
    let va = a[field], vb = b[field];
    if (field === 'health') { va = +va; vb = +vb; }
    if (field === 'faultCount') { va = getDeviceOpenFaults(a.id).length; vb = getDeviceOpenFaults(b.id).length; }
    if (typeof va === 'string') return dir === 'asc' ? va.localeCompare(vb) : vb.localeCompare(va);
    return dir === 'asc' ? va - vb : vb - va;
  });
  return list;
}

      <select onchange="setFilter('system',this.value)"><option value="">适用系统</option>${systems.map(s=>`<option value="${s}" ${f.system===s?'selected':''}>${s}</option>`).join('')}</select>
      <select onchange="setFilter('onlineStatus',this.value)"><option value="">在线状态</option><option value="在线" ${f.onlineStatus==='在线'?'selected':''}>在线</option><option value="离线" ${f.onlineStatus==='离线'?'selected':''}>离线</option><option value="维护中" ${f.onlineStatus==='维护中'?'selected':''}>维护中</option></select>
      <select onchange="setFilter('health',this.value)"><option value="">健康度</option><option value="high" ${f.health==='high'?'selected':''}>≥80%</option><option value="mid" ${f.health==='mid'?'selected':''}>60-79%</option><option value="low" ${f.health==='low'?'selected':''}>< 60%</option></select>
      <select onchange="setFilter('maintStatus',this.value)"><option value="">保养状态</option><option value="正常" ${f.maintStatus==='正常'?'selected':''}>正常</option><option value="即将到期" ${f.maintStatus==='即将到期'?'selected':''}>即将到期</option><option value="已逾期" ${f.maintStatus==='已逾期'?'selected':''}>已逾期</option><option value="无计划" ${f.maintStatus==='无计划'?'selected':''}>无计划</option></select>
      <select onchange="setFilter('lifecycle',this.value)"><option value="">生命周期</option><option value="在用" ${f.lifecycle==='在用'?'selected':''}>在用</option><option value="闲置" ${f.lifecycle==='闲置'?'selected':''}>闲置</option><option value="报废" ${f.lifecycle==='报废'?'selected':''}>报废</option><option value="待验收" ${f.lifecycle==='待验收'?'selected':''}>待验收</option></select>
      <input type="text" placeholder="搜索编号/名称..." value="${f.keyword}" oninput="setFilter('keyword',this.value)" style="min-width:150px">
      <button class="btn btn-sm" onclick="resetFilters()">重置</button>
    </div>
  `;
}

function setFilter(k, v) { state.filters[k] = v; state.page = 1; renderTable(); }
function resetFilters() {
  state.filters = {deviceType:'',location:'',system:'',onlineStatus:'',health:'',maintStatus:'',lifecycle:'',keyword:''};
  state.quickFilter = 'all';
  state.page = 1;
  render();
}

function renderTable() {
  const list = getFilteredDevices();
  const total = list.length;
  const totalPages = Math.ceil(total / state.pageSize) || 1;
  if (state.page > totalPages) state.page = totalPages;
  const start = (state.page - 1) * state.pageSize;
  const pageData = list.slice(start, start + state.pageSize);
  const s = state.sort;

  function sortIcon(field) {
    if (s.field !== field) return '<span class="sort-icon"></span>';
    return `<span class="sort-icon ${s.dir}"></span>`;
  }

  document.getElementById('tableHead').innerHTML = `<tr>
    <th class="sortable" onclick="toggleSort('id')">设备编号${sortIcon('id')}</th>
    <th>设备名称</th>
    <th class="sortable" onclick="toggleSort('deviceType')">设备类型${sortIcon('deviceType')}</th>
    <th>安装位置</th>
    <th class="sortable" onclick="toggleSort('onlineStatus')">在线状态${sortIcon('onlineStatus')}</th>
    <th class="sortable" onclick="toggleSort('health')">健康度${sortIcon('health')}</th>
    <th class="sortable" onclick="toggleSort('faultCount')">故障${sortIcon('faultCount')}</th>
    <th style="text-align:center">使用</th>
    <th>保养状态</th>
    <th>生命周期</th>
    <th>操作</th>
  </tr>`;

  if (pageData.length === 0) {
    document.getElementById('tableBody').innerHTML = '<tr><td colspan="11" style="text-align:center;padding:40px;color:var(--text3)">暂无匹配设备</td></tr>';
  } else {
    document.getElementById('tableBody').innerHTML = pageData.map(d => {
      const openFaults = getDeviceOpenFaults(d.id).length;
      const ms = getMaintStatus(d);
      const msTag = ms === '正常' ? '<span class="tag tag-green">正常</span>' :
                    ms === '即将到期' ? '<span class="tag tag-orange">即将到期</span>' :
                    ms === '已逾期' ? '<span class="tag tag-red">已逾期</span>' :
                    '<span class="tag tag-purple">无计划</span>';
      const lcTag = d.lifecycle === '在用' ? '<span class="tag tag-green">在用</span>' :
                    d.lifecycle === '闲置' ? '<span class="tag tag-gray">闲置</span>' :
                    d.lifecycle === '报废' ? '<span class="tag tag-red">报废</span>' :
                    '<span class="tag tag-blue">待验收</span>';
      const onDot = d.onlineStatus === '在线' ? 'dot-green' : d.onlineStatus === '维护中' ? 'dot-blue' : 'dot-gray';
      return `<tr onclick="openDrawer('${d.id}')">
        <td style="font-weight:600;color:var(--primary)">${d.id}</td>
        <td style="max-width:240px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${d.name}">${d.name}</td>
        <td><span class="tag tag-blue">${d.deviceType}</span></td>
        <td style="white-space:nowrap">${getLocationShort(d.location)}</td>
        <td><span class="status-badge"><span class="status-dot ${onDot}"></span>${d.onlineStatus}</span></td>
        <td><div class="health-bar"><div class="health-bar-inner" style="width:${d.health}%;background:${getHealthColor(d.health)}"></div></div>${d.health}%</td>
        <td style="text-align:center" onclick="event.stopPropagation()"><button class="usage-icon-btn" onclick="openFaultListModal('${d.id}')" title="查看故障/报修记录" style="font-size:14px">${openFaults > 0 ? `&#x1F6A8;` : `&#x1F6E0;`}${openFaults > 0 ? '<span class="usage-count" style="background:var(--danger)">'+openFaults+'</span>' : ''}</button></td>
        <td style="text-align:center" onclick="event.stopPropagation()"><button class="usage-icon-btn" onclick="openUsageListModal('${d.id}')" title="查看使用记录">&#x1F4CA;${(() => { const uc = getDeviceUsage(d.id).length; return uc > 0 ? '<span class="usage-count">'+uc+'</span>' : ''; })()}</button></td>
        <td>${msTag}</td>
        <td>${lcTag}</td>
        <td onclick="event.stopPropagation()">
          <button class="btn-link" onclick="openDrawer('${d.id}')">详情</button>
          <button class="btn-link" onclick="openEditExtModal('${d.id}')">编辑</button>
          <button class="btn-link" onclick="openFaultModal('${d.id}')">报修</button>
          <button class="btn-link" onclick="openExecMaintModal('${d.id}')">保养</button>
          <button class="btn-link danger" onclick="openDeleteModal('${d.id}')">删除</button>
        </td>
      </tr>`;
    }).join('');
  }

  // Pagination
  let pagesHtml = '';
  for (let i = 1; i <= totalPages; i++) {
    pagesHtml += `<button class="page-btn ${i===state.page?'active':''}" onclick="goPage(${i})">${i}</button>`;
  }
  document.getElementById('pagination').innerHTML = `
    <span>共 ${total} 条记录，第 ${state.page}/${totalPages} 页</span>
    <div class="pages">${pagesHtml}</div>
  `;
}

function toggleSort(field) {
  if (state.sort.field === field) state.sort.dir = state.sort.dir === 'asc' ? 'desc' : 'asc';
  else { state.sort.field = field; state.sort.dir = 'asc'; }
  renderTable();
}

function goPage(p) { state.page = p; renderTable(); }

// ==================== DRAWER ====================
function openDrawer(deviceId) {
  state.openDeviceId = deviceId;
  const d = state.devices.find(x => x.id === deviceId);
  if (!d) return;
  document.getElementById('drawerOverlay').classList.add('show');
  const drawer = document.getElementById('drawer');
  drawer.classList.add('show');
  renderDrawer(d);
}

function closeDrawer() {
  document.getElementById('drawerOverlay').classList.remove('show');
  document.getElementById('drawer').classList.remove('show');
  state.openDeviceId = null;
}

function renderDrawer(d) {
  const drawer = document.getElementById('drawer');
  drawer.innerHTML = `
    <div class="drawer-header">
      <h3>${d.id} ${d.shortName}</h3>
      <div class="actions">
        <button class="btn btn-sm" onclick="openEditExtModal('${d.id}')">编辑扩展信息</button>
        <button class="btn btn-sm btn-danger" onclick="openDeleteModal('${d.id}')">删除设备</button>
        <button class="modal-close" onclick="closeDrawer()">&times;</button>
      </div>
    </div>
    <div class="drawer-body">
      ${renderPanel1(d)}
      ${renderPanel2(d)}
      ${renderPanel3(d)}
      ${renderPanel4(d)}
      ${renderPanel5(d)}
      ${renderPanel6(d)}
    </div>
  `;
  // Init charts in usage panel after DOM ready
  setTimeout(() => renderUsageChart(d.id), 100);
}

// Panel 2: Hardware Params
function renderPanel2(d) {
  const rows = (d.params || []).map((p, i) => `<tr>
    <td><input value="${p.name}" onchange="updateParam('${d.id}',${i},'name',this.value)"></td>
    <td><input value="${p.value}" onchange="updateParam('${d.id}',${i},'value',this.value)"></td>
    <td><input value="${p.unit}" onchange="updateParam('${d.id}',${i},'unit',this.value)" style="width:60px"></td>

    <td style="text-align:center"><button class="btn-link danger" onclick="removeParam('${d.id}',${i})">删除</button></td>
  </tr>`).join('');
  return `<div class="collapse-panel" id="panel2">
    <div class="collapse-header" onclick="togglePanel('panel2')">
      <h4><span class="collapse-arrow">&#9654;</span> 硬件参数与技术参数</h4>
      <button class="btn btn-sm" onclick="event.stopPropagation();showToast('参数已进入编辑模式','success')">编辑参数</button>

    <div class="collapse-content">
      <table class="param-table">

function updateParam(deviceId, idx, field, val) {
  const d = state.devices.find(x => x.id === deviceId);
  if (d && d.params[idx]) { d.params[idx][field] = val; }
}
function removeParam(deviceId, idx) {
  const d = state.devices.find(x => x.id === deviceId);
  if (d) { d.params.splice(idx, 1); renderDrawer(d); showToast('已删除参数'); }
}
function addParam(deviceId) {
  const d = state.devices.find(x => x.id === deviceId);
  if (d) { d.params.push({name:'',value:'',unit:'',note:''}); renderDrawer(d); showToast('已添加新参数行','success'); }
}

// Panel 3: Usage Records
function renderPanel3(d) {
  const records = getDeviceUsage(d.id);
  const today = records.filter(r => r.date === '2026-06-17');
  const thisWeek = records.filter(r => r.date >= '2026-06-11' && r.date <= '2026-06-17');
  const thisMonth = records.filter(r => r.date >= '2026-06-01');
  const thisYear = records;
  const todayHours = today.reduce((s, r) => s + r.duration, 0);
  const weekHours = thisWeek.reduce((s, r) => s + r.duration, 0);
  const monthHours = thisMonth.reduce((s, r) => s + r.duration, 0);
  const yearHours = thisYear.reduce((s, r) => s + r.duration, 0);

  const cards = records.map((r, i) => `
    <div class="usage-card ${i < 2 ? 'expanded' : ''}" id="usage-${r.id}">
      <div class="usage-card-header" onclick="toggleUsageCard(${r.id})">
        <div class="date">${r.date} &nbsp; ${r.duration}h</div>
        <span class="tag ${r.status === '正常' ? 'tag-green' : 'tag-red'}">${r.status}</span>
      </div>
      <div class="usage-card-body">
        <div class="item">&#x1F464; ${r.person}</div>
        <div class="item">&#x1F3EB; ${r.classGroup}</div>
        <div class="item">&#x1F4D6; ${r.subject}</div>
      </div>
      <div class="usage-card-detail">
        <div style="color:var(--text);margin-bottom:4px"><strong>运行日志：</strong>${r.detail}</div>
        ${r.remark ? `<div style="color:var(--text3)">备注：${r.remark}</div>` : ''}
      </div>
    </div>
  `).join('');

  return `<div class="collapse-panel" id="panel3">
    <div class="collapse-header" onclick="togglePanel('panel3')">
      <h4><span class="collapse-arrow">&#9654;</span> 使用记录 <span class="tag tag-blue" style="font-weight:400">${records.length}</span></h4>
      <button class="btn btn-sm btn-primary" onclick="event.stopPropagation();openUsageModal('${d.id}')">+ 新增使用记录</button>
    </div>
    <div class="collapse-content">
      <div class="mini-stats">
        <div class="mini-stat"><div class="ms-label">本日</div><div class="ms-value">${today.length}次/${todayHours}h</div></div>
        <div class="mini-stat"><div class="ms-label">本周</div><div class="ms-value">${thisWeek.length}次/${weekHours}h</div></div>
        <div class="mini-stat"><div class="ms-label">本月</div><div class="ms-value">${thisMonth.length}次/${monthHours}h</div></div>
        <div class="mini-stat"><div class="ms-label">本年</div><div class="ms-value">${thisYear.length}次/${yearHours}h</div></div>
      </div>
      <div id="usageChart-${d.id}" style="height:160px;margin:16px 0"></div>
      ${records.length > 0 ? cards : '<div style="text-align:center;padding:20px;color:var(--text3)">暂无使用记录</div>'}
    </div>
  </div>`;
}

function renderUsageChart(deviceId) {
  const el = document.getElementById('usageChart-' + deviceId);
  if (!el) return;
  const records = getDeviceUsage(deviceId);
  const days = ['6/11','6/12','6/13','6/14','6/15','6/16','6/17'];
  const dates = ['2026-06-11','2026-06-12','2026-06-13','2026-06-14','2026-06-15','2026-06-16','2026-06-17'];
  const data = dates.map(dt => records.filter(r => r.date === dt).reduce((s, r) => s + r.duration, 0));
  const chart = echarts.init(el);
  chart.setOption({
    title: { text: '近7天使用时长(小时)', textStyle: { fontSize: 12, fontWeight: 500 }, left: 0 },
    grid: { left: 35, right: 10, top: 30, bottom: 20 },
    xAxis: { type: 'category', data: days, axisLabel: { fontSize: 11 } },
    yAxis: { type: 'value', axisLabel: { fontSize: 11 }, splitLine: { lineStyle: { type: 'dashed' } } },
    series: [{ type: 'bar', data: data, barWidth: 20, itemStyle: { color: '#1677ff', borderRadius: [4, 4, 0, 0] } }],
    tooltip: { trigger: 'axis' }
  });
}

function toggleUsageCard(id) {
  const el = document.getElementById('usage-' + id);
  if (el) el.classList.toggle('expanded');
}

// ==================== Usage List Modal ====================
let usageListState = { deviceId: '', page: 1, pageSize: 8, filters: { status: '', keyword: '', period: '' } };

function openUsageListModal(deviceId) {
  usageListState.deviceId = deviceId;
  usageListState.page = 1;
  usageListState.filters = { status: '', keyword: '', period: '' };
  const d = state.devices.find(x => x.id === deviceId);
  document.getElementById('usageListTitle').textContent = d.name + ' — 使用记录';
  renderUsageListModal();
  document.getElementById('usageListOverlay').classList.add('open');
  setTimeout(() => renderUsageListChart(), 100);
}
function closeUsageListModal() { document.getElementById('usageListOverlay').classList.remove('open'); }

function getFilteredUsageRecords() {
  let list = getDeviceUsage(usageListState.deviceId);
  const f = usageListState.filters;
  if (f.status) list = list.filter(r => r.status === f.status);
  if (f.keyword) { const kw = f.keyword.toLowerCase(); list = list.filter(r => (r.person + r.classGroup + r.subject + (r.detail||'')).toLowerCase().includes(kw)); }
  if (f.period === 'today') list = list.filter(r => r.date === '2026-06-17');
  else if (f.period === 'week') list = list.filter(r => r.date >= '2026-06-11');
  else if (f.period === 'month') list = list.filter(r => r.date >= '2026-06-01');
  return list;
}

function renderUsageListModal() {
  const allRecords = getDeviceUsage(usageListState.deviceId);
  const filtered = getFilteredUsageRecords();
  const total = filtered.length;
  const totalPages = Math.ceil(total / usageListState.pageSize) || 1;
  if (usageListState.page > totalPages) usageListState.page = totalPages;
  const start = (usageListState.page - 1) * usageListState.pageSize;
  const pageData = filtered.slice(start, start + usageListState.pageSize);
  const f = usageListState.filters;

  const today = allRecords.filter(r => r.date === '2026-06-17');
  const week = allRecords.filter(r => r.date >= '2026-06-11');
  const month = allRecords.filter(r => r.date >= '2026-06-01');
  const todayH = today.reduce((s, r) => s + r.duration, 0);
  const weekH = week.reduce((s, r) => s + r.duration, 0);
  const monthH = month.reduce((s, r) => s + r.duration, 0);
  const totalH = allRecords.reduce((s, r) => s + r.duration, 0);
  const abnormal = allRecords.filter(r => r.status === '异常').length;

  document.getElementById('usageListBody').innerHTML = `
    <div class="mini-stats" style="margin-bottom:16px">
      <div class="mini-stat"><div class="ms-label">本日</div><div class="ms-value">${today.length}次 / ${todayH}h</div></div>
      <div class="mini-stat"><div class="ms-label">本周</div><div class="ms-value">${week.length}次 / ${weekH}h</div></div>
      <div class="mini-stat"><div class="ms-label">本月</div><div class="ms-value">${month.length}次 / ${monthH}h</div></div>
      <div class="mini-stat"><div class="ms-label">累计</div><div class="ms-value">${allRecords.length}次 / ${totalH}h</div></div>
      <div class="mini-stat"><div class="ms-label">异常次数</div><div class="ms-value" style="color:${abnormal>0?'var(--danger)':'var(--success)'}">${abnormal}</div></div>
    </div>
    <div id="usageListChart" style="height:180px;margin-bottom:16px"></div>
    <div class="usage-filter-bar">
      <select onchange="setUsageFilter('period',this.value)">
        <option value="">全部时间</option>
        <option value="today" ${f.period==='today'?'selected':''}>今日</option>
        <option value="week" ${f.period==='week'?'selected':''}>本周</option>
        <option value="month" ${f.period==='month'?'selected':''}>本月</option>
      </select>
      <select onchange="setUsageFilter('status',this.value)">
        <option value="">全部状态</option>
        <option value="正常" ${f.status==='正常'?'selected':''}>正常</option>
        <option value="异常" ${f.status==='异常'?'selected':''}>异常</option>
      </select>
      <input type="text" placeholder="搜索人员/班级/科目..." value="${f.keyword}" oninput="setUsageFilter('keyword',this.value)" style="min-width:180px">
      <button class="btn btn-sm" onclick="resetUsageFilters()">重置</button>
      <span style="margin-left:auto;font-size:12px;color:var(--text3)">共 ${total} 条记录</span>
    </div>
    <table class="usage-table">
      <thead><tr>
        <th>日期</th><th>时长</th><th>使用人员</th><th>班级/部门</th><th>训练科目</th><th>运行状态</th><th>操作</th>
      </tr></thead>
      <tbody>${pageData.length > 0 ? pageData.map(r => `<tr>
        <td style="white-space:nowrap">${r.date}</td>
        <td>${r.duration}h</td>
        <td>${r.person}</td>
        <td>${r.classGroup}</td>
        <td>${r.subject}</td>
        <td><span class="tag ${r.status==='正常'?'tag-green':'tag-red'}">${r.status}</span></td>
        <td><button class="btn-link" onclick="toggleUsageDetail(this)" style="font-size:12px">详情</button></td>
      </tr>
      <tr class="usage-detail-row" style="display:none"><td colspan="7" style="background:#fafafa;padding:10px 12px">
        <div style="font-size:13px;color:var(--text2)"><strong>运行日志：</strong>${r.detail||'无'}</div>
        ${r.remark?'<div style="font-size:12px;color:var(--text3);margin-top:4px">备注：'+r.remark+'</div>':''}
      </td></tr>`).join('') : '<tr><td colspan="7" style="text-align:center;padding:30px;color:var(--text3)">无匹配记录</td></tr>'}</tbody>
    </table>
    ${totalPages > 1 ? `<div style="display:flex;justify-content:flex-end;align-items:center;gap:4px;margin-top:12px;padding:8px 0">
      <button class="btn btn-sm" onclick="usageListPage(${usageListState.page-1})" ${usageListState.page<=1?'disabled':''}>上一页</button>
      ${Array.from({length:totalPages},(_,i)=>`<button class="btn btn-sm ${i+1===usageListState.page?'btn-primary':''}" onclick="usageListPage(${i+1})">${i+1}</button>`).join('')}
      <button class="btn btn-sm" onclick="usageListPage(${usageListState.page+1})" ${usageListState.page>=totalPages?'disabled':''}>下一页</button>
    </div>` : ''}
  `;
}

function setUsageFilter(k, v) { usageListState.filters[k] = v; usageListState.page = 1; renderUsageListModal(); setTimeout(() => renderUsageListChart(), 50); }
function resetUsageFilters() { usageListState.filters = { status: '', keyword: '', period: '' }; usageListState.page = 1; renderUsageListModal(); setTimeout(() => renderUsageListChart(), 50); }
function usageListPage(p) { if (p < 1) return; usageListState.page = p; renderUsageListModal(); setTimeout(() => renderUsageListChart(), 50); }

function toggleUsageDetail(btn) {
  const detailRow = btn.closest('tr').nextElementSibling;
  if (detailRow) { const vis = detailRow.style.display === 'none'; detailRow.style.display = vis ? 'table-row' : 'none'; btn.textContent = vis ? '收起' : '详情'; }
}

function renderUsageListChart() {
  const el = document.getElementById('usageListChart');
  if (!el || !el.offsetParent) return;
  const records = getDeviceUsage(usageListState.deviceId);
  const days = ['6/11','6/12','6/13','6/14','6/15','6/16','6/17'];
  const dates = ['2026-06-11','2026-06-12','2026-06-13','2026-06-14','2026-06-15','2026-06-16','2026-06-17'];
  const hours = dates.map(dt => records.filter(r => r.date === dt).reduce((s, r) => s + r.duration, 0));
  const counts = dates.map(dt => records.filter(r => r.date === dt).length);
  const chart = echarts.init(el);
  chart.setOption({
    title: { text: '近7天使用趋势', textStyle: { fontSize: 13, fontWeight: 500 }, left: 0 },
    tooltip: { trigger: 'axis' },
    legend: { data: ['使用时长(h)', '使用次数'], right: 0, textStyle: { fontSize: 11 } },
    grid: { left: 40, right: 40, top: 40, bottom: 24 },
    xAxis: { type: 'category', data: days, axisLabel: { fontSize: 11 } },
    yAxis: [
      { type: 'value', name: '时长(h)', axisLabel: { fontSize: 10 }, splitLine: { lineStyle: { type: 'dashed' } } },
      { type: 'value', name: '次数', axisLabel: { fontSize: 10 }, splitLine: { show: false } }
    ],
    series: [
      { name: '使用时长(h)', type: 'bar', data: hours, barWidth: 18, itemStyle: { color: '#1677ff', borderRadius: [4,4,0,0] } },
      { name: '使用次数', type: 'line', yAxisIndex: 1, data: counts, smooth: true, lineStyle: { color: '#faad14' }, itemStyle: { color: '#faad14' } }
    ]
  });
}

// ==================== FAULT LIST MODAL ====================
let faultListState = { deviceId: null, filters: { status: '', keyword: '' }, page: 1, pageSize: 5, expandedForms: {} };

function openFaultListModal(deviceId) {
  faultListState.deviceId = deviceId;
  faultListState.filters = { status: '', keyword: '' };
  faultListState.page = 1;
  faultListState.expandedForms = {};
  const d = state.devices.find(x => x.id === deviceId);
  document.getElementById('faultListTitle').textContent = (d ? d.id + ' ' + d.shortName : '') + ' — 故障/报修记录';
  document.getElementById('faultListAddBtn').setAttribute('onclick', "closeFaultListModal();openFaultModal('" + deviceId + "')");
  document.getElementById('faultListOverlay').classList.add('show');
  renderFaultListModal();
}

function closeFaultListModal() {
  document.getElementById('faultListOverlay').classList.remove('show');
  faultListState.deviceId = null;
}

function getFilteredFaults() {
  let list = getDeviceFaults(faultListState.deviceId).sort((a, b) => b.reportTime.localeCompare(a.reportTime));
  const f = faultListState.filters;
  if (f.status) list = list.filter(x => x.status === f.status);
  if (f.keyword) { const kw = f.keyword.toLowerCase(); list = list.filter(x => x.desc.toLowerCase().includes(kw) || x.type.toLowerCase().includes(kw) || x.reporter.toLowerCase().includes(kw) || (x.assignee && x.assignee.toLowerCase().includes(kw))); }
  return list;
}

function setFaultFilter(k, v) { faultListState.filters[k] = v; faultListState.page = 1; renderFaultListModal(); }
function resetFaultFilters() { faultListState.filters = { status: '', keyword: '' }; faultListState.page = 1; renderFaultListModal(); }
function faultListPage(p) { if (p < 1) return; faultListState.page = p; renderFaultListModal(); }

function toggleFaultForm(faultId, formType) {
  const key = faultId + '-' + formType;
  if (faultListState.expandedForms[key]) { delete faultListState.expandedForms[key]; }
  else { faultListState.expandedForms = {}; faultListState.expandedForms[key] = true; }
  renderFaultListModal();
}

function renderFaultListModal() {
  const allFaults = getDeviceFaults(faultListState.deviceId);
  const filtered = getFilteredFaults();
  const total = filtered.length;
  const totalPages = Math.max(1, Math.ceil(total / faultListState.pageSize));
  if (faultListState.page > totalPages) faultListState.page = totalPages;
  const start = (faultListState.page - 1) * faultListState.pageSize;
  const pageData = filtered.slice(start, start + faultListState.pageSize);

  const pending = allFaults.filter(f => f.status === '待处理').length;
  const processing = allFaults.filter(f => f.status === '处理中').length;
  const verifying = allFaults.filter(f => f.status === '待验收').length;
  const done = allFaults.filter(f => f.status === '已完成').length;

  const statusOrder = {'待处理':0,'处理中':1,'待验收':2,'已完成':3};
  const cards = pageData.map(f => {
    const si = statusOrder[f.status];
    const steps = ['报修','分配','维修','验收'];
    const stepsHtml = steps.map((s, i) => {
      const dotClass = i < si ? 'done' : i === si ? 'current' : 'pending';
      const lineClass = i < si ? 'done' : '';
      return `<div class="fault-step"><div class="step-dot ${dotClass}">${i < si ? '✓' : i + 1}</div><span style="font-size:11px;color:${i<=si?'var(--text)':'var(--text3)'}">${s}</span>${i < steps.length - 1 ? `<div class="step-line ${lineClass}"></div>` : ''}</div>`;
    }).join('');

    const urgTag = f.urgency === '紧急' ? '<span class="tag tag-red">紧急</span>' : '<span class="tag tag-orange">一般</span>';
    const statusTag = f.status === '待处理' ? '<span class="tag tag-red">待处理</span>' :
                      f.status === '处理中' ? '<span class="tag tag-blue">处理中</span>' :
                      f.status === '待验收' ? '<span class="tag tag-orange">待验收</span>' :
                      '<span class="tag tag-green">已完成</span>';

    const tlHtml = f.timeline.map(t => `<div class="timeline-item"><div class="tl-time">${t.time}</div><div class="tl-content">${t.content}</div></div>`).join('');

    let actionsHtml = '';
    let formHtml = '';
    const assignKey = f.id + '-assign';
    const repairKey = f.id + '-repair';
    const acceptKey = f.id + '-accept';

    if (f.status === '待处理') {
      actionsHtml = `<button class="btn btn-sm btn-primary" onclick="toggleFaultForm(${f.id},'assign')">分配处理人</button>`;
      if (faultListState.expandedForms[assignKey]) {
        formHtml = `<div class="fault-form-inline">
          <div class="form-group"><label>处理人 <span style="color:var(--danger)">*</span></label>
            <select id="fault-assign-${f.id}">
              <option value="">请选择处理人</option>
              <option>技术部-孙工</option><option>技术部-马工</option><option>IT运维-小李</option>
              <option>网络运维-周工</option><option>设备厂家</option><option>捷安高科-研发</option>
            </select></div>
          <div class="form-group"><label>处理要求</label><input id="fault-assign-note-${f.id}" placeholder="选填，如: 优先处理"></div>
          <div style="display:flex;gap:8px"><button class="btn btn-sm btn-primary" onclick="doAssignFault(${f.id})">确认分配</button><button class="btn btn-sm" onclick="toggleFaultForm(${f.id},'assign')">取消</button></div>
        </div>`;
      }
    } else if (f.status === '处理中') {
      actionsHtml = `<button class="btn btn-sm btn-success" onclick="toggleFaultForm(${f.id},'repair')">提交维修结果</button>`;
      if (faultListState.expandedForms[repairKey]) {
        formHtml = `<div class="fault-form-inline">
          <div class="form-group"><label>维修人员 <span style="color:var(--danger)">*</span></label><input id="fault-repair-person-${f.id}" value="${f.assignee}" placeholder="维修人"></div>
          <div class="form-group"><label>维修结果描述 <span style="color:var(--danger)">*</span></label><textarea id="fault-repair-desc-${f.id}" placeholder="请描述维修过程和结果..."></textarea></div>
          <div class="form-group"><label>更换部件</label><input id="fault-repair-parts-${f.id}" placeholder="如无则留空"></div>
          <div style="display:flex;gap:8px"><button class="btn btn-sm btn-success" onclick="doRepairFault(${f.id})">提交维修结果</button><button class="btn btn-sm" onclick="toggleFaultForm(${f.id},'repair')">取消</button></div>
        </div>`;
      }
    } else if (f.status === '待验收') {
      actionsHtml = `<button class="btn btn-sm btn-success" onclick="toggleFaultForm(${f.id},'accept')">验收</button>`;
      if (faultListState.expandedForms[acceptKey]) {
        formHtml = `<div class="fault-form-inline">
          <div class="form-group"><label>验收结果 <span style="color:var(--danger)">*</span></label>
            <div class="radio-group"><label><input type="radio" name="fault-accept-${f.id}" value="pass" checked> 验收通过</label><label><input type="radio" name="fault-accept-${f.id}" value="rework"> 返工</label></div></div>
          <div class="form-group"><label>验收意见</label><textarea id="fault-accept-note-${f.id}" placeholder="选填，返工时请说明原因"></textarea></div>
          <div style="display:flex;gap:8px"><button class="btn btn-sm btn-success" onclick="doAcceptFault(${f.id})">确认</button><button class="btn btn-sm" onclick="toggleFaultForm(${f.id},'accept')">取消</button></div>
        </div>`;
      }
    }

    return `<div class="fault-card">
      <div class="fault-card-head">
        <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">${urgTag} ${statusTag} <span class="tag tag-gray">${f.type}</span></div>
        <span style="font-size:12px;color:var(--text3)">#${f.id}</span>
      </div>
      <div class="fault-card-desc">${f.desc}</div>
      <div class="fault-card-meta">
        <span>报修人: ${f.reporter}</span>
        <span>报修时间: ${f.reportTime}</span>
        ${f.assignee ? `<span>处理人: <strong>${f.assignee}</strong></span>` : ''}
        ${f.photos ? `<span>照片: ${f.photos}张</span>` : ''}
      </div>
      <div style="overflow-x:auto;margin:10px 0">${stepsHtml}</div>
      <details style="margin-top:4px"><summary style="font-size:12px;color:var(--primary);cursor:pointer">处理时间线 (${f.timeline.length})</summary><div class="timeline" style="margin-top:4px">${tlHtml}</div></details>
      ${actionsHtml || formHtml ? `<div class="fault-card-actions">${actionsHtml}</div>` : ''}
      ${formHtml}
    </div>`;
  }).join('');

  document.getElementById('faultListBody').innerHTML = `
    <div class="fault-summary-row">
      <div class="fault-summary-item"><div class="fs-val" style="color:var(--danger)">${pending}</div><div class="fs-label">待处理</div></div>
      <div class="fault-summary-item"><div class="fs-val" style="color:var(--primary)">${processing}</div><div class="fs-label">处理中</div></div>
      <div class="fault-summary-item"><div class="fs-val" style="color:var(--warning)">${verifying}</div><div class="fs-label">待验收</div></div>
      <div class="fault-summary-item"><div class="fs-val" style="color:var(--success)">${done}</div><div class="fs-label">已完成</div></div>
      <div class="fault-summary-item"><div class="fs-val">${allFaults.length}</div><div class="fs-label">全部</div></div>
    </div>
    <div class="fault-filter-bar">
      <select onchange="setFaultFilter('status',this.value)"><option value="">全部状态</option><option value="待处理" ${faultListState.filters.status==='待处理'?'selected':''}>待处理</option><option value="处理中" ${faultListState.filters.status==='处理中'?'selected':''}>处理中</option><option value="待验收" ${faultListState.filters.status==='待验收'?'selected':''}>待验收</option><option value="已完成" ${faultListState.filters.status==='已完成'?'selected':''}>已完成</option></select>
      <input type="text" placeholder="搜索故障描述/类型/人员..." value="${faultListState.filters.keyword}" onchange="setFaultFilter('keyword',this.value)" style="min-width:200px">
      <button class="btn btn-sm" onclick="resetFaultFilters()">重置</button>
      <span style="margin-left:auto;font-size:12px;color:var(--text3)">共 ${total} 条</span>
    </div>
    ${total > 0 ? cards : '<div style="text-align:center;padding:40px;color:var(--text3)">暂无故障记录</div>'}
    ${totalPages > 1 ? `<div style="display:flex;justify-content:center;gap:4px;margin-top:12px">
      <button class="btn btn-sm" onclick="faultListPage(${faultListState.page-1})" ${faultListState.page<=1?'disabled':''}>上一页</button>
      ${Array.from({length:totalPages},(_,i)=>`<button class="btn btn-sm ${i+1===faultListState.page?'btn-primary':''}" onclick="faultListPage(${i+1})">${i+1}</button>`).join('')}
      <button class="btn btn-sm" onclick="faultListPage(${faultListState.page+1})" ${faultListState.page>=totalPages?'disabled':''}>下一页</button>
    </div>` : ''}
  `;
}

function doAssignFault(faultId) {
  const assignee = document.getElementById('fault-assign-' + faultId)?.value;
  const note = document.getElementById('fault-assign-note-' + faultId)?.value || '';
  if (!assignee) { showToast('请选择处理人','error'); return; }
  const f = state.faults.find(x => x.id === faultId);
  if (f) {
    f.status = '处理中';
    f.assignee = assignee;
    f.timeline.push({time: '2026-06-17 ' + new Date().toTimeString().slice(0,5), content: '已分配给' + assignee + '处理' + (note ? '。要求: ' + note : '')});
    showToast('已分配处理人','success');
    delete faultListState.expandedForms[faultId + '-assign'];
    renderFaultListModal();
    render();
    refreshDrawer();
  }
}

function doRepairFault(faultId) {
  const person = document.getElementById('fault-repair-person-' + faultId)?.value;
  const desc = document.getElementById('fault-repair-desc-' + faultId)?.value;
  const parts = document.getElementById('fault-repair-parts-' + faultId)?.value || '';
  if (!person || !desc) { showToast('请填写维修人员和结果描述','error'); return; }
  const f = state.faults.find(x => x.id === faultId);
  if (f) {
    f.status = '待验收';
    f.timeline.push({time: '2026-06-17 ' + new Date().toTimeString().slice(0,5), content: person + '维修完成: ' + desc + (parts ? '（更换部件: ' + parts + ')' : '') + '，提交验收'});
    showToast('维修结果已提交，待报修人验收','success');
    delete faultListState.expandedForms[faultId + '-repair'];
    renderFaultListModal();
    render();
    refreshDrawer();
  }
}

function doAcceptFault(faultId) {
  const result = document.querySelector('input[name="fault-accept-' + faultId + '"]:checked')?.value;
  const note = document.getElementById('fault-accept-note-' + faultId)?.value || '';
  const f = state.faults.find(x => x.id === faultId);
  if (f) {
    if (result === 'rework') {
      if (!note) { showToast('返工请填写原因','error'); return; }
      f.status = '处理中';
      f.timeline.push({time: '2026-06-17 ' + new Date().toTimeString().slice(0,5), content: '验收不通过，返工。原因: ' + note});
      showToast('已退回返工','success');
    } else {
      f.status = '已完成';
      f.timeline.push({time: '2026-06-17 ' + new Date().toTimeString().slice(0,5), content: '验收通过' + (note ? '。意见: ' + note : '') + '，故障已关闭'});
      showToast('验收通过','success');
    }
    delete faultListState.expandedForms[faultId + '-accept'];
    renderFaultListModal();
    render();
    refreshDrawer();
  }
}

// Panel 4: Fault Records (summary only, full workflow in fault list modal)
function renderPanel4(d) {
  const faults = getDeviceFaults(d.id);
  const open = faults.filter(f => f.status !== '已完成');
  const pending = faults.filter(f => f.status === '待处理').length;
  const processing = faults.filter(f => f.status === '处理中').length;
  const verifying = faults.filter(f => f.status === '待验收').length;
  const done = faults.filter(f => f.status === '已完成').length;

  const summaryItems = [];
  if (pending) summaryItems.push(`<span class="tag tag-red">待处理 ${pending}</span>`);
  if (processing) summaryItems.push(`<span class="tag tag-blue">处理中 ${processing}</span>`);
  if (verifying) summaryItems.push(`<span class="tag tag-orange">待验收 ${verifying}</span>`);
  if (done) summaryItems.push(`<span class="tag tag-green">已完成 ${done}</span>`);

  const recentFaults = faults.sort((a, b) => b.reportTime.localeCompare(a.reportTime)).slice(0, 3);
  const recentHtml = recentFaults.map(f => {
    const statusTag = f.status === '待处理' ? '<span class="tag tag-red">待处理</span>' :
                      f.status === '处理中' ? '<span class="tag tag-blue">处理中</span>' :
                      f.status === '待验收' ? '<span class="tag tag-orange">待验收</span>' :
                      '<span class="tag tag-green">已完成</span>';
    return `<div style="padding:6px 0;border-bottom:1px solid #f0f0f0;font-size:13px;display:flex;justify-content:space-between;align-items:center;gap:8px">
      <span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${f.desc}</span>
      <span style="flex-shrink:0">${statusTag}</span>
    </div>`;
  }).join('');

  return `<div class="collapse-panel" id="panel4">
    <div class="collapse-header" onclick="togglePanel('panel4')">
      <h4><span class="collapse-arrow">&#9654;</span> 故障记录 <span class="tag tag-red" style="font-weight:400">${open.length} 未完成</span></h4>
      <button class="btn btn-sm btn-danger" onclick="event.stopPropagation();openFaultModal('${d.id}')">+ 报修</button>
    </div>
    <div class="collapse-content">
      <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px">${summaryItems.join('') || '<span style="color:var(--text3)">暂无故障</span>'}</div>
      ${recentHtml ? `<div style="margin-bottom:12px">${recentHtml}</div>` : ''}
      <button class="btn btn-sm btn-primary" onclick="closeDrawer();openFaultListModal('${d.id}')" style="width:100%">查看全部故障记录 & 处理流程 (${faults.length})</button>
    </div>
  </div>`;
}


// Panel 5: Maintenance
function renderPanel5(d) {
  const plans = getDevicePlans(d.id);
  const history = getDeviceHistory(d.id);
  const usage = getDeviceUsage(d.id);

  // Prediction alerts
  let alerts = '';
  if (plans.length === 0) {
    alerts += `<div class="predict-alert warn"><span class="alert-icon">&#x26A0;&#xFE0F;</span><div>该设备尚未配置保养计划，建议根据设备类型和使用频率制定保养计划。<button class="btn btn-sm btn-warning" style="margin-left:8px" onclick="openMaintPlanModal('${d.id}')">立即制定</button></div></div>`;
  }
  if (d.health < 60) {
    alerts += `<div class="predict-alert danger"><span class="alert-icon">&#x1F6A8;</span><div>设备健康度偏低（${d.health}%），建议尽快安排专项检查。</div></div>`;
  }
  if (history.length > 0) {
    const lastDate = history[0].date;
    const daysSince = Math.floor((new Date('2026-06-17') - new Date(lastDate)) / 86400000);
    if (daysSince > 90) {
      alerts += `<div class="predict-alert warn"><span class="alert-icon">&#x23F0;</span><div>距上次保养已 ${daysSince} 天，建议安排保养。</div></div>`;
    }
  }
  // Usage frequency prediction
  const recent30 = usage.filter(u => u.date >= '2026-05-18');
  if (recent30.length > 0 && plans.length > 0) {
    const avgInterval = 30 / recent30.length;
    const predictDays = Math.round(avgInterval * 10);
    alerts += `<div class="predict-alert info"><span class="alert-icon">&#x1F4CA;</span><div>该设备近30天使用 ${recent30.length} 次，按当前使用强度，预计 ${predictDays} 天后需要保养。</div></div>`;
  }

  const planCards = plans.map(p => {
    const isOverdue = p.nextDate < '2026-06-17';
    const isSoon = !isOverdue && p.nextDate <= '2026-06-24';
    const statusTag = isOverdue ? '<span class="tag tag-red">已逾期</span>' : isSoon ? '<span class="tag tag-orange">即将到期</span>' : '<span class="tag tag-green">正常</span>';
    const typeTag = p.type === '日常' ? '<span class="tag tag-blue">日常</span>' : p.type === '定期' ? '<span class="tag tag-green">定期</span>' : '<span class="tag tag-purple">专项</span>';
    return `<div class="maint-card">
      <div class="maint-card-header">${typeTag} ${statusTag} <span style="font-size:12px;color:var(--text3)">周期: ${p.cycle}</span></div>
      <div class="maint-info"><div class="item">内容: ${p.content}</div></div>
      <div class="maint-info"><div class="item">责任人: ${p.responsible}</div><div class="item">下次保养: ${p.nextDate}</div>${p.lastDate ? `<div class="item">上次保养: ${p.lastDate}</div>` : ''}</div>
      <div style="margin-top:8px"><button class="btn btn-sm btn-success" onclick="openExecMaintModal('${d.id}',${p.id})">执行保养</button></div>
    </div>`;
  }).join('');

  const historyHtml = history.map(h => {
    const resultTag = h.result === '正常' ? '<span class="tag tag-green">正常</span>' : h.result === '需关注' ? '<span class="tag tag-orange">需关注</span>' : '<span class="tag tag-red">需维修</span>';
    return `<div style="padding:8px 0;border-bottom:1px solid #f0f0f0;font-size:13px">
      <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px">
        <span><strong>${h.date}</strong> &nbsp; ${h.type} &nbsp; ${resultTag}</span>
        <span style="color:var(--text3)">执行人: ${h.person}</span>
      </div>
      <div style="color:var(--text2);margin-top:4px">${h.content}</div>
      ${h.parts !== '无' ? `<div style="color:var(--text3);font-size:12px;margin-top:2px">更换部件: ${h.parts}</div>` : ''}
    </div>`;
  }).join('');

  return `<div class="collapse-panel" id="panel5">
    <div class="collapse-header" onclick="togglePanel('panel5')">
      <h4><span class="collapse-arrow">&#9654;</span> 保养管理 <span class="tag tag-green" style="font-weight:400">${plans.length} 计划</span></h4>
      <button class="btn btn-sm btn-primary" onclick="event.stopPropagation();openMaintPlanModal('${d.id}')">+ 保养计划</button>
    </div>
    <div class="collapse-content">
      ${alerts}
      <h5 style="margin:12px 0 8px;font-size:13px;color:var(--text2)">保养计划</h5>
      ${plans.length > 0 ? planCards : '<div style="text-align:center;padding:16px;color:var(--text3)">暂无保养计划</div>'}
      <h5 style="margin:16px 0 8px;font-size:13px;color:var(--text2)">保养历史</h5>
      ${history.length > 0 ? historyHtml : '<div style="text-align:center;padding:16px;color:var(--text3)">暂无保养记录</div>'}
    </div>
  </div>`;
}

// 1. Sync Modal
function openSyncModal() {
  const candidates = state.syncCandidates;
  if (candidates.length === 0) { showToast('暂无可同步的设备'); return; }
  const rows = candidates.map((c, i) => `<div class="checkbox-row">
    <input type="checkbox" id="sync-${i}" value="${i}">
    <label for="sync-${i}"><strong>${c.id}</strong> &nbsp; ${c.name} &nbsp; <span style="color:var(--text3)">${c.location}</span></label>
  </div>`).join('');
  openModal(`
    <div class="modal-header"><h3>从设备管理系统同步</h3><button class="modal-close" onclick="closeModal()">&times;</button></div>
    <div class="modal-body">
      <div style="margin-bottom:12px;padding:10px;background:#e6f7ff;border-radius:6px;font-size:13px;color:#096dd9">以下设备已在设备管理系统中登记，但尚未同步到维护保养中心。</div>
      <div class="checkbox-row" style="border-bottom:2px solid var(--border)">
        <input type="checkbox" id="sync-all" onchange="toggleSyncAll(this.checked)"><label for="sync-all"><strong>全选</strong></label>
      </div>
      ${rows}
    </div>
    <div class="modal-footer">
      <button class="btn" onclick="closeModal()">取消</button>
      <button class="btn btn-primary" onclick="doSync()">同步</button>
    </div>
  `);
}

function toggleSyncAll(checked) {
  state.syncCandidates.forEach((_, i) => {
    const el = document.getElementById('sync-' + i);
    if (el) el.checked = checked;
  });
}

function doSync() {
  const selected = [];
  state.syncCandidates.forEach((c, i) => {
    if (document.getElementById('sync-' + i)?.checked) selected.push(i);
  });
  if (selected.length === 0) { showToast('请选择要同步的设备','error'); return; }
  const toAdd = selected.map(i => state.syncCandidates[i]);
  toAdd.forEach(c => {
    state.devices.push({
      id:c.id,name:c.name,shortName:c.name.slice(0,8),deviceType:'铁路运输类',productName:c.name,location:c.location,manufacturer:'捷安高科',applicableSystem:'-',workstations:1,platformInteraction:'待确认',manager:'-',department:'-',assetValue:0,syncTime:'2026-06-17 '+new Date().toTimeString().slice(0,5),
      sn:'',purchaseDate:'',expectedRetireDate:'',lifecycle:'待验收',majorCategory:'',usageCategory:'',onlineStatus:'离线',health:100,warrantyInfo:'',remark:'新同步设备',params:[]
    });
  });
  // Remove synced from candidates
  state.syncCandidates = state.syncCandidates.filter((_, i) => !selected.includes(i));
  closeModal();
  showToast(`已同步 ${toAdd.length} 台设备`, 'success');
  render();
}

          <label><input type="radio" name="exec-result" value="需维修"> 需维修</label>
        </div>
        <div id="exec-repair-hint" style="display:none;margin-top:8px;padding:8px;background:#fff7e6;border-radius:4px;font-size:12px;color:#d46b08">选择"需维修"将自动生成故障报修单</div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn" onclick="closeModal()">取消</button>
      <button class="btn btn-success" onclick="submitExecMaint('${d.id}',${planId||'null'})">提交保养记录</button>
    </div>
  `);
  // Listen for radio change
  setTimeout(() => {
    document.querySelectorAll('input[name="exec-result"]').forEach(r => {
      r.addEventListener('change', () => {
        document.getElementById('exec-repair-hint').style.display = r.value === '需维修' && r.checked ? 'block' : 'none';
      });
    });
  }, 50);
}

function submitExecMaint(deviceId, planId) {
  const date = document.getElementById('exec-date').value;
  const person = document.getElementById('exec-person').value;
  const content = document.getElementById('exec-content').value;
  const parts = document.getElementById('exec-parts').value || '无';
  const result = document.querySelector('input[name="exec-result"]:checked')?.value || '正常';
  const type = document.getElementById('exec-type').value;
  if (!date || !person || !content) { showToast('请填写完整信息','error'); return; }
  const newId = Math.max(...state.maintHistory.map(h => h.id), 0) + 1;
  state.maintHistory.push({id:newId, deviceId, date, type, content, parts, person, result, photos:0});
  // Update plan lastDate
  if (planId) {
    const plan = state.maintPlans.find(p => p.id === planId);
    if (plan) plan.lastDate = date;
  }
  // If needs repair, auto-create fault
  if (result === '需维修') {
    const fId = Math.max(...state.faults.map(f => f.id), 0) + 1;
    state.faults.push({
      id:fId, deviceId, type:'保养发现', urgency:'一般', desc:'保养检查中发现需维修问题: ' + content,
      reporter:person, reportTime:date + ' ' + new Date().toTimeString().slice(0,5),
      status:'待处理', assignee:'', photos:0,
      timeline:[{time:date + ' ' + new Date().toTimeString().slice(0,5), content:'保养检查转故障: ' + content}]
    });
    showToast('保养已记录，已自动生成故障单','success');
  } else {
    showToast('保养记录已提交','success');
  }
  closeModal();
  render();
  refreshDrawer();
}

// 7. Usage Record Modal
function openUsageModal(deviceId) {
  const d = state.devices.find(x => x.id === deviceId);
  openModal(`
    <div class="modal-header"><h3>新增使用记录</h3><button class="modal-close" onclick="closeModal()">&times;</button></div>
    <div class="modal-body">
      <div class="form-group"><label>设备</label><input value="${d ? d.id + ' ' + d.shortName : ''}" readonly></div>
      <div class="form-row">
        <div class="form-group"><label><span class="req">*</span> 使用日期</label><input type="date" id="ur-date" value="2026-06-17"></div>
        <div class="form-group"><label><span class="req">*</span> 使用时长(小时)</label><input type="number" id="ur-duration" min="0.5" max="12" step="0.5" value="2"></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label><span class="req">*</span> 使用人员</label><input id="ur-person" placeholder="如: 王老师"></div>
        <div class="form-group"><label><span class="req">*</span> 使用班级/部门</label><input id="ur-class" placeholder="如: 机车2024-1班"></div>
      </div>
      <div class="form-group"><label><span class="req">*</span> 训练科目</label><input id="ur-subject" placeholder="如: 电力机车操纵实训"></div>
      <div class="form-group"><label><span class="req">*</span> 运行状态</label>
        <div class="radio-group"><label><input type="radio" name="ur-status" value="正常" checked> 正常</label><label><input type="radio" name="ur-status" value="异常"> 异常</label></div>
      </div>
      <div class="form-group"><label>备注</label><textarea id="ur-remark" placeholder="选填"></textarea></div>
    </div>
    <div class="modal-footer">
      <button class="btn" onclick="closeModal()">取消</button>
      <button class="btn btn-primary" onclick="submitUsage('${deviceId}')">保存</button>
    </div>
  `);
}

function submitUsage(deviceId) {
  const date = document.getElementById('ur-date').value;
  const duration = parseFloat(document.getElementById('ur-duration').value);
  const person = document.getElementById('ur-person').value;
  const classGroup = document.getElementById('ur-class').value;
  const subject = document.getElementById('ur-subject').value;
  const status = document.querySelector('input[name="ur-status"]:checked')?.value || '正常';
  const remark = document.getElementById('ur-remark').value;
  if (!date || !person || !classGroup || !subject) { showToast('请填写完整信息','error'); return; }
  const newId = Math.max(...state.usageRecords.map(u => u.id), 0) + 1;
  state.usageRecords.push({id:newId, deviceId, date, duration, person, classGroup, subject, status, detail:'用户手动录入', remark});
  closeModal();
  showToast('使用记录已保存','success');
  refreshDrawer();
}


// ==================== INIT ====================
render();
</script>
</body>
</html>
