<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>实训设备管理</title>
<script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--primary:#1677ff;--success:#52c41a;--warning:#faad14;--danger:#ff4d4f;--bg:#f5f5f5;--card:#fff;--border:#e8e8e8;--text:#333;--text2:#666;--text3:#999;--radius:8px}
body{font-family:-apple-system,"PingFang SC","Microsoft YaHei",sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.6}
.header{background:#fff;padding:16px 24px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100}
.header h1{font-size:20px;font-weight:600}
.header-actions{display:flex;gap:8px}
.btn{padding:6px 16px;border-radius:6px;border:1px solid var(--border);background:#fff;cursor:pointer;font-size:13px;display:inline-flex;align-items:center;gap:4px;transition:all .2s}
.btn:hover{border-color:var(--primary);color:var(--primary)}
.btn-primary{background:var(--primary);color:#fff;border-color:var(--primary)}
.btn-primary:hover{background:#4096ff}
.btn-success{background:var(--success);color:#fff;border-color:var(--success)}
.btn-success:hover{opacity:.85}
.btn-danger{background:var(--danger);color:#fff;border-color:var(--danger)}
.btn-danger:hover{opacity:.85}
.btn-link{border:none;background:none;color:var(--primary);padding:2px 6px;cursor:pointer;font-size:13px}
.btn-link:hover{color:#4096ff}
.btn-sm{padding:4px 10px;font-size:12px}
.container{padding:16px 24px;max-width:1400px;margin:0 auto}
.stats-row{display:flex;gap:16px;margin-bottom:16px;flex-wrap:wrap}
.stat-card{background:#fff;border-radius:var(--radius);padding:16px 20px;flex:1;min-width:160px;border:1px solid var(--border)}
.stat-card .label{font-size:13px;color:var(--text2)}
.stat-card .value{font-size:28px;font-weight:700;margin-top:4px}
.stat-card .value.green{color:var(--success)}
.stat-card .value.red{color:var(--danger)}
.stat-card .value.orange{color:var(--warning)}
.chart-card{background:#fff;border-radius:var(--radius);padding:16px;border:1px solid var(--border);min-width:280px;flex:1.5}
.quick-filters{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap}
.qf-btn{padding:6px 16px;border-radius:16px;border:1px solid var(--border);background:#fff;cursor:pointer;font-size:13px;position:relative}
.qf-btn.active{background:var(--primary);color:#fff;border-color:var(--primary)}
.badge{position:absolute;top:-6px;right:-6px;min-width:18px;height:18px;border-radius:9px;font-size:11px;display:flex;align-items:center;justify-content:center;color:#fff;padding:0 5px}
.badge-red{background:var(--danger)}
.badge-orange{background:var(--warning)}
.filter-row{display:flex;gap:12px;margin-bottom:16px;flex-wrap:wrap;align-items:center}
.filter-row select,.filter-row input{padding:6px 12px;border:1px solid var(--border);border-radius:6px;font-size:13px;min-width:140px}
.table-wrap{background:#fff;border-radius:var(--radius);border:1px solid var(--border);overflow-x:auto}
table{width:100%;border-collapse:collapse}
th{background:#fafafa;padding:10px 12px;text-align:left;font-weight:600;font-size:13px;border-bottom:1px solid var(--border);white-space:nowrap;user-select:none}
th.sortable{cursor:pointer}
th.sortable:hover{background:#f0f0f0}
td{padding:10px 12px;border-bottom:1px solid #f0f0f0;font-size:13px}
tr:hover{background:#fafafa}
tr.clickable{cursor:pointer}
.status-badge{padding:2px 8px;border-radius:10px;font-size:12px;display:inline-block;font-weight:500}
.status-online{background:#f6ffed;color:var(--success);border:1px solid #b7eb8f}
.status-offline{background:#f5f5f5;color:#999;border:1px solid #d9d9d9}
.status-maintenance{background:#e6f7ff;color:#1890ff;border:1px solid #91d5ff}
.health-bar{width:80px;height:8px;background:#f0f0f0;border-radius:4px;display:inline-block;vertical-align:middle;margin-right:6px}
.health-fill{height:100%;border-radius:4px;transition:width .3s}
.tag{padding:1px 8px;border-radius:4px;font-size:12px;display:inline-block}
.tag-green{background:#f6ffed;color:var(--success);border:1px solid #b7eb8f}
.tag-orange{background:#fff7e6;color:#d48806;border:1px solid #ffd591}
.tag-red{background:#fff2f0;color:var(--danger);border:1px solid #ffccc7}
.tag-blue{background:#e6f7ff;color:#1890ff;border:1px solid #91d5ff}
.tag-gray{background:#fafafa;color:#999;border:1px solid #d9d9d9}
.pagination{display:flex;justify-content:space-between;align-items:center;padding:12px 16px}
.pagination .info{color:var(--text3);font-size:13px}
.page-btns{display:flex;gap:4px}
.page-btn{width:32px;height:32px;border:1px solid var(--border);border-radius:6px;background:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:13px}
.page-btn.active{background:var(--primary);color:#fff;border-color:var(--primary)}
.page-btn:hover:not(.active){border-color:var(--primary);color:var(--primary)}
.drawer-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.45);z-index:200;display:none;opacity:0;transition:opacity .3s}
.drawer-overlay.open{display:block;opacity:1}
.drawer{position:fixed;top:0;right:-660px;width:640px;height:100%;background:#fff;z-index:201;transition:right .3s;overflow-y:auto;box-shadow:-4px 0 12px rgba(0,0,0,.1)}
.drawer.open{right:0}
.drawer-header{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;background:#fff;z-index:1}
.drawer-header h3{font-size:16px}
.drawer-close{width:32px;height:32px;border:none;background:none;cursor:pointer;font-size:20px;color:#999;border-radius:4px}
.drawer-close:hover{background:#f5f5f5;color:#333}
.drawer-body{padding:20px}
.collapse{border:1px solid var(--border);border-radius:var(--radius);margin-bottom:12px}
.collapse-head{padding:12px 16px;display:flex;justify-content:space-between;align-items:center;cursor:pointer;background:#fafafa;border-radius:var(--radius) var(--radius) 0 0;font-weight:600}
.collapse-head .arrow{transition:transform .2s;font-size:12px}
.collapse-head .arrow.down{transform:rotate(90deg)}
.collapse-body{padding:16px;display:none}
.collapse-body.open{display:block}
.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.info-item{display:flex;flex-direction:column}
.info-item .lbl{font-size:12px;color:var(--text3)}
.info-item .val{font-size:14px;font-weight:500;margin-top:2px}
.fault-card{border:1px solid var(--border);border-radius:var(--radius);padding:12px;margin-bottom:10px}
.fault-top{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:6px}
.fault-desc{color:var(--text2);font-size:13px;margin-bottom:6px}
.fault-meta{font-size:12px;color:var(--text3);display:flex;gap:16px}
.fault-expand{color:var(--primary);font-size:12px;cursor:pointer;margin-top:6px;display:inline-block}
.fault-expand:hover{text-decoration:underline}
.fault-detail{margin-top:12px;padding-top:12px;border-top:1px solid #f0f0f0;display:none}
.fault-detail.open{display:block}
.steps{display:flex;gap:0;margin-bottom:16px;position:relative}
.step{flex:1;text-align:center;position:relative;padding-bottom:8px}
.step-dot{width:24px;height:24px;border-radius:50%;border:2px solid #d9d9d9;background:#fff;margin:0 auto;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;position:relative;z-index:1}
.step.done .step-dot{background:var(--primary);border-color:var(--primary);color:#fff}
.step.current .step-dot{border-color:var(--primary);color:var(--primary);animation:pulse 1.5s infinite}
.step.rework .step-dot{border-color:var(--danger);color:var(--danger);animation:pulse-red 1.5s infinite}
.step-label{font-size:11px;color:var(--text3);margin-top:4px}
.step.done .step-label,.step.current .step-label{color:var(--primary)}
.step.rework .step-label{color:var(--danger)}
.step-line{position:absolute;top:12px;left:calc(50% + 12px);right:calc(-50% + 12px);height:2px;background:#d9d9d9}
.step.done .step-line{background:var(--primary)}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(22,119,255,.4)}50%{box-shadow:0 0 0 6px rgba(22,119,255,0)}}
@keyframes pulse-red{0%,100%{box-shadow:0 0 0 0 rgba(255,77,79,.4)}50%{box-shadow:0 0 0 6px rgba(255,77,79,0)}}
.timeline{padding-left:20px;border-left:2px solid #f0f0f0;margin:12px 0}
.tl-item{position:relative;padding:0 0 16px 16px}
.tl-item:last-child{padding-bottom:0}
.tl-item::before{content:'';width:8px;height:8px;border-radius:50%;background:var(--primary);position:absolute;left:-25px;top:4px}
.tl-item.green::before{background:var(--success)}
.tl-item.red::before{background:var(--danger)}
.tl-time{font-size:12px;color:var(--text3)}
.tl-content{font-size:13px;margin-top:2px}
.tl-note{font-size:12px;color:var(--text2);margin-top:2px;font-style:italic}
.action-area{background:#fafafa;border-radius:var(--radius);padding:14px;margin-top:12px}
.action-area h4{font-size:14px;margin-bottom:10px;color:var(--text)}
.form-group{margin-bottom:10px}
.form-group label{display:block;font-size:12px;color:var(--text2);margin-bottom:4px}
.form-group label .req{color:var(--danger)}
.form-group input,.form-group select,.form-group textarea{width:100%;padding:6px 10px;border:1px solid var(--border);border-radius:6px;font-size:13px;font-family:inherit}
.form-group textarea{resize:vertical;min-height:60px}
.radio-group{display:flex;gap:12px}
.radio-group label{display:flex;align-items:center;gap:4px;cursor:pointer;font-size:13px;color:var(--text)}
.upload-zone{border:1px dashed #d9d9d9;border-radius:6px;padding:16px;text-align:center;cursor:pointer;color:var(--text3);font-size:13px;transition:border-color .2s}
.upload-zone:hover{border-color:var(--primary)}
.upload-preview{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px}
.upload-thumb{width:80px;height:80px;background:#f0f0f0;border-radius:6px;position:relative;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:10px;color:#999}
.upload-thumb .del{position:absolute;top:-4px;right:-4px;width:16px;height:16px;border-radius:50%;background:var(--danger);color:#fff;font-size:10px;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center}
.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.45);z-index:300;display:none;justify-content:center;align-items:center}
.modal-overlay.open{display:flex}
.modal{background:#fff;border-radius:var(--radius);width:520px;max-height:85vh;overflow-y:auto;box-shadow:0 4px 24px rgba(0,0,0,.15)}
.modal-header{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.modal-header h3{font-size:16px}
.modal-body{padding:20px}
.modal-footer{padding:12px 20px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:8px}
.maint-plan{border:1px solid var(--border);border-radius:var(--radius);padding:14px;margin-bottom:10px}
.maint-record{border:1px solid #f0f0f0;border-radius:6px;padding:10px;margin-bottom:8px;font-size:13px}
.maint-record-detail{display:none;margin-top:8px;padding-top:8px;border-top:1px solid #f0f0f0;font-size:12px;color:var(--text2)}
.maint-record-detail.open{display:block}
.toast{position:fixed;top:16px;left:50%;transform:translateX(-50%);background:var(--success);color:#fff;padding:10px 24px;border-radius:6px;font-size:14px;z-index:999;display:none;box-shadow:0 2px 8px rgba(0,0,0,.15)}
.toast.show{display:block;animation:fadeInOut 2.5s ease}
@keyframes fadeInOut{0%{opacity:0;transform:translateX(-50%) translateY(-10px)}10%{opacity:1;transform:translateX(-50%) translateY(0)}80%{opacity:1}100%{opacity:0}}
.empty{text-align:center;padding:24px;color:var(--text3);font-size:14px}
.hidden{display:none!important}
</style>
</head>
<body>
<div id="toast" class="toast"></div>

<div class="header">
  <h1>实训设备管理</h1>
  <div class="header-actions">
    <button class="btn" onclick="showToast('数据导入成功')">导入数据</button>
    <button class="btn" onclick="showToast('报表已导出')">导出报表</button>
    <button class="btn btn-danger" onclick="openFaultModal()">+ 报修</button>
    <button class="btn btn-primary" onclick="openMaintPlanModal()">+ 新增保养计划</button>
    <button class="btn btn-primary" onclick="openDeviceModal()">+ 新增设备</button>
  </div>
</div>

<div class="container">
  <div class="stats-row">
    <div class="stat-card"><div class="label">设备总数</div><div class="value" id="s-total">12</div></div>
    <div class="stat-card"><div class="label">在线设备</div><div class="value green" id="s-online">9</div></div>
    <div class="stat-card"><div class="label">故障设备</div><div class="value red" id="s-fault">0</div></div>
    <div class="stat-card"><div class="label">待保养设备</div><div class="value orange" id="s-maint">0</div></div>
    <div class="chart-card"><div id="healthChart" style="height:100px;width:100%"></div></div>
  </div>

  <div class="quick-filters">
    <button class="qf-btn active" onclick="setQuickFilter('all',this)">全部设备</button>
    <button class="qf-btn" onclick="setQuickFilter('fault',this)">待处理故障<span class="badge badge-red" id="badge-fault">0</span></button>
    <button class="qf-btn" onclick="setQuickFilter('maint',this)">待保养设备<span class="badge badge-orange" id="badge-maint">0</span></button>
  </div>

  <div class="filter-row">
    <select id="f-area" onchange="applyFilters()"><option value="">全部区域</option><option>实训区A</option><option>实训区B</option><option>实训区C</option></select>
    <select id="f-status" onchange="applyFilters()"><option value="">全部状态</option><option>在线</option><option>离线</option><option>维护中</option></select>
    <select id="f-health" onchange="applyFilters()"><option value="">全部健康度</option><option value="high">&gt;=80% 良好</option><option value="mid">60%-79% 一般</option><option value="low">&lt;60% 较差</option></select>
    <input type="text" id="f-keyword" placeholder="搜索设备名称/编号/型号" oninput="applyFilters()" style="min-width:200px">
    <button class="btn btn-sm" onclick="resetFilters()">重置</button>
  </div>

  <div class="table-wrap">
    <table>
      <thead><tr>
        <th class="sortable" onclick="sortBy('id')">设备编号 <span id="sort-id">&#8693;</span></th>
        <th>设备名称</th><th>设备型号</th><th>所属区域</th>
        <th class="sortable" onclick="sortBy('status')">在线状态 <span id="sort-status">&#8693;</span></th>
        <th class="sortable" onclick="sortBy('health')">健康度 <span id="sort-health">&#8693;</span></th>
        <th>故障</th><th>保养状态</th><th style="width:260px">操作</th>
      </tr></thead>
      <tbody id="tableBody"></tbody>
    </table>
    <div class="pagination"><span class="info" id="pageInfo"></span><div class="page-btns" id="pageBtns"></div></div>
  </div>
</div>

<div class="drawer-overlay" id="drawerOverlay" onclick="closeDrawer()"></div>
<div class="drawer" id="drawer">
  <div class="drawer-header"><h3 id="drawerTitle">设备详情</h3><button class="drawer-close" onclick="closeDrawer()">&times;</button></div>
  <div class="drawer-body" id="drawerBody"></div>
</div>

<div class="modal-overlay" id="faultModal">
  <div class="modal">
    <div class="modal-header"><h3>故障登记</h3><button class="drawer-close" onclick="closeFaultModal()">&times;</button></div>
    <div class="modal-body">
      <div class="form-group"><label>设备 <span class="req">*</span></label><select id="fm-device"></select></div>
      <div class="form-group"><label>故障类型 <span class="req">*</span></label><select id="fm-type"><option>硬件故障</option><option>软件故障</option><option>其他</option></select></div>
      <div class="form-group"><label>紧急程度 <span class="req">*</span></label><div class="radio-group"><label><input type="radio" name="fm-urgency" value="紧急" checked>紧急</label><label><input type="radio" name="fm-urgency" value="一般">一般</label><label><input type="radio" name="fm-urgency" value="轻微">轻微</label></div></div>
      <div class="form-group"><label>故障描述 <span class="req">*</span></label><textarea id="fm-desc" placeholder="请描述故障现象..."></textarea></div>
      <div class="form-group"><label>故障照片</label><div class="upload-zone" onclick="addPhoto('fm-photos')">点击上传照片</div><div class="upload-preview" id="fm-photos"></div></div>
      <div class="form-group"><label>发现人</label><input id="fm-reporter" value="当前用户"></div>
    </div>
    <div class="modal-footer"><button class="btn" onclick="closeFaultModal()">取消</button><button class="btn btn-primary" onclick="submitFault()">提交</button></div>
  </div>
</div>

<div class="modal-overlay" id="maintPlanModal">
  <div class="modal">
    <div class="modal-header"><h3>新增保养计划</h3><button class="drawer-close" onclick="closeMaintPlanModal()">&times;</button></div>
    <div class="modal-body">
      <div class="form-group"><label>设备 <span class="req">*</span></label><select id="mp-device"></select></div>
      <div class="form-group"><label>保养类型 <span class="req">*</span></label><div class="radio-group"><label><input type="radio" name="mp-type" value="日常保养" checked>日常保养</label><label><input type="radio" name="mp-type" value="定期保养">定期保养</label><label><input type="radio" name="mp-type" value="专项保养">专项保养</label></div></div>
      <div class="form-group"><label>保养周期 <span class="req">*</span></label><select id="mp-cycle" onchange="toggleCustomDays()"><option>每周</option><option>每月</option><option>每季度</option><option>每半年</option><option>每年</option><option>自定义</option></select></div>
      <div class="form-group hidden" id="mp-custom-wrap"><label>自定义天数</label><input type="number" id="mp-custom-days" min="1" value="30"></div>
      <div class="form-group"><label>标准保养内容 <span class="req">*</span></label><textarea id="mp-content" placeholder="如：清洁传感器、检查线路连接、校准参数"></textarea></div>
      <div class="form-group"><label>责任人 <span class="req">*</span></label><select id="mp-person"><option>赵刚</option><option>李强</option><option>周婷</option><option>孙磊</option></select></div>
      <div class="form-group"><label>备注</label><textarea id="mp-remark"></textarea></div>
    </div>
    <div class="modal-footer"><button class="btn" onclick="closeMaintPlanModal()">取消</button><button class="btn btn-primary" onclick="submitMaintPlan()">提交</button></div>
  </div>
</div>

<div class="modal-overlay" id="execMaintModal">
  <div class="modal">
    <div class="modal-header"><h3>执行保养</h3><button class="drawer-close" onclick="closeExecMaintModal()">&times;</button></div>
    <div class="modal-body">
      <div class="form-group"><label>设备名称</label><input id="em-device" readonly></div>
      <div class="form-group"><label>保养类型</label><input id="em-type" readonly></div>
      <div class="form-group"><label>执行日期</label><input type="date" id="em-date"></div>
      <div class="form-group"><label>实际保养内容 <span class="req">*</span></label><textarea id="em-content"></textarea></div>
      <div class="form-group"><label>更换部件</label><textarea id="em-parts" placeholder="如：传感器模块 x1、滤网 x2"></textarea></div>
      <div class="form-group"><label>保养人员 <span class="req">*</span></label><select id="em-person"><option>赵刚</option><option>李强</option><option>周婷</option><option>孙磊</option></select></div>
      <div class="form-group"><label>保养照片</label><div class="upload-zone" onclick="addPhoto('em-photos')">点击上传照片</div><div class="upload-preview" id="em-photos"></div></div>
      <div class="form-group"><label>保养结果 <span class="req">*</span></label><div class="radio-group"><label><input type="radio" name="em-result" value="正常" checked>正常</label><label><input type="radio" name="em-result" value="需关注">需关注</label><label><input type="radio" name="em-result" value="需维修">需维修</label></div></div>
      <div class="form-group"><label>备注</label><textarea id="em-remark"></textarea></div>
    </div>
    <div class="modal-footer"><button class="btn" onclick="closeExecMaintModal()">取消</button><button class="btn btn-primary" onclick="submitExecMaint()">提交</button></div>
  </div>
</div>

<div class="modal-overlay" id="deviceModal">
  <div class="modal" style="width:560px">
    <div class="modal-header"><h3 id="deviceModalTitle">新增设备</h3><button class="drawer-close" onclick="closeDeviceModal()">&times;</button></div>
    <div class="modal-body">
      <div class="form-group"><label>设备编号 <span class="req">*</span></label><input id="dm-id" placeholder="如 SB-013"></div>
      <div class="form-group"><label>设备名称 <span class="req">*</span></label><input id="dm-name" placeholder="如 售票机模拟器"></div>
      <div class="form-group"><label>设备型号 <span class="req">*</span></label><input id="dm-model" placeholder="如 TVM-3000"></div>

function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.className='toast show';setTimeout(()=>t.className='toast',2600)}
function today(){return new Date().toISOString().slice(0,10)}
function now(){const d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')+' '+String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0')}

function getDeviceFaults(did){return faults.filter(f=>f.deviceId===did)}
function getActiveFaults(did){return faults.filter(f=>f.deviceId===did&&f.status!=='已完成')}
function getDevicePlans(did){return maintPlans.filter(p=>p.deviceId===did)}
function getDeviceRecords(did){return maintRecords.filter(r=>r.deviceId===did).sort((a,b)=>b.date.localeCompare(a.date))}

function getMaintStatus(did){
  const plans=getDevicePlans(did);if(!plans.length)return'无计划';
  const t=today();
  for(const p of plans){
    if(p.nextDate<=t)return'已逾期';
  }
  for(const p of plans){
    const d=new Date(p.nextDate),n=new Date(t);
    if((d-n)/(86400000)<=7)return'即将到期';
  }
  return'正常';
}

function healthColor(h){return h>=80?'var(--success)':h>=60?'var(--warning)':'var(--danger)'}
function statusClass(s){return s==='在线'?'status-online':s==='离线'?'status-offline':'status-maintenance'}
function maintTagClass(s){return s==='正常'?'tag-green':s==='即将到期'?'tag-orange':s==='已逾期'?'tag-red':'tag-gray'}
function urgencyTagClass(u){return u==='紧急'?'tag-red':u==='一般'?'tag-orange':'tag-gray'}
function faultStatusClass(s){return s==='已完成'?'tag-green':s==='待处理'?'tag-orange':s==='需返工'?'tag-red':'tag-blue'}
function resultTagClass(r){return r==='正常'?'tag-green':r==='需关注'?'tag-orange':'tag-red'}

function updateStats(){
  document.getElementById('s-total').textContent=devices.length;
  document.getElementById('s-online').textContent=devices.filter(d=>d.status==='在线').length;
  const faultDevices=new Set(faults.filter(f=>f.status!=='已完成').map(f=>f.deviceId));
  document.getElementById('s-fault').textContent=faultDevices.size;
  const maintDevices=devices.filter(d=>{const s=getMaintStatus(d.id);return s==='即将到期'||s==='已逾期'});
  document.getElementById('s-maint').textContent=maintDevices.length;
  document.getElementById('badge-fault').textContent=faultDevices.size;
  document.getElementById('badge-maint').textContent=maintDevices.length;
}

function getFilteredDevices(){
  let list=[...devices];
  const area=document.getElementById('f-area').value;
  const status=document.getElementById('f-status').value;
  const health=document.getElementById('f-health').value;
  const kw=document.getElementById('f-keyword').value.toLowerCase();
  if(area)list=list.filter(d=>d.area===area);
  if(status)list=list.filter(d=>d.status===status);
  if(health==='high')list=list.filter(d=>d.health>=80);
  else if(health==='mid')list=list.filter(d=>d.health>=60&&d.health<80);
  else if(health==='low')list=list.filter(d=>d.health<60);
  if(kw)list=list.filter(d=>(d.name+d.id+d.model).toLowerCase().includes(kw));
  if(quickFilter==='fault')list=list.filter(d=>getActiveFaults(d.id).length>0);
  if(quickFilter==='maint')list=list.filter(d=>{const s=getMaintStatus(d.id);return s==='即将到期'||s==='已逾期'});
  if(sortField){
    list.sort((a,b)=>{
      let va,vb;
      if(sortField==='id'){va=a.id;vb=b.id}
      else if(sortField==='status'){const o={'在线':1,'维护中':2,'离线':3};va=o[a.status];vb=o[b.status]}
      else if(sortField==='health'){va=a.health;vb=b.health}
      if(va<vb)return sortDir==='asc'?-1:1;
      if(va>vb)return sortDir==='asc'?1:-1;
      return 0;
    });
  }
  return list;
}

function sortBy(field){
  if(sortField===field){sortDir=sortDir==='asc'?'desc':sortDir==='desc'?null:'asc'}
  else{sortField=field;sortDir='asc'}
  if(!sortDir)sortField=null;
  ['id','status','health'].forEach(f=>{document.getElementById('sort-'+f).innerHTML=f===sortField?(sortDir==='asc'?'&uarr;':'&darr;'):'&#8693;'});
  currentPage=1;renderTable();
}

function setQuickFilter(f,btn){
  quickFilter=f;currentPage=1;
  document.querySelectorAll('.qf-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  applyFilters();
}
function resetFilters(){
  document.getElementById('f-area').value='';document.getElementById('f-status').value='';
  document.getElementById('f-health').value='';document.getElementById('f-keyword').value='';
  quickFilter='all';document.querySelectorAll('.qf-btn').forEach((b,i)=>b.classList.toggle('active',i===0));
  currentPage=1;renderTable();
}
function applyFilters(){currentPage=1;renderTable()}

function renderTable(){
  const list=getFilteredDevices();
  const total=list.length;
  const pages=Math.max(1,Math.ceil(total/pageSize));
  if(currentPage>pages)currentPage=pages;
  const start=(currentPage-1)*pageSize;
  const pageItems=list.slice(start,start+pageSize);
  const tbody=document.getElementById('tableBody');
  tbody.innerHTML=pageItems.map(d=>{
    const af=getActiveFaults(d.id).length;
    const ms=getMaintStatus(d.id);
    const hc=healthColor(d.health);
    return`<tr class="clickable" onclick="openDrawer('${d.id}')">
      <td>${d.id}</td><td>${d.name}</td><td>${d.model}</td><td>${d.area}</td>
      <td><span class="status-badge ${statusClass(d.status)}">${d.status}</span></td>
      <td><span class="health-bar"><span class="health-fill" style="width:${d.health}%;background:${hc}"></span></span>${d.health}%</td>
      <td style="color:${af?'var(--danger)':'#ccc'}">${af||'—'}</td>
      <td><span class="tag ${maintTagClass(ms)}">${ms}</span></td>
      <td onclick="event.stopPropagation()">
        <button class="btn-link btn-sm" onclick="openDrawer('${d.id}')">详情</button>
        <button class="btn-link btn-sm" onclick="openDeviceModal('${d.id}')">编辑</button>
        <button class="btn-link btn-sm" onclick="openFaultModal('${d.id}')">报修</button>
        <button class="btn-link btn-sm" onclick="openExecMaintModal('${d.id}')">保养</button>
        <button class="btn-link btn-sm" style="color:var(--danger)" onclick="openDeleteConfirm('${d.id}')">删除</button>
      </td></tr>`;
  }).join('');
  document.getElementById('pageInfo').textContent='共 '+total+' 条记录';
  const pb=document.getElementById('pageBtns');
  pb.innerHTML='';
  for(let i=1;i<=pages;i++){const b=document.createElement('button');b.className='page-btn'+(i===currentPage?' active':'');b.textContent=i;b.onclick=()=>{currentPage=i;renderTable()};pb.appendChild(b)}
  updateStats();
}

function openDrawer(did){
  currentDrawerDevice=did;

  document.getElementById('drawerTitle').textContent=d.name+' - '+d.id;

  <div class="collapse-body open" style="background:#fafafa"><div class="info-grid">
    <div class="info-item"><span class="lbl">设备编号</span><span class="val">${d.id}</span></div>
    <div class="info-item"><span class="lbl">设备名称</span><span class="val">${d.name}</span></div>
    <div class="info-item"><span class="lbl">设备型号</span><span class="val">${d.model}</span></div>
    <div class="info-item"><span class="lbl">序列号</span><span class="val">${d.sn}</span></div>
    <div class="info-item"><span class="lbl">所属区域</span><span class="val">${d.area}</span></div>
    <div class="info-item"><span class="lbl">采购日期</span><span class="val">${d.purchaseDate}</span></div>
    <div class="info-item"><span class="lbl">使用年限</span><span class="val">${years} 年</span></div>
    <div class="info-item"><span class="lbl">在线状态</span><span class="val"><span class="status-badge ${statusClass(d.status)}">${d.status}</span></span></div>
    <div class="info-item"><span class="lbl">健康度</span><span class="val"><span class="health-bar"><span class="health-fill" style="width:${d.health}%;background:${hc}"></span></span>${d.health}%</span></div>
    <div class="info-item"><span class="lbl">设备类型</span><span class="val">${d.type}</span></div>
  </div></div></div>`;

  html+=`<div class="collapse"><div class="collapse-head" onclick="toggleCollapse(this)">故障记录 (${dFaults.length})<span class="arrow down">&#9654;</span>
    <button class="btn btn-sm btn-danger" onclick="event.stopPropagation();openFaultModal('${did}')" style="margin-left:auto">+ 报修</button></div>
  <div class="collapse-body open">${dFaults.length?dFaults.map(f=>renderFaultCard(f)).join(''):'<div class="empty">暂无故障记录</div>'}</div></div>`;

  html+=`<div class="collapse"><div class="collapse-head" onclick="toggleCollapse(this)">保养管理<span class="arrow down">&#9654;</span>
    <button class="btn btn-sm btn-primary" onclick="event.stopPropagation();openMaintPlanModal('${did}')" style="margin-left:auto">+ 新增保养计划</button></div>
  <div class="collapse-body open">`;

  if(dPlans.length){
    dPlans.forEach(p=>{
      const pms=getMaintStatus(did);
      const canExec=pms==='即将到期'||pms==='已逾期';
      html+=`<div class="maint-plan">
        <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:6px">
          <span class="tag tag-blue">${p.type}</span><span style="font-size:13px">周期：${p.cycle}</span>
          <span class="tag ${maintTagClass(pms)}">${pms}</span></div>
        <div style="font-size:13px;color:var(--text2);margin-bottom:6px">${p.content}</div>
        <div style="font-size:12px;color:var(--text3)">责任人：${p.person} | 下次保养：${p.nextDate}</div>
        <button class="btn btn-sm ${canExec?'btn-primary':''}" style="margin-top:8px" onclick="openExecMaintModal('${did}')" ${canExec?'':'disabled'}>执行保养</button></div>`;
    });
  }else{
    html+='<div class="empty">暂未配置保养计划，请先新增</div>';
  }

  if(dRecords.length){
    html+='<h4 style="margin:16px 0 8px;font-size:14px">保养历史记录</h4>';

      html+=`<div class="maint-record">
        <div style="display:flex;justify-content:space-between;align-items:center">
          <div><strong>${r.date}</strong> | ${r.person} | ${r.summary} <span class="tag ${resultTagClass(r.result)}">${r.result}</span></div>
          <span class="fault-expand" onclick="this.parentElement.parentElement.querySelector('.maint-record-detail').classList.toggle('open');this.textContent=this.textContent==='展开详情'?'收起':'展开详情'">展开详情</span></div>

function closeDrawer(){document.getElementById('drawerOverlay').classList.remove('open');document.getElementById('drawer').classList.remove('open');currentDrawerDevice=null}
function toggleCollapse(el){el.nextElementSibling.classList.toggle('open');el.querySelector('.arrow').classList.toggle('down')}

function renderFaultCard(f){
  return`<div class="fault-card" id="fc-${f.fid}">
    <div class="fault-top"><strong>${f.fid}</strong>
      <span class="tag ${faultStatusClass(f.status)}">${f.status}</span>
      <span class="tag ${urgencyTagClass(f.urgency)}">${f.urgency}</span>
      <span class="tag tag-gray">${f.type}</span></div>
    <div class="fault-desc">${f.desc}</div>
    <div class="fault-meta"><span>登记人：${f.reporter}</span><span>${f.reportTime}</span></div>
    <span class="fault-expand" onclick="toggleFaultDetail('${f.fid}')">展开处理流程</span>
    <div class="fault-detail" id="fd-${f.fid}">${renderFaultDetail(f)}</div></div>`;
}

function toggleFaultDetail(fid){
  const el=document.getElementById('fd-'+fid);
  el.classList.toggle('open');
  const card=document.getElementById('fc-'+fid);
  const link=card.querySelector('.fault-expand');
  link.textContent=el.classList.contains('open')?'收起处理流程':'展开处理流程';
}

function renderFaultDetail(f){
  const stepsArr=['待处理','处理中','待验收','已完成'];
  let ci=stepsArr.indexOf(f.status);
  const isRework=f.status==='需返工';
  if(isRework)ci=1;

  let stepsHtml='<div class="steps">'+stepsArr.map((s,i)=>{
    let cls='step';
    if(i<ci)cls+=' done';
    else if(i===ci){cls+=isRework?' rework':' current'}
    const line=i<stepsArr.length-1?'<div class="step-line"></div>':'';
    return`<div class="${cls}">${line}<div class="step-dot">${i+1}</div><div class="step-label">${s}</div></div>`;
  }).join('')+'</div>';

  let tlHtml='<div class="timeline">'+f.timeline.map(t=>{
    const cls=t.action.includes('验收通过')?'green':t.action.includes('返工')?'red':'';
    return`<div class="tl-item ${cls}"><div class="tl-time">${t.time} - ${t.user}</div><div class="tl-content">${t.action}</div>${t.note?'<div class="tl-note">'+t.note+'</div>':''}</div>`;
  }).join('')+'</div>';

  let actionHtml='';
  if(f.status==='待处理'){
    actionHtml=`<div class="action-area"><h4>分配维修人员</h4>
      <div class="form-group"><select id="assign-${f.fid}">${repairers.map(r=>'<option>'+r+'</option>').join('')}</select></div>
      <button class="btn btn-primary btn-sm" onclick="assignFault('${f.fid}')">分配</button></div>`;
  }else if(f.status==='处理中'){
    actionHtml=renderRepairForm(f.fid);
  }else if(f.status==='待验收'){
    actionHtml=`<div class="action-area"><h4>验收</h4>
      <div style="display:flex;gap:8px"><button class="btn btn-success" onclick="acceptFault('${f.fid}')">验收通过</button>
      <button class="btn btn-danger" onclick="openReworkModal('${f.fid}')">需返工</button></div></div>`;
  }else if(f.status==='需返工'){
    actionHtml=`<div style="background:#fff2f0;padding:10px;border-radius:6px;margin-bottom:10px;font-size:13px;color:var(--danger)">
      <strong>验收未通过，需返工</strong><br>原因：${f.reworkReason||''}</div>`+renderRepairForm(f.fid);
  }
  return stepsHtml+tlHtml+actionHtml;
}

function renderRepairForm(fid){
  return`<div class="action-area"><h4>提交维修记录</h4>
    <div class="form-group"><label>处理措施 <span class="req">*</span></label><textarea id="repair-measure-${fid}" placeholder="请描述维修措施..."></textarea></div>
    <div class="form-group"><label>更换部件</label><input id="repair-parts-${fid}" placeholder="非必填"></div>
    <div class="form-group"><label>维修照片</label><div class="upload-zone" onclick="addPhoto('repair-photos-${fid}')">点击上传照片</div><div class="upload-preview" id="repair-photos-${fid}"></div></div>
    <button class="btn btn-primary btn-sm" onclick="submitRepair('${fid}')">提交验收</button></div>`;
}

function assignFault(fid){
  const f=faults.find(x=>x.fid===fid);
  const person=document.getElementById('assign-'+fid).value;
  f.status='处理中';f.assignee=person;
  f.timeline.push({time:now(),user:'系统',action:'已分配给 '+person,note:''});
  showToast('已分配给 '+person);refreshDrawer();renderTable();
}
function submitRepair(fid){
  const f=faults.find(x=>x.fid===fid);
  const el=document.getElementById('repair-measure-'+fid);
  if(!el||!el.value){showToast('请填写处理措施');return}
  f.status='待验收';
  const parts=document.getElementById('repair-parts-'+fid)?.value||'';
  f.timeline.push({time:now(),user:f.assignee||'维修人员',action:'提交维修记录',note:el.value+(parts?' | 更换：'+parts:'')});
  showToast('已提交验收');refreshDrawer();renderTable();
}
function acceptFault(fid){
  const f=faults.find(x=>x.fid===fid);
  f.status='已完成';
  f.timeline.push({time:now(),user:'当前用户',action:'验收通过',note:''});
  showToast('验收通过');refreshDrawer();renderTable();
}
function openReworkModal(fid){currentReworkFault=fid;document.getElementById('rw-reason').value='';document.getElementById('reworkModal').classList.add('open')}
function closeReworkModal(){document.getElementById('reworkModal').classList.remove('open')}
function submitRework(){
  const reason=document.getElementById('rw-reason').value;
  if(!reason){showToast('请填写返工原因');return}
  const f=faults.find(x=>x.fid===currentReworkFault);
  f.status='需返工';f.reworkReason=reason;
  f.timeline.push({time:now(),user:'当前用户',action:'验收未通过 - 需返工',note:reason});
  closeReworkModal();showToast('已标记需返工');refreshDrawer();renderTable();
}

function refreshDrawer(){if(currentDrawerDevice)openDrawer(currentDrawerDevice)}

function openFaultModal(did){
  const sel=document.getElementById('fm-device');
  sel.innerHTML=devices.map(d=>`<option value="${d.id}" ${d.id===did?'selected':''}>${d.id} ${d.name}</option>`).join('');

  document.getElementById('faultModal').classList.add('open');
}
function closeFaultModal(){document.getElementById('faultModal').classList.remove('open')}
function submitFault(){
  const did=document.getElementById('fm-device').value;
  const desc=document.getElementById('fm-desc').value;
  if(!desc){showToast('请填写故障描述');return}
  const urgency=document.querySelector('input[name="fm-urgency"]:checked').value;
  const type=document.getElementById('fm-type').value;
  const reporter=document.getElementById('fm-reporter').value;
  faultIdCounter++;
  const fid='GZ-'+String(faultIdCounter).padStart(3,'0');
  faults.push({fid,deviceId:did,type,urgency,desc,reporter,reportTime:now(),status:'待处理',timeline:[{time:now(),user:reporter,action:'登记故障',note:desc}]});

function openMaintPlanModal(did){
  const sel=document.getElementById('mp-device');
  sel.innerHTML=devices.map(d=>`<option value="${d.id}" ${d.id===did?'selected':''}>${d.id} ${d.name}</option>`).join('');

function closeMaintPlanModal(){document.getElementById('maintPlanModal').classList.remove('open')}
function toggleCustomDays(){document.getElementById('mp-custom-wrap').classList.toggle('hidden',document.getElementById('mp-cycle').value!=='自定义')}
function submitMaintPlan(){
  const did=document.getElementById('mp-device').value;
  const content=document.getElementById('mp-content').value;
  if(!content){showToast('请填写保养内容');return}
  const type=document.querySelector('input[name="mp-type"]:checked').value;

  const person=document.getElementById('mp-person').value;

function openExecMaintModal(did){
  currentExecMaintDevice=did;
  const d=devices.find(x=>x.id===did);
  const plans=getDevicePlans(did);
  document.getElementById('em-device').value=d.name;
  document.getElementById('em-type').value=plans.length?plans[0].type:'定期保养';

  document.getElementById('execMaintModal').classList.add('open');
}
function closeExecMaintModal(){document.getElementById('execMaintModal').classList.remove('open')}
function submitExecMaint(){
  const content=document.getElementById('em-content').value;
  if(!content){showToast('请填写保养内容');return}
  const did=currentExecMaintDevice;
  const person=document.getElementById('em-person').value;
  const result=document.querySelector('input[name="em-result"]:checked').value;
  const date=document.getElementById('em-date').value;
  maintRecords.push({deviceId:did,date,person,summary:document.getElementById('em-type').value,result,detail:content,parts:document.getElementById('em-parts').value,remark:document.getElementById('em-remark').value});
  const plans=getDevicePlans(did);

let editingDeviceId=null;
let deleteTargetId=null;

function openDeviceModal(did){
  editingDeviceId=did||null;
  const title=document.getElementById('deviceModalTitle');
  if(did){
    title.textContent='编辑设备';
    const d=devices.find(x=>x.id===did);
    document.getElementById('dm-id').value=d.id;
    document.getElementById('dm-id').readOnly=true;
    document.getElementById('dm-name').value=d.name;
    document.getElementById('dm-model').value=d.model;
    document.getElementById('dm-sn').value=d.sn;
    document.getElementById('dm-area').value=d.area;

    document.getElementById('dm-purchase').value=d.purchaseDate;
    document.getElementById('dm-status').value=d.status;
    document.getElementById('dm-health').value=d.health;
  }else{
    title.textContent='新增设备';
    document.getElementById('dm-id').value='SB-'+String(devices.length+1).padStart(3,'0');
    document.getElementById('dm-id').readOnly=false;
    document.getElementById('dm-name').value='';
    document.getElementById('dm-model').value='';
    document.getElementById('dm-sn').value='SN'+new Date().getFullYear()+String(devices.length+1).padStart(4,'0');
    document.getElementById('dm-area').value='实训区A';
    document.getElementById('dm-type').value='';
    document.getElementById('dm-purchase').value=today();
    document.getElementById('dm-status').value='在线';
    document.getElementById('dm-health').value=100;
  }
  document.getElementById('deviceModal').classList.add('open');
}
function closeDeviceModal(){document.getElementById('deviceModal').classList.remove('open');editingDeviceId=null}
function submitDevice(){
  const id=document.getElementById('dm-id').value.trim();
  const name=document.getElementById('dm-name').value.trim();
  const model=document.getElementById('dm-model').value.trim();
  const sn=document.getElementById('dm-sn').value.trim();
  const type=document.getElementById('dm-type').value.trim();
  const purchase=document.getElementById('dm-purchase').value;
  if(!id||!name||!model||!sn||!type||!purchase){showToast('请填写所有必填项');return}
  if(!editingDeviceId&&devices.find(d=>d.id===id)){showToast('设备编号已存在');return}
  const area=document.getElementById('dm-area').value;
  const status=document.getElementById('dm-status').value;
  const health=Math.min(100,Math.max(0,parseInt(document.getElementById('dm-health').value)||100));
  if(editingDeviceId){
    const d=devices.find(x=>x.id===editingDeviceId);
    d.name=name;d.model=model;d.sn=sn;d.area=area;d.type=type;d.purchaseDate=purchase;d.status=status;d.health=health;
    closeDeviceModal();showToast('设备信息已更新');
    if(currentDrawerDevice===editingDeviceId)refreshDrawer();
  }else{
    devices.push({id,name,model,sn,area,purchaseDate:purchase,status,health,type});
    closeDeviceModal();showToast('设备新增成功');
  }
  renderTable();
}

function openDeleteConfirm(did){
  deleteTargetId=did;
  const d=devices.find(x=>x.id===did);
  document.getElementById('deleteConfirmText').textContent='确定要删除设备 "'+d.name+'（'+d.id+'）" 吗？';
  document.getElementById('deleteConfirmModal').classList.add('open');
}
function closeDeleteConfirm(){document.getElementById('deleteConfirmModal').classList.remove('open');deleteTargetId=null}
function confirmDeleteDevice(){
  const did=deleteTargetId;
  const idx=devices.findIndex(d=>d.id===did);
  if(idx>-1)devices.splice(idx,1);
  for(let i=faults.length-1;i>=0;i--){if(faults[i].deviceId===did)faults.splice(i,1)}
  for(let i=maintPlans.length-1;i>=0;i--){if(maintPlans[i].deviceId===did)maintPlans.splice(i,1)}
  for(let i=maintRecords.length-1;i>=0;i--){if(maintRecords[i].deviceId===did)maintRecords.splice(i,1)}
  closeDeleteConfirm();
  if(currentDrawerDevice===did)closeDrawer();
  showToast('设备已删除');renderTable();
}

let photoCounters={};
function addPhoto(containerId){
  if(!photoCounters[containerId])photoCounters[containerId]=0;
  if(photoCounters[containerId]>=5)return;
  photoCounters[containerId]++;
  const c=document.getElementById(containerId);
  const idx=photoCounters[containerId];
  const div=document.createElement('div');div.className='upload-thumb';div.id=containerId+'-p'+idx;
  div.innerHTML=`<span style="font-size:24px;color:#ccc">&#128247;</span><span>photo_${String(idx).padStart(3,'0')}.jpg</span><button class="del" onclick="event.stopPropagation();removePhoto('${containerId}','${containerId}-p${idx}')">&times;</button>`;
  c.appendChild(div);
}
function removePhoto(containerId,elId){document.getElementById(elId).remove();photoCounters[containerId]--}

function initChart(){
  const chart=echarts.init(document.getElementById('healthChart'));
  chart.setOption({
    title:{text:'设备健康度趋势',textStyle:{fontSize:13,fontWeight:500}},
    tooltip:{trigger:'axis'},
    grid:{left:40,right:16,top:30,bottom:20},
    xAxis:{type:'category',data:['1月','2月','3月','4月','5月','6月'],axisLabel:{fontSize:11}},
    yAxis:{type:'value',min:60,max:100,axisLabel:{fontSize:11,formatter:'{value}%'}},
    series:[{data:[88,86,84,82,80,78],type:'line',smooth:true,lineStyle:{color:'#1677ff'},itemStyle:{color:'#1677ff'},areaStyle:{color:{type:'linear',x:0,y:0,x2:0,y2:1,colorStops:[{offset:0,color:'rgba(22,119,255,0.15)'},{offset:1,color:'rgba(22,119,255,0)'}]}}}]
  });
  window.addEventListener('resize',()=>chart.resize());
}

document.addEventListener('DOMContentLoaded',()=>{renderTable();initChart()});
document.querySelectorAll('.modal-overlay').forEach(el=>{el.addEventListener('click',e=>{if(e.target===el)el.classList.remove('open')})});
</script>
</body>
</html>
